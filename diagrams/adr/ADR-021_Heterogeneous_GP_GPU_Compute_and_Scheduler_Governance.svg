" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="402.2881" y2="422.2881"/><polygon fill="#34495E" points="378.9211,412.2881,382.9211,422.2881,386.9211,412.2881,382.9211,416.2881" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="232.5918" y2="290.6904"/><polygon fill="#34495E" points="378.9211,280.6904,382.9211,290.6904,386.9211,280.6904,382.9211,284.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="237.6213" x2="215.8713" y1="632.3088" y2="632.3088"/><line style="stroke:#34495E;stroke-width:1;" x1="215.8713" x2="215.8713" y1="632.3088" y2="654.3088"/><polygon fill="#34495E" points="211.8713,644.3088,215.8713,654.3088,219.8713,644.3088,215.8713,648.3088" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="528.2209" x2="549.9709" y1="632.3088" y2="632.3088"/><line style="stroke:#34495E;stroke-width:1;" x1="549.9709" x2="549.9709" y1="632.3088" y2="654.3088"/><polygon fill="#34495E" points="545.9709,644.3088,549.9709,654.3088,553.9709,644.3088,549.9709,648.3088" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="215.8713" x2="215.8713" y1="688.1077" y2="706.1077"/><line style="stroke:#34495E;stroke-width:1;" x1="215.8713" x2="370.9211" y1="706.1077" y2="706.1077"/><polygon fill="#34495E" points="360.9211,702.1077,370.9211,706.1077,360.9211,710.1077,364.9211,706.1077" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="549.9709" x2="549.9709" y1="688.1077" y2="706.1077"/><line style="stroke:#34495E;stroke-width:1;" x1="549.9709" x2="394.9211" y1="706.1077" y2="706.1077"/><polygon fill="#34495E" points="404.9211,702.1077,394.9211,706.1077,404.9211,710.1077,400.9211,706.1077" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="562.2102" y2="620.3088"/><polygon fill="#34495E" points="378.9211,610.3088,382.9211,620.3088,386.9211,610.3088,382.9211,614.3088" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="823.804" y2="843.804"/><polygon fill="#34495E" points="378.9211,833.804,382.9211,843.804,386.9211,833.804,382.9211,837.804" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="718.1077" y2="776.2063"/><polygon fill="#34495E" points="378.9211,766.2063,382.9211,776.2063,386.9211,766.2063,382.9211,770.2063" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="891.4016" y2="923.4016"/><polygon fill="#34495E" points="378.9211,913.4016,382.9211,923.4016,386.9211,913.4016,382.9211,917.4016" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="152.4275" y="949.4016"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="157.4275" y="967.5334">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="157.4275" y="983.6321">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="157.4275" y="999.7307">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="157.4275" y="1015.8293">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="157.4275" y="1031.928">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="157.4275" y="1048.0266">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="157.4275" y="1064.1252">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="165.2068" y="1080.2239">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="157.4275" y="1096.3225">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="157.4275" y="1112.4211">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="165.2068" y="1128.5198">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLNRSjis47tNLspJbtI62dMnuqX-wCYK56lY2olBdZvunWCHIn8n22W0A5ljvD-x02bPIISl4d5Rd7FsxE8tLsA5i95Cg8vz5ch33Al0beph5w4Ao9cqUBHYTArufer20_t1qGB7dDNIpRLoDun2Jl4hUwZXZYbxj6jYZ7v9jDG6VX-Ud8nEPqUBB7DYAzmE_kq0NB3ikGYtjTldq_biFlChsd0qxUpfnu-dPqEQdGfMQSN_VooP3vFvqORZqnTdezFU1ItUEMPSEza_EPqC1pGvEmGP3GONWtxd-n5OfHt-0kXiFfgT_GoqlUfxnmad4IRJPRStw4CNBj6XqGKgrBM5psdtSteFYQusDLt058Uxh4HUInByizwYKKnbsEb8f2CSZ2XArvcY5ONQvy12JZTomGe2Qg5M4gsbKFvIKCodm89F_BZJXKdcj8adwM8CbwjLUWSd9qEWuv_e_nnkDwWcYsv6S9WJQmyyNP1T26cYIpH8MBgAbhPXvGC5NEfajXsCuNwQ4Y