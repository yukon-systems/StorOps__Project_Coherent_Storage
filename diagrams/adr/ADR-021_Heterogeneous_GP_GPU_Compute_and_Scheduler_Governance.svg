<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1149px" preserveAspectRatio="none" style="width:789px;height:1149px;background:#FFFFFF;" version="1.1" viewBox="0 0 789 1149" width="789px" zoomAndPan="magnify"><title>ADR-021 - Heterogeneous GP-GPU Compute and Scheduler Governance</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="756.7119" x="15" y="35.6357">ADR-021 - Heterogeneous GP-GPU Compute and Scheduler Governance</text></g><ellipse cx="382.9211" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="163.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="334.123" x="215.8596" y="81.2979"/><path d="M348.0315,81.2979 L348.0315,90.3965 L338.0315,100.3965 L215.8596,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="122.1719" x="218.8596" y="95.4297">Capability inventory</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="314.123" x="225.8596" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="294.123" x="235.8596" y="138.6523">Discover accelerator vendor/model, HBM, interconnect,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="264.0703" x="235.8596" y="152.4512">collectives, precision, MIG/SR-IOV, driver/runtime</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="246.0723" x="259.885" y="184.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="226.0723" x="269.885" y="206.25">Attach DPU/NIC/CXL/root-complex locality</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="184.1016" x="269.885" y="220.0488">and qualified software stack profile</text><rect fill="#FFFFFF" height="319.6184" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="660.9238" x="63.6404" y="254.5918"/><path d="M155.3367,254.5918 L155.3367,263.6904 L145.3367,273.6904 L63.6404,273.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="81.6963" x="66.6404" y="268.7236">Profile match</text><polygon fill="#FCF3CF" points="269.8086,290.6904,496.0337,290.6904,508.0337,302.6904,496.0337,314.6904,269.8086,314.6904,257.8086,302.6904,269.8086,290.6904" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="226.2251" x="269.8086" y="306.6838">model runtime qualified for accelerator profile?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="40.9761" x="216.8325" y="300.3594">qualified</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="59.3237" x="508.0337" y="300.3594">not qualified</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="278.0996" x="83.6404" y="324.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="258.0996" x="93.6404" y="345.9463">Compute admission score by HBM, KV capacity,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="212.7773" x="93.6404" y="359.7451">collective topology, rail affinity, and SLO</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="322.8242" x="381.74" y="324.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="302.8242" x="391.74" y="345.9463">Exclude from production placement; allow lab profile only</text><polygon fill="#FCF3CF" points="382.9211,378.2881,394.9211,390.2881,382.9211,402.2881,370.9211,390.2881,382.9211,378.2881" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="324.125" x="220.8586" y="470.6125"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="304.125" x="230.8586" y="491.8684">Require explicit HCCL/NCCL/RCCL/oneCCL qualification</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="195.4395" x="230.8586" y="505.6672">with latency and failure drill evidence</text><polygon fill="#FCF3CF" points="290.2805,422.2881,475.5618,422.2881,487.5618,434.2881,475.5618,446.2881,290.2805,446.2881,278.2805,434.2881,290.2805,422.2881" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="29.3423" x="386.9211" y="456.606">mixed</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="185.2813" x="290.2805" y="438.2815">mixed-vendor collective path needed?</text><polygon fill="#FCF3CF" points="382.9211,538.2102,394.9211,550.2102,382.9211,562.2102,370.9211,550.2102,382.9211,538.2102" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="145.8975" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="683.4165" x="53.1477" y="584.2102"/><path d="M129.2922,584.2102 L129.2922,593.3088 L119.2922,603.3088 L53.1477,603.3088" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="56.1477" y="598.342">Placement</text><polygon fill="#FCF3CF" points="249.6213,620.3088,516.2209,620.3088,528.2209,632.3088,516.2209,644.3088,249.6213,644.3088,237.6213,632.3088,249.6213,620.3088" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="266.5996" x="249.6213" y="636.3022">same pod has model, KV, CXL pool, and healthy rails?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="22.623" x="214.9983" y="629.9778">local</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="57.4707" x="528.2209" y="629.9778">remote/cold</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="285.4473" x="73.1477" y="654.3088"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="265.4473" x="83.1477" y="675.5647">Admit to local GPU/xPU set with Coherence lease</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="342.752" x="378.595" y="654.3088"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="322.752" x="388.595" y="675.5647">Prewarm, migrate model, or reject if TTFT/TPOT budget fails</text><polygon fill="#FCF3CF" points="382.9211,694.1077,394.9211,706.1077,382.9211,718.1077,370.9211,706.1077,382.9211,694.1077" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="163.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="324.1094" x="220.8665" y="740.1077"/><path d="M307.135,740.1077 L307.135,749.2063 L297.135,759.2063 L220.8665,759.2063" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="76.2686" x="223.8665" y="754.2395">Governance</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="258.1426" x="253.8499" y="776.2063"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="237.4746" x="263.8499" y="797.4622">Publish only capability class and health state</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="238.1426" x="263.8499" y="811.261">not vendor-specific hidden topology to actors</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="304.1094" x="230.8665" y="843.804"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="284.1094" x="240.8665" y="865.0598">Continuously demote on driver drift, ECC/RAS errors,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="228.7383" x="240.8665" y="878.8586">thermal throttling, rail errors, or DPU failure</text><ellipse cx="382.9211" cy="934.4016" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="382.9211" cy="934.4016" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="164.9941" y2="184.9941"/><polygon fill="#34495E" points="378.9211,174.9941,382.9211,184.9941,386.9211,174.9941,382.9211,178.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="382.9211" x2="382.9211" y1="71.2979" y2="117.3965"/><polygon fill="#34495E" points="378.9211,107.3965,382.9211,117.3965,386.9211,107.3965,382.9211,111.3965" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="257.8086" x2="222.6902" y1="302.6904" y2="302.6904"/><line style="stroke:#34495E;stroke-width:1;" x1="222.6902" x2="222.6902" y1="302.6904" y2="324.6904"/><polygon fill="#34495E" points="218.6902,314.6904,222.6902,324.6904,226.6902,314.6904,222.6902,318.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="508.0337" x2="543.1521" y1="302.6904" y2="302.