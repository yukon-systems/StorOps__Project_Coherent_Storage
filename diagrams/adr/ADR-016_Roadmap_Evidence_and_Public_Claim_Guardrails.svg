<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="972px" preserveAspectRatio="none" style="width:656px;height:972px;background:#FFFFFF;" version="1.1" viewBox="0 0 656 972" width="656px" zoomAndPan="magnify"><title>ADR-016 - Roadmap Evidence and Public Claim Guardrails</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="613.7227" x="20.0242" y="35.6357">ADR-016 - Roadmap Evidence and Public Claim Guardrails</text></g><ellipse cx="342.478" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="227.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="644.771" x="6" y="81.2979"/><path d="M101.6064,81.2979 L101.6064,90.3965 L91.6064,100.3965 L6,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="85.6064" x="9" y="95.4297">Source intake</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="303.5059" x="190.7251" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="251.4902" x="200.7251" y="138.6523">Ingest vendor brief, standard, Linux doc, paper,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="283.5059" x="200.7251" y="152.4512">repo snapshot, benchmark, or partner announcement</text><polygon fill="#FCF3CF" points="264.5273,184.9941,420.4287,184.9941,432.4287,196.9941,420.4287,208.9941,264.5273,208.9941,252.5273,196.9941,264.5273,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="155.9014" x="264.5273" y="200.9875">source is primary and archived?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="30.5723" x="221.9551" y="194.6631">strong</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="25.6792" x="432.4287" y="194.6631">weak</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="318.8105" x="26" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="298.8105" x="36" y="240.25">Grade direct evidence with URL, checksum, date, scope</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="269.4805" x="364.8105" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="249.4805" x="374.8105" y="240.25">Grade as adjacent, inference, negative-control,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="198.0996" x="374.8105" y="254.0488">or unverified; do not promote to claim</text><polygon fill="#FCF3CF" points="342.478,272.5918,354.478,284.5918,342.478,296.5918,330.478,284.5918,342.478,272.5918" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="145.8975" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="623.6055" x="15.1655" y="318.5918"/><path d="M140.3169,318.5918 L140.3169,327.6904 L130.3169,337.6904 L15.1655,337.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="115.1514" x="18.1655" y="332.7236">Claim construction</text><polygon fill="#FCF3CF" points="236.6997,354.6904,448.2563,354.6904,460.2563,366.6904,448.2563,378.6904,236.6997,378.6904,224.6997,366.6904,236.6997,354.6904" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="211.5566" x="236.6997" y="370.6838">claim names a vendor/product/partnership?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="23.2192" x="201.4805" y="364.3594">strict</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="105.7783" x="460.2563" y="364.3594">architecture inference</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="312.8223" x="35.1655" y="388.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="292.8223" x="45.1655" y="409.9463">Require direct source that states that exact relationship</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="250.7832" x="367.9878" y="388.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="230.7832" x="377.9878" y="409.9463">Label recommendation separately from fact</text><polygon fill="#FCF3CF" points="342.478,428.4893,354.478,440.4893,342.478,452.4893,330.478,440.4893,342.478,428.4893" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="145.8975" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="557.5938" x="76.021" y="474.4893"/><path d="M185.6479,474.4893 L185.6479,483.5879 L175.6479,493.5879 L76.021,493.5879" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="99.627" x="79.021" y="488.6211">Publication gate</text><polygon fill="#FCF3CF" points="237.6074,510.5879,447.3486,510.5879,459.3486,522.5879,447.3486,534.5879,237.6074,534.5879,225.6074,522.5879,237.6074,510.5879" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="209.7412" x="237.6074" y="526.5813">evidence grade supports public statement?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="34.8584" x="190.749" y="520.2568">publish</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="20.7969" x="459.3486" y="520.2568">hold</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="224.1172" x="96.021" y="544.5879"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="204.1172" x="106.021" y="565.8438">Include citation, date, and residual risk</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="273.4766" x="340.1382" y="544.5879"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="253.4766" x="350.1382" y="565.8438">Move to research backlog or appendix guardrail</text><polygon fill="#FCF3CF" points="342.478,584.3867,354.478,596.3867,342.478,608.3867,330.478,596.3867,342.478,584.3867" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="296.1484" x="194.4038" y="630.3867"/><path d="M236.314,630.3867 L236.314,639.4854 L226.314,649.4854 L194.4038,649.4854" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="31.9102" x="197.4038" y="644.5186">Audit</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="276.1484" x="204.4038" y="666.4854"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="256.1484" x="214.4038" y="687.7412">Keep relative archive path and extraction status;</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="248.7832" x="214.4038" y="701.54">no host-specific filesystem paths in public docs</text><ellipse cx="342.478" cy="757.083" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="342.478" cy="757.083" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="252.5273" x2="185.4053" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="185.4053" x2="185.4053" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="181.4053,208.9941,185.4053,218.9941,189.4053,208.9941,185.4053,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="432.4287" x2="499.5508" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="499.5508" x2="499.5508" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="495.5508,208.9941,499.5508,218.9941,503.5508,208.9941,499.5508,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="185.4053" x2="185.4053" y1="252.793" y2="284.5918"/><line style="stroke:#34495E;stroke-width:1;" x1="185.4053" x2="330.478" y1="284.5918" y2="284.5918"/><polygon fill="#34495E" points="320.478,280.5918,330.478,284.5918,320.478,288.5918,324.478,284.5918" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="499.5508" x2="499.5508" y1="266.5918" y2="284.5918"/><line style="stroke:#34495E;stroke-width:1;" x1="499.5508" x2="354.478" y1="284.5918" y2="284.5918"/><polygon fill="#34495E" points="364.478,280.5918,354.478,284.5918,364.478,288.5918,360.478,284.5918" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="342.478" x2="342.478" y1="164.9941" y2="184.9941"/><polygon fill="#34495E" points="338.478,174.9941,342.478,184.9941,346.478,174.9941,342.478,178.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="342.478" x2="342.478" y1="71.2979" y2="117.3965"/><polygon fill="#34495E" points="338.4