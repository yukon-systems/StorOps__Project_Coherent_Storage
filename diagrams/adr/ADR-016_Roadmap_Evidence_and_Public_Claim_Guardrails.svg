79,212.0796,534.5879,208.0796,538.5879" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="459.3486" x2="476.8765" y1="522.5879" y2="522.5879"/><line style="stroke:#34495E;stroke-width:1;" x1="476.8765" x2="476.8765" y1="522.5879" y2="544.5879"/><polygon fill="#34495E" points="472.8765,534.5879,476.8765,544.5879,480.8765,534.5879,476.8765,538.5879" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="208.0796" x2="208.0796" y1="578.3867" y2="596.3867"/><line style="stroke:#34495E;stroke-width:1;" x1="208.0796" x2="330.478" y1="596.3867" y2="596.3867"/><polygon fill="#34495E" points="320.478,592.3867,330.478,596.3867,320.478,600.3867,324.478,596.3867" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="476.8765" x2="476.8765" y1="578.3867" y2="596.3867"/><line style="stroke:#34495E;stroke-width:1;" x1="476.8765" x2="354.478" y1="596.3867" y2="596.3867"/><polygon fill="#34495E" points="364.478,592.3867,354.478,596.3867,364.478,600.3867,360.478,596.3867" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="342.478" x2="342.478" y1="452.4893" y2="510.5879"/><polygon fill="#34495E" points="338.478,500.5879,342.478,510.5879,346.478,500.5879,342.478,504.5879" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="342.478" x2="342.478" y1="608.3867" y2="666.4854"/><polygon fill="#34495E" points="338.478,656.4854,342.478,666.4854,346.478,656.4854,342.478,660.4854" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="342.478" x2="342.478" y1="714.083" y2="746.083"/><polygon fill="#34495E" points="338.478,736.083,342.478,746.083,346.478,736.083,342.478,740.083" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="66.6343" y="772.083"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="71.6343" y="790.2148">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="71.6343" y="806.3135">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="71.6343" y="822.4121">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="71.6343" y="838.5107">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="71.6343" y="854.6094">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="71.6343" y="870.708">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="71.6343" y="886.8066">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="79.4136" y="902.9053">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="71.6343" y="919.0039">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="71.6343" y="935.1025">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="79.4136" y="951.2012">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLNRSjis47tNLspJbsI6YgwE8-cX8-kIQkgBwakUCgE1o1K9YmGO09IjTlBlFG1fMsqdBn99O1Txpfwp-CLbN32LkP2gPVTIbSA8Wcmc4lqaLKexaLi-MJ6wKaciZM93lVx9Gi8xKULkgPMx5aWvvqVnjQ8xeUp9hgan-cccSstery5mE3fRd2oAsCc3T4VwkqLq8U9z6avhjY_doyLouLUqITWqNyy-VJex7-3hN8f2g-J_ORFbOBOysN0QVN4-EkjUOF7E2UEQZxtXsNJGnyV5Qv9Hlt_HxxL-d1IhjEEV5BfOZXRd_osqEUf7oqcNCqtdj-rkxnErwLQBf10bBGuoOHKp2PNGkjhcCgOP-bBGbqgOn0YPsrOhvvInRcIQkTQShKpL2_MMTZWeaI95VPOgbREroERF8YKyyvPylyUjDarZfqrdkbwDwVVx-_KT3OS3GlXd_4_efcGrNRLZNPJ2oQslTxs2IYfBCvsnyNMs5POEOULZoyEOBGxzCJtCroZ8EkcNjQBX-QWteSUgs6gwkd-WKRVRdT1wEIEjyYD-w7P-DQNII6saasnzikklLzpMop7Gs5WVs1mxCOHbT9v3TvRDGO8enDxFrfqwNXi737tadgyVsWM31yS9eQyfkv3qddDetPdZc6xkBzUKtgvdD1pqpgFwtVFWtpz7j3OQEpC6tb5trEsCUjrkHEdrrOf6Wy4eP9C5_36cDOBumCfrq1Ws8WyC37gZpg3VzIMY0TBglAuc17KAeKIAMfIZE1SsLFVrSdhjVQZ6PANZjYqvbZjeO3L74mraaUVwYPE8jbKJnfQAoZgoJXnVpnX3U4LQkCxDpKL4EmFQ81ZVwQXcsWkfFJrzmJuBDQ2aJaDyHEw5hAWfEc0sbThRCNtkzZ_s_WItQGfGLPbBV9uqcOD-wxnrUN2A7oWU0iQ9p2iy9Rh0nF4vBwhTZWsIxW-RR5jimX3WoBz2yyNcIPWYlCNF-TkBWMKsm9sYiWY8_zhPZSrr6eKdOUBw8U-7HxrzvDXjOX5do7nWh_rDnYAfFtriWQ7QMAsMzPEW1O_3frw_x-vqPI0sgPpOyxjW-V5AfP0uCga4djaQoJlF8P33gH5TIbKz0oEEBaN99lgc39UQh1AbpRH33-6Wh11c7tdJ-TFyG1LAOOx4GHaJd2DtzDusnrjl4KGS0x-0bO6cvBSFtj4Ass0EbNv04ChxOaG2ZgK1KeYpcIjFqcNqS7iP4J37Urk1oWIIGUMnBjaVo1ZszFw9nVvVcGGKc3oA66L5869N3u285ATX1hGRSm8dq5GAXeLqEPc0Wz3-4dxoyz9fhrnPXBDK8dUOXoTKr-CEoO2cYlstcc_FGuZ362kWUj4mtq7U11ix3O4sa-Kf8p9s3OvR_bv9yyf9GwhBH72FOri_ypFaHuRpCBjykZTM0kKEqLw_hoGq-I_5bdC4OcAYUKaz-Ypxgm9EEdeV5X1_x7w2l9xtTHWuvJVSh-rBGojiLVfH1pNKDqIetklb5NTOi5bJs4h5UOMuMBgG_QNbmQIuFf8A4yj8kty3ckayQQAlC7jzqx2JFNxQuhA3pRneHLbw8C-KlbnFFy4shHBf6kFymLms_29pesBe7yhq5V6