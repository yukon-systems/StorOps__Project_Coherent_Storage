<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1010px" preserveAspectRatio="none" style="width:872px;height:1010px;background:#FFFFFF;" version="1.1" viewBox="0 0 872 1010" width="872px" zoomAndPan="magnify"><title>ADR-015 - CXL Memory Tiering and OpenZFS Interaction</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="592.8506" x="138.2466" y="35.6357">ADR-015 - CXL Memory Tiering and OpenZFS Interaction</text></g><ellipse cx="436.1719" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="226.144" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="860.3438" x="6" y="81.2979"/><path d="M123.3652,81.2979 L123.3652,90.3965 L113.3652,100.3965 L6,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="107.3652" x="9" y="95.4297">Tier classification</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="321.5176" x="275.4131" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="242.7656" x="285.4131" y="138.6523">Classify object as active decode, warm prefix,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="301.5176" x="285.4131" y="152.4512">metadata/index head, durable checkpoint, or bulk artifact</text><polygon fill="#FCF3CF" points="106.6235,184.9941,230.1479,184.9941,242.1479,196.9941,230.1479,208.9941,106.6235,208.9941,94.6235,196.9941,106.6235,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="15.2915" x="172.3857" y="219.312">hot</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="123.5244" x="106.6235" y="200.9875">active per-token decode?</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="304.7715" x="16" y="241.6431"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="284.7715" x="26" y="262.8989">Require HBM/local DRAM; CXL is not the critical path</text><polygon fill="#FCF3CF" points="395.5142,184.9941,572.8354,184.9941,584.8354,196.9941,572.8354,208.9941,395.5142,208.9941,383.5142,196.9941,395.5142,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="26.8877" x="488.1748" y="219.312">warm</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="177.3213" x="395.5142" y="200.9875">warm/reusable and latency tolerant?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="59.9307" x="584.8354" y="194.6631">durable/bulk</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="286.8066" x="340.7715" y="241.6431"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="266.8066" x="350.7715" y="262.8989">Candidate for kv_cxl_warm or vector_head_cache</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="208.7656" x="647.5781" y="238.3186"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="188.7656" x="657.5781" y="259.5745">Route to OpenZFS/object substrate</text><rect fill="#FFFFFF" height="171.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="624.7622" x="114.2839" y="317.4419"/><path d="M218.4353,317.4419 L218.4353,326.5405 L208.4353,336.5405 L114.2839,336.5405" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="94.1514" x="117.2839" y="331.5737">CXL admission</text><polygon fill="#FCF3CF" points="301.3601,353.5405,570.9836,353.5405,582.9836,365.5405,570.9836,377.5405,301.3601,377.5405,289.3601,365.5405,301.3601,353.5405" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="269.6235" x="301.3601" y="369.5339">root-complex, NUMA, switch depth, and RAS qualified?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="40.9761" x="248.384" y="363.2095">qualified</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="26.8984" x="582.9836" y="363.2095">reject</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="290.1523" x="134.2839" y="387.5405"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="182.7773" x="144.2839" y="408.7964">Assign CXL pool ownership epoch</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="270.1523" x="144.2839" y="422.5952">track bandwidth, p99 latency, poison, thermal state</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="252.125" x="466.9211" y="387.5405"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="232.125" x="476.9211" y="408.7964">Do not place latency-sensitive state on CXL</text><ellipse cx="592.9836" cy="466.1382" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="592.9836" cy="466.1382" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="159.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="546.2383" x="167.2158" y="499.1382"/><path d="M300.1738,499.1382 L300.1738,508.2368 L290.1738,518.2368 L167.2158,518.2368" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="122.958" x="170.2158" y="513.27">OpenZFS boundary</text><polygon fill="#FCF3CF" points="345.3789,535.2368,526.9648,535.2368,538.9648,547.2368,526.9648,559.2368,345.3789,559.2368,333.3789,547.2368,345.3789,535.2368" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="181.5859" x="345.3789" y="551.2302">persistence required for correctness?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="316.2612" y="544.9058">yes</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="538.9648" y="544.9058">no</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="234.793" x="187.2158" y="569.2368"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="196.7637" x="197.2158" y="590.4927">Flush to DPU/OpenZFS durable path</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="214.793" x="197.2158" y="604.2915">CXL cannot be the durable ACK by itself</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="251.4453" x="442.0088" y="569.2368"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="231.4453" x="452.0088" y="590.4927">Permit volatile CXL as expansion/cache tier</text><polygon fill="#FCF3CF" points="436.1719,622.8345,448.1719,634.8345,436.1719,646.8345,424.1719,634.8345,436.1719,622.8345" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="264.1211" x="304.1113" y="668.8345"/><path d="M376.3457,668.8345 L376.3457,677.9331 L366.3457,687.9331 L304.1113,687.9331" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="62.2344" x="307.1113" y="682.9663">Telemetry</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="244.1211" x="314.1113" y="704.9331"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="224.1211" x="324.1113" y="726.189">Expose CXL pool pressure and error state</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="176.1152" x="324.1113" y="739.9878">to Coherence and scheduler only</text><ellipse cx="436.1719" cy="795.5308" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="436.1719" cy="795.5308" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="168.3857" x2="168.3857" y1="208.9941" y2="241.6431"/><polygon fill="#34495E" points="164.3857,231.6431,168.3857,241.6431,172.3857,231.6431,168.3857,235.6431" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="168.3857" x2="168.3857" y1="275.4419" y2="295.4419"/><polygon fill="#34495E" points="164.3857,285.4419,168.3857,295.4419,172.3857,285.4419,168.3857,289.4419" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="484.1748" x2="484.1748" y1="208.9941" y2="241.6431"/><polygon fill="#34495E" points="480.1748,231.6431,484.1748,241.6431,488.1748,231.6431,484.1748,235.6431" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="484.1748" x2="484.1748" y1="275.4419" y2="295.4419"/><polygon fill="#34495E" points="480.1748,285.4419