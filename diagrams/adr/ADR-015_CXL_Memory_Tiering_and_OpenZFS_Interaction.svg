roke:#34495E;stroke-width:1;" x1="289.3601" x2="279.3601" y1="365.5405" y2="365.5405"/><line style="stroke:#34495E;stroke-width:1;" x1="279.3601" x2="279.3601" y1="365.5405" y2="387.5405"/><polygon fill="#34495E" points="275.3601,377.5405,279.3601,387.5405,283.3601,377.5405,279.3601,381.5405" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="582.9836" x2="592.9836" y1="365.5405" y2="365.5405"/><line style="stroke:#34495E;stroke-width:1;" x1="592.9836" x2="592.9836" y1="365.5405" y2="387.5405"/><polygon fill="#34495E" points="588.9836,377.5405,592.9836,387.5405,596.9836,377.5405,592.9836,381.5405" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="279.3601" x2="279.3601" y1="435.1382" y2="482.1382"/><line style="stroke:#34495E;stroke-width:1;" x1="279.3601" x2="436.1719" y1="482.1382" y2="482.1382"/><line style="stroke:#34495E;stroke-width:1;" x1="436.1719" x2="436.1719" y1="482.1382" y2="535.2368"/><polygon fill="#34495E" points="432.1719,525.2368,436.1719,535.2368,440.1719,525.2368,436.1719,529.2368" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="436.1719" x2="436.1719" y1="295.4419" y2="353.5405"/><polygon fill="#34495E" points="432.1719,343.5405,436.1719,353.5405,440.1719,343.5405,436.1719,347.5405" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="333.3789" x2="304.6123" y1="547.2368" y2="547.2368"/><line style="stroke:#34495E;stroke-width:1;" x1="304.6123" x2="304.6123" y1="547.2368" y2="569.2368"/><polygon fill="#34495E" points="300.6123,559.2368,304.6123,569.2368,308.6123,559.2368,304.6123,563.2368" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="538.9648" x2="567.7314" y1="547.2368" y2="547.2368"/><line style="stroke:#34495E;stroke-width:1;" x1="567.7314" x2="567.7314" y1="547.2368" y2="569.2368"/><polygon fill="#34495E" points="563.7314,559.2368,567.7314,569.2368,571.7314,559.2368,567.7314,563.2368" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="304.6123" x2="304.6123" y1="616.8345" y2="634.8345"/><line style="stroke:#34495E;stroke-width:1;" x1="304.6123" x2="424.1719" y1="634.8345" y2="634.8345"/><polygon fill="#34495E" points="414.1719,630.8345,424.1719,634.8345,414.1719,638.8345,418.1719,634.8345" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="567.7314" x2="567.7314" y1="603.0356" y2="634.8345"/><line style="stroke:#34495E;stroke-width:1;" x1="567.7314" x2="448.1719" y1="634.8345" y2="634.8345"/><polygon fill="#34495E" points="458.1719,630.8345,448.1719,634.8345,458.1719,638.8345,454.1719,634.8345" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="436.1719" x2="436.1719" y1="646.8345" y2="704.9331"/><polygon fill="#34495E" points="432.1719,694.9331,436.1719,704.9331,440.1719,694.9331,436.1719,698.9331" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="436.1719" x2="436.1719" y1="752.5308" y2="784.5308"/><polygon fill="#34495E" points="432.1719,774.5308,436.1719,784.5308,440.1719,774.5308,436.1719,778.5308" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="282.207" y="810.5308"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="287.207" y="828.6626">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="287.207" y="844.7612">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="287.207" y="860.8599">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="287.207" y="876.9585">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="287.207" y="893.0571">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="287.207" y="909.1558">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="287.207" y="925.2544">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="294.9863" y="941.353">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="287.207" y="957.4517">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="287.207" y="973.5503">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="294.9863" y="989.6489">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLRRRjj647tNLqpJbmIWGjqSXz93eIjYrB9LMGwA8e2m8aVaHkGkixkKh1RvzywiA5becXURUvcPCsVEpEeNbs61KEP2geRTILKA8mgmcKZqGQeKjYAtU7LYTAMIM1k51jgTguC4jwBAtKmhzo38vGI_YiyLF0bbhsuDZT67iSwrWL-xlLvqCxq