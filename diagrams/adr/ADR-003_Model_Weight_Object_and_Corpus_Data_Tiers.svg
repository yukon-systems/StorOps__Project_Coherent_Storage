oCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="186.5078" y="1016.9526">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="186.5078" y="1033.0513">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="186.5078" y="1049.1499">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="186.5078" y="1065.2485">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="194.2871" y="1081.3472">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="186.5078" y="1097.4458">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="186.5078" y="1113.5444">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="194.2871" y="1129.6431">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLRRSjis47tNLspJbsGYXRhOiIK_T6HTMazyKULBPpgUqK3aKa940Ye0obKw-VSUWAIikfCNYxWjpkwUS-2Vt9fpfcqcf6hOZLHROKHETYqI_IBLYbAHMJvQCRfGIQoDOaETxj52mgaeCZVLojqAX1ppL_5KqBr