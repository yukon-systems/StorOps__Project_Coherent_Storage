<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1157px" preserveAspectRatio="none" style="width:641px;height:1157px;background:#FFFFFF;" version="1.1" viewBox="0 0 641 1157" width="641px" zoomAndPan="magnify"><title>ADR-001 - Inference SLO Contract and Storage Admission</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="608.7813" x="15" y="35.6357">ADR-001 - Inference SLO Contract and Storage Admission</text></g><ellipse cx="314.8821" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="177.0928" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="248.8105" x="190.4768" y="81.2979"/><path d="M295.4211,81.2979 L295.4211,90.3965 L285.4211,100.3965 L190.4768,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="94.9443" x="193.4768" y="95.4297">Actor boundary</text><rect fill="#FDFEFE" height="61.3965" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="201.4238" x="214.1702" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="171.416" x="224.1702" y="138.6523">Client submits inference request</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="168.7441" x="224.1702" y="152.4512">OpenAI-compatible HTTPS 443</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="181.4238" x="224.1702" y="166.25">or Coherence-native HTTPS 8443</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="228.8105" x="200.4768" y="198.793"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="208.8105" x="210.4768" y="220.0488">Attach tenant_id, model_id, adapter_id,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="189.4219" x="210.4768" y="233.8477">slo_class, privacy_domain, trace_id</text><rect fill="#FFFFFF" height="303.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="561.8447" x="27.803" y="268.3906"/><path d="M170.0852,268.3906 L170.0852,277.4893 L160.0852,287.4893 L27.803,287.4893" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="132.2822" x="30.803" y="282.5225">Coherence-CE policy</text><polygon fill="#FCF3CF" points="226.2161,304.4893,403.5481,304.4893,415.5481,316.4893,403.5481,328.4893,226.2161,328.4893,214.2161,316.4893,226.2161,304.4893" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="177.332" x="226.2161" y="320.4827">SLO class declared and authorized?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="197.0984" y="314.1582">yes</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="415.5481" y="314.1582">no</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="258.1309" x="64.429" y="338.4893"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="151.3652" x="74.429" y="359.7451">Map request to TTFT/TPOT,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="238.1309" x="74.429" y="373.5439">KV residency, retrieval, and durability budget</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="187.4199" x="342.5598" y="338.4893"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="167.4199" x="352.5598" y="359.7451">Use conservative default profile</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="160.7461" x="352.5598" y="373.5439">or reject policy-unsafe request</text><polygon fill="#FCF3CF" points="314.8821,392.0869,326.8821,404.0869,314.8821,416.0869,302.8821,404.0869,314.8821,392.0869" style="stroke:#B7950B;stroke-width:1;"/><polygon fill="#FCF3CF" points="200.843,436.0869,428.9211,436.0869,440.9211,448.0869,428.9211,460.0869,200.843,460.0869,188.843,448.0869,200.843,436.0869" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="228.0781" x="200.843" y="452.0803">Hot path requires storage knowledge by actor?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="171.7253" y="445.7559">yes</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="440.9211" y="445.7559">no</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="262.0801" x="47.803" y="470.0869"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="178.752" x="57.803" y="491.3428">Reject contract: actors never bind</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="242.0801" x="57.803" y="505.1416">to OpenZFS, DPU, RoCEv2, CXL, or UA-Link</text><ellipse cx="178.843" cy="548.6846" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="178.843" cy="548.6846" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="237.4531" x="332.1946" y="470.0869"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="217.4531" x="342.1946" y="491.3428">Keep lower layers behind Coherence-CE</text><rect fill="#FFFFFF" height="159.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="576.1543" x="37.824" y="581.6846"/><path d="M176.2234,581.6846 L176.2234,590.7832 L166.2234,600.7832 L37.824,600.7832" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="40.824" y="595.8164">Resource placement</text><polygon fill="#FCF3CF" points="226.8311,617.7832,402.9331,617.7832,414.9331,629.7832,402.9331,641.7832,226.8311,641.7832,214.8311,629.7832,226.8311,617.7832" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="176.1021" x="226.8311" y="633.7766">kv_hbm_active and model resident?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="15.2915" x="199.5396" y="627.4521">hot</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="50.123" x="414.9331" y="627.4521">warm/cold</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="232.0391" x="57.824" y="651.7832"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="161.4141" x="67.824" y="673.0391">Admit to local accelerator path</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="212.0391" x="67.824" y="686.8379">HBM/DRAM, same NUMA/root complex</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="292.1152" x="309.863" y="651.7832"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="225.4043" x="319.863" y="673.0391">Plan warm hydration from kv_dram_warm,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="272.1152" x="319.863" y="686.8379">kv_cxl_warm, object_cache, or OpenZFS substrate</text><polygon fill="#FCF3CF" points="314.8821,705.3809,326.8821,717.3809,314.8821,729.3809,302.8821,717.3809,314.8821,705.3809" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="159.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="535.9199" x="43.6599" y="751.3809"/><path d="M175.825,751.3809 L175.825,760.4795 L165.825,770.4795 L43.6599,770.4795" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="122.165" x="46.6599" y="765.5127">Admission outcome</text><polygon fill="#FCF3CF" points="233.8645,787.4795,395.8997,787.4795,407.8997,799.4795,395.8997,811.4795,233.8645,811.4795,221.8645,799.4795,233.8645,787.4795" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="162.0352" x="233.8645" y="803.4729">all budgets have fresh telemetry?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="81.2915" x="140.573" y="797.1484">GREEN/AMBER</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="60.5054" x="407.8997" y="797.1484">RED/DRAIN</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="244.4844" x="63.6599" y="821.4795"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="224.4844" x="73.6599" y="842.7354">Return admission lease + deadline budget</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="182.7773" x="73.6599" y="856.5342">without leaking topology identifiers</text><rect fill="#FD