;stroke-width:1;" width="577.1367" x="30.8223" y="957.0771"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="35.8223" y="975.209">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="35.8223" y="991.3076">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="35.8223" y="1007.4063">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="35.8223" y="1023.5049">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="35.8223" y="1039.6035">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="35.8223" y="1055.7021">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="35.8223" y="1071.8008">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="43.6016" y="1087.8994">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="35.8223" y="1103.998">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="35.8223" y="1120.0967">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="43.6016" y="1136.1953">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLRRSjis57pNLvocBycKYcvs7CaF7LqJJInRbMLFf-CP3KH2968GK05GZjB9ltS1qf9SDoyISJiuP_Viah-uZEUSjf89LREFGcsPOJdPZ2NwIQYKDanQVh9YTA6IM1l53RNQ9mi9tx12kebMxfeXv8X_PVS5tJ9bJtRrZT5FGosreLyxPsVTy_798ekTs0ctftzgH0CMFwRXjchxP3GPJyP-HPk4cshs_CE7yuiEPaU2vLebhuyD9vtXv6J3wUd1HVUyES3YhMF6LPEji_D-fut9yI58jzqUj5kr7oV9AktuJn8TJxhZY_ycMbtre-Q4avpweqMzsMnHdQPgmmrNCQVRgniQ0Zy388Yf15bfmr9iJd9XhT2gLfCyvLWn8irSRSIjIDKpz9Osk2WHB4L-bWebkRM8u-yYnJpobZpVlLgT-Z5YD_hpQOy-BvVpMpexwn2EVyJ_9TrikUfFwx7Ejyo9jSztFaMN51O9PcMwTOMbNLXvZu0BFHplsZsw6ysHa7N2Bsj5PnVTrYLzBVArfjdoZhhDPlEIvfCXQINt-A75QDQdhH7Q22UuzS6kxsUyhYSzL6DZlUDctuWzC5fAz9tbPYU05yukX_D6ULuRXnhQY3sQtzLp3XmSJmYyfjo5e4ikqUlEx7jqixoQKxgO3-ciqxg8oh77mOy_HZGt6ZipZdgxpMwpqMqrcn6brxCfTJkTReWcSkYZHtCSuZkkN0F4SCDaGA3JwZOwxQPF4GG8gsMPJJZKo9a2hJaEKIoP3TdTN_MllGvLZwnml6wtF1OR4TDq118D9oQbVk99HEkYEiOjvOLrP1tR7-xeeV7oD7UDcvj1H1i3sD0mdkceHDem8Ulzqm7ssRBJ6XNm4RbdiA8gwL2pATIZxT77PljzwmzWcwOegjXAWUdBAdBet39kcHwKuWt5bm0x4RB0Kw9pE8wFEIWsw7y4VTojidM-2YR08pzCqCUh9sRoC8g_oUF093bReUuKcKMe-Fl6hgpKQHIUc8dB1zaEZthzbSTk5RCuG-GTzxs_oZXBogdtDI1K2gjMizu9Qj0uTEhxzqrG2gszm9dPlmcQxmsbyEpPOfqB24ySD6putmMw_q6zbj11PmyA0L_fg5mE-lCtz9r3Rk11CULM0hpdEk4oFB64RHqt_lb1eUnLQ8V8YsZ7ulsgH1VCmKauTbt2TaugEbuz74CuKiHLMM93Rxq9XN1GCVuD2FQ4ii9b4EXtdlp-pfk8ehTxRj_X47ATiUrpuUGqBPUJPMCvlraYko_tMB4YmNLe9OEE4dp7P1I29eLXQo6zvQ-B13hrbNEySEYjqbNiEuoWVQ_v4gVAxL2itWZ90vY6UuAhMkg5icnpe2B4L8dOL0L-HZk2aYoi2oJttFpqgFIJvCY3rdl_CjBcVsfTb5V5bK_toesM54m0RI9Kyg20WQV_hybjvDqegimnek6VLv5tsRj-_GgQkGmXSVtsTTrVED-ILxmXoVPG2ArvXkXqojwnjXS4BxZLXOd3UpqEFdFazuNC0WkXhvvPSeUIC-sgLFph9n0hTGn_Ot4CSp