<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1271px" preserveAspectRatio="none" style="width:600px;height:1271px;background:#FFFFFF;" version="1.1" viewBox="0 0 600 1271" width="600px" zoomAndPan="magnify"><title>ADR-020 - CXL Memory Pools for Pod-Scale Systems</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="556.2627" x="20.437" y="35.6357">ADR-020 - CXL Memory Pools for Pod-Scale Systems</text></g><ellipse cx="300.2242" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="271.3936" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="389.4902" x="111.4791" y="81.2979"/><path d="M212.5201,81.2979 L212.5201,90.3965 L202.5201,100.3965 L111.4791,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="91.041" x="114.4791" y="95.4297">Pool discovery</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="296.7734" x="151.8375" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="276.7734" x="161.8375" y="138.6523">Discover CXL type, capacity, switch/fabric manager,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="266.7891" x="161.8375" y="152.4512">root-complex distance, RAS, poison, thermal state</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="337.4902" x="131.4791" y="234.6165"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="317.4902" x="141.4791" y="255.8723">Reject latency-sensitive placement; require explicit topology</text><ellipse cx="300.2242" cy="307.6914" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="300.2242" cy="307.6914" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><polygon fill="#FCF3CF" points="208.1906,184.9941,392.2579,184.9941,404.2579,197.6431,392.2579,210.292,208.1906,210.292,196.1906,197.6431,208.1906,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="26.8984" x="304.2242" y="220.6099">reject</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="180.9897" x="208.1906" y="195.312">device is behind hidden switch layers</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="184.0674" x="208.1906" y="207.9609">or auto-bifurcated unknown topology?</text><rect fill="#FFFFFF" height="227.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="543.4136" x="22.1688" y="362.6914"/><path d="M189.3749,362.6914 L189.3749,371.79 L179.3749,381.79 L22.1688,381.79" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="157.2061" x="25.1688" y="376.8232">Ownership and allocation</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="254.1465" x="173.151" y="398.79"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="234.1465" x="183.151" y="420.0459">CXL pool manager grants ownership_epoch</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="212.1152" x="183.151" y="433.8447">to Coherence-CE, not to inference actor</text><polygon fill="#FCF3CF" points="185.8925,466.3877,414.556,466.3877,426.556,478.3877,414.556,490.3877,185.8925,490.3877,173.8925,478.3877,185.8925,466.3877" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="228.6636" x="185.8925" y="482.3811">pool is same pod/root-complex as target GPU?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="44.6338" x="129.2587" y="476.0566">preferred</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="34.2354" x="426.556" y="476.0566">remote</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="243.4473" x="42.1688" y="500.3877"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="223.4473" x="52.1688" y="521.6436">Allocate kv_cxl_warm/vector_head_cache</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="178.0781" x="52.1688" y="535.4424">with NUMA-aware latency budget</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="218.0527" x="327.5297" y="500.3877"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="198.0527" x="337.5297" y="521.6436">Use only for lower-priority warm state</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="152.0859" x="337.5297" y="535.4424">or reject for SLO-bound path</text><polygon fill="#FCF3CF" points="300.2242,553.9854,312.2242,565.9854,300.2242,577.9854,288.2242,565.9854,300.2242,553.9854" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="255.6184" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="372.1035" x="114.1725" y="599.9854"/><path d="M182.5309,599.9854 L182.5309,609.084 L172.5309,619.084 L114.1725,619.084" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="58.3584" x="117.1725" y="614.1172">Data flow</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="352.1035" x="124.1725" y="636.084"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="332.1035" x="134.1725" y="657.3398">Coherence moves warm KV: kv_dram_warm &lt;-&gt; kv_cxl_warm</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="237.4688" x="134.1725" y="671.1387">then hydrates kv_hbm_active when admitted</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="285.4355" x="157.5065" y="752.0061"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="265.4355" x="167.5065" y="773.262">Flush to DPU/OpenZFS; CXL pool is capacity tier,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="151.4297" x="167.5065" y="787.0608">not the durable storage ACK</text><polygon fill="#FCF3CF" points="210.0436,703.6816,390.4049,703.6816,402.4049,715.6816,390.4049,727.6816,210.0436,727.6816,198.0436,715.6816,210.0436,703.6816" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="36.6953" x="304.2242" y="737.9995">durable</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="180.3613" x="210.0436" y="719.675">durability class requires persistence?</text><polygon fill="#FCF3CF" points="300.2242,819.6038,312.2242,831.6038,300.2242,843.6038,288.2242,831.6038,300.2242,819.6038" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="159.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="579.7991" x="10.1688" y="865.6038"/><path d="M94.0995,865.6038 L94.0995,874.7024 L84.0995,884.7024 L10.1688,884.7024" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="13.1688" y="879.7356">Failure gate</text><polygon fill="#FCF3CF" points="178.5529,901.7024,421.8956,901.7024,433.8956,913.7024,421.8956,925.7024,178.5529,925.7024,166.5529,913.7024,178.5529,901.7024" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="243.3428" x="178.5529" y="917.6958">poison, link flap, fabric-manager loss, or p99 drift?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="40.3691" x="126.1837" y="911.3713">degrade</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="35.4707" x="433.8956" y="911.3713">healthy</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="262.8125" x="25.1466" y="935.7024"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="242.8125" x="35.1466" y="956.9583">Fence ownership_epoch, copy out if possible,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="168.0352" x="35.1466" y="970.7571">mark pool AMBER/RED/DRAIN</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="268.1445" x="309.8234" y="935.7024"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="248.1445" x="319.8234" y="956.9583">Expose pool pressure and locality to scheduler</text><polygon fill="#FCF3CF" points="300.2242,989.3,312.2242,1001.3,300.2242,1013.3,288.2242,1001.3,300.2242,989.3" style="stroke:#B7950B;stroke-width:1;"/><ellipse cx="300.2242" cy="1056.3" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="300.2242" cy="1056.3" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;