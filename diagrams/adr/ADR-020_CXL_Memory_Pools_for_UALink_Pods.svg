"969.5012" y2="1001.3"/><line style="stroke:#34495E;stroke-width:1;" x1="443.8956" x2="312.2242" y1="1001.3" y2="1001.3"/><polygon fill="#34495E" points="322.2242,997.3,312.2242,1001.3,322.2242,1005.3,318.2242,1001.3" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="300.2242" x2="300.2242" y1="843.6038" y2="901.7024"/><polygon fill="#34495E" points="296.2242,891.7024,300.2242,901.7024,304.2242,891.7024,300.2242,895.7024" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="300.2242" x2="300.2242" y1="1013.3" y2="1045.3"/><polygon fill="#34495E" points="296.2242,1035.3,300.2242,1045.3,304.2242,1035.3,300.2242,1039.3" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="10" y="1071.3"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="15" y="1089.4319">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="15" y="1105.5305">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="15" y="1121.6292">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="15" y="1137.7278">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="15" y="1153.8264">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="15" y="1169.925">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="15" y="1186.0237">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="22.7793" y="1202.1223">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="15" y="1218.2209">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="15" y="1234.3196">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="22.7793" y="1250.4182">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLLhRzis5FtkNt7NVUa0gV8ZQMfxsE3uiGNDmxEJO1W26BH4IsmaKYCfEzxG_xv3IdRSTlrYYw_BUyyzv_07c_62Kvap8LlcMSYIQLQGoLYYTaAcj66vuIShMbKoYPMMN5EdUxAGy0shSZjJqjuoX9pmJ-oneYMJvcJNI6kr6wjSQVgnTtRMFv-UBBBOYgsmU_gtHNJ9ukVKtzPidqrcqzdKhIYTSDtCdhz_VtxHm-n4i4B9vDjZurblF3lPS7hwyg9_thx4uj8oRPl9pjdvgDV5vFGOfD_jNdOxhSydoKfb-NSIdSxwqukl4ssk-joomkQSHfD5sEwsAQJndzTqmmkbzpHNAZUqmVQvIi9bpB1nkJUM5wRLoddAPK9Qf9bjJRWHgJo0Nfz914kHcQ5AvjmOOjBTGf8vp0svJWzQ8OrYgtGqcbyDwFVx-_cIpivwXECVy3-akvBBqLKOgw9aLgnTflChyACoD5OPrrp6F9HOslgLTmYuKEFfjZkWXyaS2HahtBAIT7RHxmpfKrMi5TtSFr2_tMuFQJuRavBv7Z-qcDoCgDH2QM45DoxOxUCD3zLiW6fChBPSxwCObD8gpy4um_LMnDoTlH_Fe_gyqXOrT15xCdy82muSB4y87KsvzK7lUGwMMxqVqDtzzPpInNnCPxtEHL2F7Gvk_26WkLROcN7Kss_tsr6_qsu7bDxUN56_r-lxQAA0CWOqno6-vT96Q0pNBFS8z3hzg8V68aKqG1YLrzduG