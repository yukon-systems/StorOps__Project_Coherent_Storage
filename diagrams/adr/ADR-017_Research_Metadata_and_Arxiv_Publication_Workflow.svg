<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1149px" preserveAspectRatio="none" style="width:679px;height:1149px;background:#FFFFFF;" version="1.1" viewBox="0 0 679 1149" width="679px" zoomAndPan="magnify"><title>ADR-017 - Research Metadata and arXiv Publication Workflow</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="646.7119" x="15" y="35.6357">ADR-017 - Research Metadata and arXiv Publication Workflow</text></g><ellipse cx="347.0249" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="227.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="583.582" x="48.0649" y="81.2979"/><path d="M186.478,81.2979 L186.478,90.3965 L176.478,100.3965 L48.0649,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="51.0649" y="95.4297">Metadata acquisition</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="256.7891" x="218.6304" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="196.7578" x="228.6304" y="138.6523">Query arXiv API or S3 bulk metadata</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="236.7891" x="228.6304" y="152.4512">with requester-pays credentials outside docs</text><polygon fill="#FCF3CF" points="262.0354,184.9941,432.0144,184.9941,444.0144,196.9941,432.0144,208.9941,262.0354,208.9941,250.0354,196.9941,262.0354,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="169.979" x="262.0354" y="200.9875">rate limit or credential unavailable?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="37.2969" x="212.7385" y="194.6631">fallback</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="39.7354" x="444.0144" y="194.6631">success</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="284.1289" x="60.0649" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="264.1289" x="70.0649" y="240.25">Record failure mode and use local archived PDFs</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="150.0879" x="70.0649" y="254.0488">without fabricating metadata</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="255.4531" x="364.1938" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="204.75" x="374.1938" y="240.25">Store title, authors, DOI/arXiv ID, date,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="235.4531" x="374.1938" y="254.0488">license, checksum, and relative archive path</text><polygon fill="#FCF3CF" points="347.0249,272.5918,359.0249,284.5918,347.0249,296.5918,335.0249,284.5918,347.0249,272.5918" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="255.6184" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="252.415" x="226.6509" y="318.5918"/><path d="M353.3745,318.5918 L353.3745,327.6904 L343.3745,337.6904 L226.6509,337.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="116.7236" x="229.6509" y="332.7236">Corpus processing</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="220.748" x="236.6509" y="354.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="200.748" x="246.6509" y="375.9463">Extract PDF text to processing cache;</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="180.7676" x="246.6509" y="389.7451">chunk, embed, and index for RAG</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="200.082" x="246.9839" y="470.6125"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="180.082" x="256.9839" y="491.8684">Record filename and parser error;</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="99.3809" x="256.9839" y="505.6672">do not silently omit</text><polygon fill="#FCF3CF" points="298.4192,422.2881,395.6306,422.2881,407.6306,434.2881,395.6306,446.2881,298.4192,446.2881,286.4192,434.2881,298.4192,422.2881" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="29.96" x="351.0249" y="456.606">failure</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="97.2114" x="298.4192" y="438.2815">text extraction fails?</text><polygon fill="#FCF3CF" points="347.0249,538.2102,359.0249,550.2102,347.0249,562.2102,335.0249,550.2102,347.0249,538.2102" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="213.4951" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="428.1953" x="137.2632" y="584.2102"/><path d="M272.5728,584.2102 L272.5728,593.3088 L262.5728,603.3088 L137.2632,603.3088" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="125.3096" x="140.2632" y="598.342">Publication package</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="262.7832" x="215.6333" y="620.3088"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="242.7832" x="225.6333" y="641.5647">Generate Markdown, LaTeX, BibTeX, figures,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="195.4219" x="225.6333" y="655.3635">and source archive with relative links</text><polygon fill="#FCF3CF" points="301.1692,687.9065,392.8806,687.9065,404.8806,699.9065,392.8806,711.9065,301.1692,711.9065,289.1692,699.9065,301.1692,687.9065" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="91.7114" x="301.1692" y="703.8999">TeX builds locally?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="23.2407" x="265.9285" y="697.5754">build</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="59.3237" x="404.8806" y="697.5754">no toolchain</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="175.4258" x="157.2632" y="721.9065"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="155.4258" x="167.2632" y="743.1624">Attach PDF and log evidence</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="192.7695" x="352.689" y="721.9065"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="172.7695" x="362.689" y="743.1624">Record not-tested TeX build gap</text><polygon fill="#FCF3CF" points="347.0249,761.7053,359.0249,773.7053,347.0249,785.7053,335.0249,773.7053,347.0249,761.7053" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="266.7871" x="213.6313" y="807.7053"/><path d="M269.5347,807.7053 L269.5347,816.804 L259.5347,826.804 L213.6313,826.804" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="45.9033" x="216.6313" y="821.8372">Review</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="246.7871" x="223.6313" y="843.804"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="226.7871" x="233.6313" y="865.0598">Run citation, path, and claim-grade checks</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="143.4082" x="233.6313" y="878.8586">before external submission</text><ellipse cx="347.0249" cy="934.4016" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="347.0249" cy="934.4016" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="250.0354" x2="202.1294" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="202.1294" x2="202.1294" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="198.1294,208.9941,202.1294,218.9941,206.1294,208.9941,202.1294,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="444.0144" x2="491.9204" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="491.9204" x2="491.9204" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="487.9204,208.9941,491.9204,218.9941,495.9204,208.9941,491.9204,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="202.1294" x2="202.1294" y1="266.5918" y2="284.5918"/><line style="stroke:#34495E;stroke-width:1;" x1="202.1294" x2="335.0249" y1="284.5918" y2="284.5918"/><polygon fill="#34495E" points="325.0249,280.5918,335.0249,284.5918,325.0249,288.5918,329.0249,284