34495E;stroke-width:1;" x1="347.0249" x2="347.0249" y1="402.2881" y2="422.2881"/><polygon fill="#34495E" points="343.0249,412.2881,347.0249,422.2881,351.0249,412.2881,347.0249,416.2881" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="347.0249" x2="347.0249" y1="296.5918" y2="354.6904"/><polygon fill="#34495E" points="343.0249,344.6904,347.0249,354.6904,351.0249,344.6904,347.0249,348.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="289.1692" x2="244.9761" y1="699.9065" y2="699.9065"/><line style="stroke:#34495E;stroke-width:1;" x1="244.9761" x2="244.9761" y1="699.9065" y2="721.9065"/><polygon fill="#34495E" points="240.9761,711.9065,244.9761,721.9065,248.9761,711.9065,244.9761,715.9065" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="404.8806" x2="449.0737" y1="699.9065" y2="699.9065"/><line style="stroke:#34495E;stroke-width:1;" x1="449.0737" x2="449.0737" y1="699.9065" y2="721.9065"/><polygon fill="#34495E" points="445.0737,711.9065,449.0737,721.9065,453.0737,711.9065,449.0737,715.9065" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="244.9761" x2="244.9761" y1="755.7053" y2="773.7053"/><line style="stroke:#34495E;stroke-width:1;" x1="244.9761" x2="335.0249" y1="773.7053" y2="773.7053"/><polygon fill="#34495E" points="325.0249,769.7053,335.0249,773.7053,325.0249,777.7053,329.0249,773.7053" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="449.0737" x2="449.0737" y1="755.7053" y2="773.7053"/><line style="stroke:#34495E;stroke-width:1;" x1="449.0737" x2="359.0249" y1="773.7053" y2="773.7053"/><polygon fill="#34495E" points="369.0249,769.7053,359.0249,773.7053,369.0249,777.7053,365.0249,773.7053" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="347.0249" x2="347.0249" y1="667.9065" y2="687.9065"/><polygon fill="#34495E" points="343.0249,677.9065,347.0249,687.9065,351.0249,677.9065,347.0249,681.9065" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="347.0249" x2="347.0249" y1="562.2102" y2="620.3088"/><polygon fill="#34495E" points="343.0249,610.3088,347.0249,620.3088,351.0249,610.3088,347.0249,614.3088" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="347.0249" x2="347.0249" y1="785.7053" y2="843.804"/><polygon fill="#34495E" points="343.0249,833.804,347.0249,843.804,351.0249,833.804,347.0249,837.804" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="347.0249" x2="347.0249" y1="891.4016" y2="923.4016"/><polygon fill="#34495E" points="343.0249,913.4016,347.0249,923.4016,351.0249,913.4016,347.0249,917.4016" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="49.7876" y="949.4016"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="54.7876" y="967.5334">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="54.7876" y="983.6321">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="54.7876" y="999.7307">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="54.7876" y="1015.8293">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="54.7876" y="1031.928">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="54.7876" y="1048.0266">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="54.7876" y="1064.1252">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="62.5669" y="1080.2239">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="54.7876" y="1096.3225">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="54.7876" y="1112.4211">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="62.5669" y="1128.5198">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLLDSzis4BthLspJIp93HLzs7Cc7ZgoFr3EnhSXEceDdF12ueX21W0A0ijrE_diVGDfMqyb58W7iuktRju-_XGsNJ3ijb6dvhJ8xuKH9VYDoUwzCGMkXFH_iE5kPN5fds56lVx2HyrfKEioj2PS2AQVyJNofw5eOVt1gx9ozdrXj7Vq-E3eQ7iyEDeKCQg_28_tJ8ZeJSbkasvhZy-byDf_57UjoTitgyRjtnoS3h4wLAAt9_nyscGycyuC3Xz5d9yFZxXashuDmeLdi7HsF1tqipfwJ3FlzitwlzUC0hB61Vm5qDX_EJdu6sbprenLKq4pZwRBTxPrGcvRiMJYveGiE8XT1a30v2VTLxMbHhRII8YXhw2_hjcjjxrijpGNZY5F59hIcx5LXdkZtjCPbkH85C7ggZ6RlaJ3UHqP4zZt5dezQRHhBO5rdl3WVqPytDujhEZeQ4CBVu_-KhdPinkTjQSiT0AmYviKvb59vcjWDEpQIsmPR-xJp5WcNTZBRzqVqURe081-KgQ4VdGnxf_IjAbUMBcu-qx3RxPxIOZuXQ_GZVcWvlHZJpYdhL53iOxBBBnVSjlCHgl7Ixjaz