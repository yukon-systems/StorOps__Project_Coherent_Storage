<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1121px" preserveAspectRatio="none" style="width:658px;height:1121px;background:#FFFFFF;" version="1.1" viewBox="0 0 658 1121" width="658px" zoomAndPan="magnify"><title>ADR-018 - UA-Link Pod-Scale Fabric and Compute Domains</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="625.8721" x="15" y="35.6357">ADR-018 - UA-Link Pod-Scale Fabric and Compute Domains</text></g><ellipse cx="339.965" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="213.4951" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="601.6733" x="9.9423" y="81.2979"/><path d="M101.6727,81.2979 L101.6727,90.3965 L91.6727,100.3965 L9.9423,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="81.7305" x="12.9423" y="95.4297">Pod topology</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="282.0605" x="198.9347" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="250.1133" x="208.9347" y="138.6523">Inventory accelerator nodes, UA-Link switches,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="262.0605" x="208.9347" y="152.4512">PCIe root complexes, GPU memory, NICs, DPUs</text><polygon fill="#FCF3CF" points="210.0302,184.9941,469.8998,184.9941,481.8998,196.9941,469.8998,208.9941,210.0302,208.9941,198.0302,196.9941,210.0302,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="259.8696" x="210.0302" y="200.9875">compute domain has mixed unqualified accelerators?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="33.0269" x="165.0033" y="194.6631">unsafe</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="40.9761" x="481.8998" y="194.6631">qualified</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="332.1758" x="21.9423" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="312.1758" x="31.9423" y="240.25">Separate into capability pools until collective profile passes</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="199.4316" x="392.184" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="179.4316" x="402.184" y="240.25">Create pod-local scale-up domain</text><polygon fill="#FCF3CF" points="339.965,258.793,351.965,270.793,339.965,282.793,327.965,270.793,339.965,258.793" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="309.4172" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="386.7949" x="152.5675" y="304.793"/><path d="M270.7257,304.793 L270.7257,313.8916 L260.7257,323.8916 L152.5675,323.8916" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="108.1582" x="155.5675" y="318.9248">Traffic separation</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="252.1074" x="213.9113" y="340.8916"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="232.1074" x="223.9113" y="362.1475">UA-Link handles accelerator scale-up traffic</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="108.082" x="223.9113" y="375.9463">inside pod boundary</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="260.8027" x="209.5636" y="408.4893"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="240.8027" x="219.5636" y="429.7451">RoCEv2/Ethernet handles scale-out, storage,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="232.7871" x="219.5636" y="443.5439">management, telemetry, and frontend traffic</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="334.7949" x="172.5675" y="524.4114"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="314.7949" x="182.5675" y="545.6672">Reject design; storage remains DPU/RDMA/OpenZFS path</text><polygon fill="#FCF3CF" points="247.6439,476.0869,432.286,476.0869,444.286,488.0869,432.286,500.0869,247.6439,500.0869,235.6439,488.0869,247.6439,476.0869" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="31.1846" x="343.965" y="510.4048">invalid</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="184.6421" x="247.6439" y="492.0803">storage traffic attempts UA-Link path?</text><polygon fill="#FCF3CF" points="339.965,578.2102,351.965,590.2102,339.965,602.2102,327.965,590.2102,339.965,578.2102" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="145.8975" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="620.9141" x="28.0157" y="624.2102"/><path d="M147.7394,624.2102 L147.7394,633.3088 L137.7394,643.3088 L28.0157,643.3088" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="109.7236" x="31.0157" y="638.342">Scheduler locality</text><polygon fill="#FCF3CF" points="254.6747,660.3088,425.2552,660.3088,437.2552,672.3088,425.2552,684.3088,254.6747,684.3088,242.6747,672.3088,254.6747,660.3088" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="170.5806" x="254.6747" y="676.3022">KV/model/collective fits same pod?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="22.623" x="220.0516" y="669.9778">local</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="34.2354" x="437.2552" y="669.9778">remote</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="279.4414" x="48.0157" y="694.3088"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="259.4414" x="58.0157" y="715.5647">Prefer same UA-Link island and same rail affinity</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="289.4727" x="347.4572" y="694.3088"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="269.4727" x="357.4572" y="715.5647">Account for RoCE hydration and cross-pod latency</text><polygon fill="#FCF3CF" points="339.965,734.1077,351.965,746.1077,339.965,758.1077,327.965,746.1077,339.965,734.1077" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="264.7891" x="207.5704" y="780.1077"/><path d="M313.2872,780.1077 L313.2872,789.2063 L303.2872,799.2063 L207.5704,799.2063" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="95.7168" x="210.5704" y="794.2395">Admission gate</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="244.7891" x="217.5704" y="816.2063"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="224.7891" x="227.5704" y="837.4622">Expose only pod locality, capability profile,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="216.1465" x="227.5704" y="851.261">and health state to Coherence/scheduler</text><ellipse cx="339.965" cy="906.804" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="339.965" cy="906.804" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="198.0302" x2="188.0302" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="188.0302" x2="188.0302" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="184.0302,208.9941,188.0302,218.9941,192.0302,208.9941,188.0302,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="481.8998" x2="491.8998" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="491.8998" x2="491.8998" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="487.8998,208.9941,491.8998,218.9941,495.8998,208.9941,491.8998,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="188.0302" x2="188.0302" y1="252.793" y2="270.793"/><line style="stroke:#34495E;stroke-width:1;" x1="188.0302" x2="327.965" y1="270.793" y2="270.793"/><polygon fill="#34495E" points="317.965,266.793,327.965,270.793,317.965,274.793,321.965,270.793" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="491.8998" x2="491.8998" y1="252.793" y2="270.793"/><line style="stroke:#34495E;stroke-width:1;" x1="491.8998" x2="351.965" y1="270.793" y2="270.793"/><polygon fill="#34495E" points="361.965,266.793,351.965,270.793,361.965,274.793,357.965,270.793" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width: