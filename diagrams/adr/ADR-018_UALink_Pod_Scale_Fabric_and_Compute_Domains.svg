style="stroke:#34495E;stroke-width:1;" x1="339.965" x2="339.965" y1="282.793" y2="340.8916"/><polygon fill="#34495E" points="335.965,330.8916,339.965,340.8916,343.965,330.8916,339.965,334.8916" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="242.6747" x2="187.7365" y1="672.3088" y2="672.3088"/><line style="stroke:#34495E;stroke-width:1;" x1="187.7365" x2="187.7365" y1="672.3088" y2="694.3088"/><polygon fill="#34495E" points="183.7365,684.3088,187.7365,694.3088,191.7365,684.3088,187.7365,688.3088" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="437.2552" x2="492.1935" y1="672.3088" y2="672.3088"/><line style="stroke:#34495E;stroke-width:1;" x1="492.1935" x2="492.1935" y1="672.3088" y2="694.3088"/><polygon fill="#34495E" points="488.1935,684.3088,492.1935,694.3088,496.1935,684.3088,492.1935,688.3088" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="187.7365" x2="187.7365" y1="728.1077" y2="746.1077"/><line style="stroke:#34495E;stroke-width:1;" x1="187.7365" x2="327.965" y1="746.1077" y2="746.1077"/><polygon fill="#34495E" points="317.965,742.1077,327.965,746.1077,317.965,750.1077,321.965,746.1077" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="492.1935" x2="492.1935" y1="728.1077" y2="746.1077"/><line style="stroke:#34495E;stroke-width:1;" x1="492.1935" x2="351.965" y1="746.1077" y2="746.1077"/><polygon fill="#34495E" points="361.965,742.1077,351.965,746.1077,361.965,750.1077,357.965,746.1077" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="339.965" x2="339.965" y1="602.2102" y2="660.3088"/><polygon fill="#34495E" points="335.965,650.3088,339.965,660.3088,343.965,650.3088,339.965,654.3088" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="339.965" x2="339.965" y1="758.1077" y2="816.2063"/><polygon fill="#34495E" points="335.965,806.2063,339.965,816.2063,343.965,806.2063,339.965,810.2063" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="339.965" x2="339.965" y1="863.804" y2="895.804"/><polygon fill="#34495E" points="335.965,885.804,339.965,895.804,343.965,885.804,339.965,889.804" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="64.7931" y="921.804"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="69.7931" y="939.9358">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="69.7931" y="956.0344">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="69.7931" y="972.1331">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="69.7931" y="988.2317">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="69.7931" y="1004.3303">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="69.7931" y="1020.429">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="69.7931" y="1036.5276">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="77.5724" y="1052.6262">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="69.7931" y="1068.7249">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="69.7931" y="1084.8235">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="77.5724" y="1100.9221">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLNRSjis47tNLspJbsH6YgwEBVcX8-lIQkeBQzb-w6J60v4WXHW4M02KhNRoxprBKehIJXui4xVTWxDd3tuAMvbBAhHGfkLVb2c44pdvhKZigp8PfK9xURBYR6cIs3eZ7VK79mk9J4MfmzAQS2iGSYw_YAUIriBuarrJv-php6hhwEVXQ3G-MvmiYZYedGfx-gT5T2NYbwpArcnVpfUBvO9Nh4kaQsRFFdqwEnzYTgv4Rato_sEpvN2sFDbmUlhgV7pMkyBYEWWNcid-w6mw761oSGmo7Wok1ltMrnEmnWRv0w2BvNXn_b-WJQglhQ22bZITttTw_GlgqEEqSwtC2qKswQnZWRMbs3WLap09pMnUb4Wqjpagv5ijBJE9UQUoRMZDfLUPEL3lAKMYH8aC-3oLHall4OLpaH7Cl2UkzwJLeMaShEjEezM4VdjuYDOq6Wq9no_m_vBk2cccgqwCx2Ae3UEDLb19wO5eAvqqiUmOBEsgbOy8U6zdYzrWGe_p281yKBni3OtEn_rB-bBc6qit3uyqxlLwbnGjPsIDtkE7xkStKogSiau59Jq7ktswaHsxdE0sFhOxwVRT6C9oLclepaktKx7aim-pg5kVjoxW3WF4daUFdLo2Xo0JGbqp6QgW3r93wy7j9tJtS1rHTX_DQ3JidxVhCVF0uuisHSvYvrRYlkFUkDSTztkzDcMtDoiQ3uVZAfhAqHyJYd18xgG9NHH6Eg4h1eRzSNSuw354541vgsiqrQ5kBep8WCK4YhNm5Rgdw-ajzw6Pa5T1TdmXOvL21givYkWa2QtjgqpQj2cROz9JNlf0FeZzCSS4mikpF7JlxgxQb3hG1i5mfTirqquetPcU3h3FGms0r6s8RrCuaDLkG5TtTgLvyHEww0q-zly0jrc6IvM5XdxzPHEvqcqTjuQ7Jc53uIl0JfGkyPLKUkQOLsMQIeUWBxldxIP_han0jdcOGCVFhyBbrIX-qzy6Bid5C-wT0LaRD_uxzSzUswnTVGaNrnzwK7tQpHSPX-TOn5j4tadM_lDMYgIU-jW2GtLZjLgUdQ257aUVidxVeIyfs09TdEtVLHq_MHakk7LxM5OCefp00FU4xjl7V