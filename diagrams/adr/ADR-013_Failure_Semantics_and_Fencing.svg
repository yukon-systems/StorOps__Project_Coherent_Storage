th:1;" x1="517.2251" x2="385.4912" y1="440.4893" y2="440.4893"/><polygon fill="#34495E" points="395.4912,436.4893,385.4912,440.4893,395.4912,444.4893,391.4912,440.4893" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="373.4912" x2="373.4912" y1="282.793" y2="340.8916"/><polygon fill="#34495E" points="369.4912,330.8916,373.4912,340.8916,377.4912,330.8916,373.4912,334.8916" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="134.0557" x2="134.0557" y1="537.5879" y2="570.2368"/><polygon fill="#34495E" points="130.0557,560.2368,134.0557,570.2368,138.0557,560.2368,134.0557,564.2368" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="134.0557" x2="134.0557" y1="604.0356" y2="627.6106"/><polygon fill="#34495E" points="130.0557,617.6106,134.0557,627.6106,138.0557,617.6106,134.0557,621.6106" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="379.8164" x2="379.8164" y1="537.5879" y2="570.2368"/><polygon fill="#34495E" points="375.8164,560.2368,379.8164,570.2368,383.8164,560.2368,379.8164,564.2368" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="379.8164" x2="379.8164" y1="604.0356" y2="627.6106"/><polygon fill="#34495E" points="375.8164,617.6106,379.8164,627.6106,383.8164,617.6106,379.8164,621.6106" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="210.8633" x2="303.0007" y1="525.5879" y2="525.5879"/><polygon fill="#34495E" points="293.0007,521.5879,303.0007,525.5879,293.0007,529.5879,297.0007,525.5879" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="373.4912" x2="373.4912" y1="452.4893" y2="498.5879"/><line style="stroke:#34495E;stroke-width:1;" x1="373.4912" x2="134.0557" y1="498.5879" y2="498.5879"/><line style="stroke:#34495E;stroke-width:1;" x1="134.0557" x2="134.0557" y1="498.5879" y2="513.5879"/><polygon fill="#34495E" points="130.0557,503.5879,134.0557,513.5879,138.0557,503.5879,134.0557,507.5879" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="456.6321" x2="619.252" y1="525.5879" y2="525.5879"/><line style="stroke:#34495E;stroke-width:1;" x1="619.252" x2="619.252" y1="525.5879" y2="560.0129"/><polygon fill="#34495E" points="615.252,550.0129,619.252,560.0129,623.252,550.0129,619.252,554.0129" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="619.252" x2="619.252" y1="607.6106" y2="627.6106"/><polygon fill="#34495E" points="615.252,617.6106,619.252,627.6106,623.252,617.6106,619.252,621.6106" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="134.0557" x2="619.252" y1="627.6106" y2="627.6106"/><line style="stroke:#34495E;stroke-width:1;" x1="373.4912" x2="373.4912" y1="627.6106" y2="685.7092"/><polygon fill="#34495E" points="369.4912,675.7092,373.4912,685.7092,377.4912,675.7092,373.4912,679.7092" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="373.4912" x2="373.4912" y1="733.3069" y2="765.3069"/><polygon fill="#34495E" points="369.4912,755.3069,373.4912,765.3069,377.4912,755.3069,373.4912,759.3069" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="144.8457" y="791.3069"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="149.8457" y="809.4387">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="149.8457" y="825.5374">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="149.8457" y="841.636">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="149.8457" y="857.7346">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="149.8457" y="873.8333">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="149.8457" y="889.9319">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="149.8457" y="906.0305">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="157.625" y="922.1292">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="149.8457" y="938.2278">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="149.8457" y="954.3264">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="157.625" y="970.425">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLRRRXit47tNLqpJbmHOHLV7aVnGoBeqHcDRaHsZA08OrEvenPXBAYHNYbhattjcLvQ55dcnbxVXcJFd3FLBN7F1j35AsqPuqdQZl2eeh5NcTjhcj58cyCcATwNDKkSj