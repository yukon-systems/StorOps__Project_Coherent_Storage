<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="991px" preserveAspectRatio="none" style="width:734px;height:991px;background:#FFFFFF;" version="1.1" viewBox="0 0 734 991" width="734px" zoomAndPan="magnify"><title>ADR-013 - Failure Semantics and Fencing</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="435.2197" x="148.3813" y="35.6357">ADR-013 - Failure Semantics and Fencing</text></g><ellipse cx="373.4912" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="213.4951" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="709.9502" x="6" y="81.2979"/><path d="M68.9102,81.2979 L68.9102,90.3965 L58.9102,100.3965 L6,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="9" y="95.4297">Detector</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="275.457" x="235.7627" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="252.7734" x="245.7627" y="138.6523">Observe heartbeat, PTP skew, switch counters,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="255.457" x="245.7627" y="152.4512">DPU health, CXL poison, zpool state, API errors</text><polygon fill="#FCF3CF" points="305.0125,184.9941,441.97,184.9941,453.97,196.9941,441.97,208.9941,305.0125,208.9941,293.0125,196.9941,305.0125,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="136.9575" x="305.0125" y="200.9875">signal is stale or conflicting?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="45.2515" x="247.761" y="194.6631">uncertain</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="48.2969" x="453.97" y="194.6631">confirmed</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="351.5" x="25.0049" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="331.5" x="35.0049" y="240.25">Enter AMBER; reduce admission and collect quorum evidence</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="299.4453" x="396.5049" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="279.4453" x="406.5049" y="240.25">Classify node, rail, DPU, CXL, storage, or API failure</text><polygon fill="#FCF3CF" points="373.4912,258.793,385.4912,270.793,373.4912,282.793,361.4912,270.793,373.4912,258.793" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="159.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="594.9355" x="61.3501" y="304.793"/><path d="M165.5151,304.793 L165.5151,313.8916 L155.5151,323.8916 L61.3501,323.8916" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="94.165" x="64.3501" y="318.9248">Fence decision</text><polygon fill="#FCF3CF" points="268.6475,340.8916,478.335,340.8916,490.335,352.8916,478.335,364.8916,268.6475,364.8916,256.6475,352.8916,268.6475,340.8916" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="209.6875" x="268.6475" y="356.885">writer epoch or RDMA MR may be unsafe?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="26.9092" x="229.7383" y="350.5605">fence</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="24.46" x="490.335" y="350.5605">drain</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="296.8145" x="81.3501" y="374.8916"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="204.7441" x="91.3501" y="396.1475">Revoke leases, QPs, memory regions,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="276.8145" x="91.3501" y="409.9463">NVMe namespace access, and CXL pool ownership</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="238.1211" x="398.1646" y="374.8916"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="218.1211" x="408.1646" y="396.1475">Drain sessions and avoid new placement</text><polygon fill="#FCF3CF" points="373.4912,428.4893,385.4912,440.4893,373.4912,452.4893,361.4912,440.4893,373.4912,428.4893" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="165.1213" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="710.9824" x="18" y="474.4893"/><path d="M118.2686,474.4893 L118.2686,483.5879 L108.2686,493.5879 L18,493.5879" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="90.2686" x="21" y="488.6211">Recovery path</text><polygon fill="#FCF3CF" points="69.248,513.5879,198.8633,513.5879,210.8633,525.5879,198.8633,537.5879,69.248,537.5879,57.248,525.5879,69.248,513.5879" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="51.9707" x="138.0557" y="547.9058">recompute</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="129.6152" x="69.248" y="529.5813">KV class is recomputable?</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="212.1113" x="28" y="570.2368"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="192.1113" x="38" y="591.4927">Drop volatile buffers and reschedule</text><polygon fill="#FCF3CF" points="315.0007,513.5879,444.6321,513.5879,456.6321,525.5879,444.6321,537.5879,315.0007,537.5879,303.0007,525.5879,315.0007,513.5879" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="34.2354" x="383.8164" y="547.9058">restore</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="129.6313" x="315.0007" y="529.5813">durable checkpoint exists?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="14.0615" x="456.6321" y="523.2568">fail</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="239.4102" x="260.1113" y="570.2368"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="219.4102" x="270.1113" y="591.4927">Rehydrate via DPU/OpenZFS mirror path</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="199.4609" x="519.5215" y="560.0129"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="179.4609" x="529.5215" y="581.2688">Return bounded failure to adapter</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="165.4043" x="529.5215" y="595.0676">with correlation and retry policy</text><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="298.1406" x="224.4209" y="649.6106"/><path d="M351.917,649.6106 L351.917,658.7092 L341.917,668.7092 L224.4209,668.7092" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="117.4961" x="227.4209" y="663.7424">Post-recovery gate</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="278.1406" x="234.4209" y="685.7092"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="258.1406" x="244.4209" y="706.9651">Require clean telemetry window, latency budget,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="212.7773" x="244.4209" y="720.7639">and failure drill evidence before GREEN</text><ellipse cx="373.4912" cy="776.3069" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="373.4912" cy="776.3069" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="293.0125" x2="200.7549" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="200.7549" x2="200.7549" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="196.7549,208.9941,200.7549,218.9941,204.7549,208.9941,200.7549,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="453.97" x2="546.2275" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="546.2275" x2="546.2275" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="542.2275,208.9941,546.2275,218.9941,550.2275,208.9941,546.2275,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="200.7549" x2="200.7549" y1="252.793" y2="270.793"/><line style="stroke:#34495E;stroke-width:1;" x1="200.7549" x2="361.4912" y1="270.793" y2="270.793"/><polygon fill="#34495E" points="351.4912,266.793,361.4912,270.793,351.4912,274.793,355.4912,270.793" style="stroke:#34495E;stroke-width:1;"/><line style="stroke: