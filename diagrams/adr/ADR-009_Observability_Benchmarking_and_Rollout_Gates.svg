<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="991px" preserveAspectRatio="none" style="width:837px;height:991px;background:#FFFFFF;" version="1.1" viewBox="0 0 837 991" width="837px" zoomAndPan="magnify"><title>ADR-009 - Observability, Benchmarking, and Rollout Gates</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="616.1396" x="109.1235" y="35.6357">ADR-009 - Observability, Benchmarking, and Rollout Gates</text></g><ellipse cx="418.6934" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="163.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="320.8457" x="258.2705" y="81.2979"/><path d="M366.3115,81.2979 L366.3115,90.3965 L356.3115,100.3965 L258.2705,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="98.041" x="261.2705" y="95.4297">Metric ingestion</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="275.4395" x="280.9736" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="255.4395" x="290.9736" y="138.6523">Collect Coherence, scheduler, GPU, DPU, CXL,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="238.7344" x="290.9736" y="152.4512">RDMA switch, OpenZFS, and corpus metrics</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="300.8457" x="268.2705" y="184.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="280.8457" x="278.2705" y="206.25">Transport OTLP 4317/4318, Prometheus 9090/9100,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="222.1289" x="278.2705" y="220.0488">gNMI 9339, PTP 319/320 timing evidence</text><rect fill="#FFFFFF" height="213.4951" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="522.9063" x="141.2266" y="254.5918"/><path d="M275.7295,254.5918 L275.7295,263.6904 L265.7295,273.6904 L141.2266,273.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="124.5029" x="144.2266" y="268.7236">Benchmark harness</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="299.4512" x="268.9678" y="290.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="250.7344" x="278.9678" y="311.9463">Run TTFT/TPOT, KV hit/miss, model cold load,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="279.4512" x="278.9678" y="325.7451">RAG retrieval, RDMA incast, zpool degradation tests</text><polygon fill="#FCF3CF" points="339.8135,358.2881,497.5732,358.2881,509.5732,370.2881,497.5732,382.2881,339.8135,382.2881,327.8135,370.2881,339.8135,358.2881" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="157.7598" x="339.8135" y="374.2815">test isolates one failure domain?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="22.623" x="305.1904" y="367.957">valid</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="31.1846" x="509.5732" y="367.957">invalid</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="263.4805" x="161.2266" y="392.2881"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="243.4805" x="171.2266" y="413.5439">Record baseline, delta, and rollback threshold</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="199.4258" x="444.707" y="392.2881"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="179.4258" x="454.707" y="413.5439">Reject noisy benchmark evidence</text><polygon fill="#FCF3CF" points="418.6934,432.0869,430.6934,444.0869,418.6934,456.0869,406.6934,444.0869,418.6934,432.0869" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="161.5464" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="825.3867" x="6" y="478.0869"/><path d="M90.7168,478.0869 L90.7168,487.1855 L80.7168,497.1855 L6,497.1855" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="74.7168" x="9" y="492.2188">Rollout gate</text><polygon fill="#FCF3CF" points="51.8997,517.1855,273.2585,517.1855,285.2585,529.1855,273.2585,541.1855,51.8997,541.1855,39.8997,529.1855,51.8997,517.1855" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="23.2354" x="166.5791" y="551.5034">pass</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="221.3589" x="51.8997" y="533.179">p95/p99, error budget, and failure drills pass?</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="293.1582" x="16" y="573.8345"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="273.1582" x="26" y="595.0903">Advance canary scope: node -&gt; rack -&gt; pod -&gt; fleet</text><polygon fill="#FCF3CF" points="362.5808,517.1855,532.5383,517.1855,544.5383,529.1855,532.5383,541.1855,362.5808,541.1855,350.5808,529.1855,362.5808,517.1855" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="20.7969" x="451.5596" y="551.5034">hold</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="169.9575" x="362.5808" y="533.179">recoverable with AMBER controls?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="14.0615" x="544.5383" y="526.8545">fail</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="236.8027" x="329.1582" y="573.8345"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="216.8027" x="339.1582" y="595.0903">Cap admission and continue observation</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="235.4258" x="585.9609" y="570.51"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="215.4258" x="595.9609" y="591.7659">Rollback, freeze promotion, require RCA</text><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="296.0898" x="270.6484" y="649.6333"/><path d="M396.6133,649.6333 L396.6133,658.7319 L386.6133,668.7319 L270.6484,668.7319" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="115.9648" x="273.6484" y="663.7651">Evidence retention</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="276.0898" x="280.6484" y="685.7319"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="256.0898" x="290.6484" y="706.9878">Store relative artifact links, manifest checksums,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="233.4902" x="290.6484" y="720.7866">configuration snapshots, and decision notes</text><ellipse cx="418.6934" cy="776.3296" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="418.6934" cy="776.3296" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="418.6934" x2="418.6934" y1="164.9941" y2="184.9941"/><polygon fill="#34495E" points="414.6934,174.9941,418.6934,184.9941,422.6934,174.9941,418.6934,178.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="418.6934" x2="418.6934" y1="71.2979" y2="117.3965"/><polygon fill="#34495E" points="414.6934,107.3965,418.6934,117.3965,422.6934,107.3965,418.6934,111.3965" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="327.8135" x2="292.9668" y1="370.2881" y2="370.2881"/><line style="stroke:#34495E;stroke-width:1;" x1="292.9668" x2="292.9668" y1="370.2881" y2="392.2881"/><polygon fill="#34495E" points="288.9668,382.2881,292.9668,392.2881,296.9668,382.2881,292.9668,386.2881" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="509.5732" x2="544.4199" y1="370.2881" y2="370.2881"/><line style="stroke:#34495E;stroke-width:1;" x1="544.4199" x2="544.4199" y1="370.2881" y2="392.2881"/><polygon fill="#34495E" points="540.4199,382.2881,544.4199,392.2881,548.4199,382.2881,544.4199,386.2881" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="292.9668" x2="292.9668" y1="426.0869" y2="444.0869"/><line style="stroke:#34495E;stroke-width:1;" x1="292.9668" x2="406.6934" y1="444.0869" y2="444.0869"/><polygon fill="#34495E" points="396.6934,440.0869,406.6934,444.0869,396.6934,448.0869,400.6934,444.0869" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="544.4199" x2="544.4199" y1="426.0869" y2="444.0869"/><line style="stroke:#34495E;stroke-width:1;" x1="544.4199" x2="430.6934" y1="444.0869" y2="444.0869"