4495E;stroke-width:1;" x1="418.6934" x2="162.5791" y1="502.1855" y2="502.1855"/><line style="stroke:#34495E;stroke-width:1;" x1="162.5791" x2="162.5791" y1="502.1855" y2="517.1855"/><polygon fill="#34495E" points="158.5791,507.1855,162.5791,517.1855,166.5791,507.1855,162.5791,511.1855" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="544.5383" x2="703.6738" y1="529.1855" y2="529.1855"/><line style="stroke:#34495E;stroke-width:1;" x1="703.6738" x2="703.6738" y1="529.1855" y2="570.51"/><polygon fill="#34495E" points="699.6738,560.51,703.6738,570.51,707.6738,560.51,703.6738,564.51" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="703.6738" x2="703.6738" y1="604.3088" y2="627.6333"/><polygon fill="#34495E" points="699.6738,617.6333,703.6738,627.6333,707.6738,617.6333,703.6738,621.6333" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="162.5791" x2="703.6738" y1="627.6333" y2="627.6333"/><line style="stroke:#34495E;stroke-width:1;" x1="418.6934" x2="418.6934" y1="627.6333" y2="685.7319"/><polygon fill="#34495E" points="414.6934,675.7319,418.6934,685.7319,422.6934,675.7319,418.6934,679.7319" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="418.6934" x2="418.6934" y1="733.3296" y2="765.3296"/><polygon fill="#34495E" points="414.6934,755.3296,418.6934,765.3296,422.6934,755.3296,418.6934,759.3296" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="247.25" y="791.3296"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="252.25" y="809.4614">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="252.25" y="825.5601">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="252.25" y="841.6587">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="252.25" y="857.7573">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="252.25" y="873.856">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="252.25" y="889.9546">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="252.25" y="906.0532">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="260.0293" y="922.1519">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="252.25" y="938.2505">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="252.25" y="954.3491">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="260.0293" y="970.4478">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src VLPTRzis57tthxZhNZf0hZ_JL0wmmPzTi2Rn72SOXW86BL8o6uhKICgPE_I_xr2I7RT3znABf7ZlkUUUUvGV_4xaWWh5f6wv9waBPbbERiUuUPOwevGf9yvEh2arJupLmbAlVtR0HSfAvHT6-rk6a3FnYJsMTC-qEtjhRArvdXfbBFqu60xZY_dP8Kkyt4j_e7zQH1EMF6LLjkRrnMmnNyp3YR5Ss6RtuktRYyi1TcUIvKRp_rwRBWRJnTaBvxSdb_55TuB3Uy-iRpPxmulne8_D-Ib8tEzF-htMbpEmsdZn7Q3pHJo__1Pea-fBoqkl18rdgtQt6rERxhPEs3tRIeNI8ve8dUnoPf4eYuXfJYkZb2azlMTUk5PBYKnWryfivripuMIcZ-GxIf6AIvO1eQDIA-4SOeHif5dWtb7e-AZLfd7YZUsCbzSZ-dMzNjxJS3WWN7-7tokwAuGUNxSJanVCosr0lBo6Jaf7KxCJ5YX5M-DeNvsyGS2LcSxt_H4zp9O0vBmCnqRJy3BkNT6dCjyQkba_KDpjTgzekPYIqUg0FxIQtOofiD9OwQLm8TZjuurecyK8rRZ4x8KzT198ou8BA2ym9XCHxgwdoqvztrYF6lg8FLi-j7C17hpWXCvcmbT1rq91xTuUHdIt_h2aRBMSqd3GkupgTU0XhDz5jBG6R-u4wesxSRSJzxhTYBBRcskA1uEuYYPpz6X4IrmIUw5z1uqHbgcAWK4lxWpwtG0H3P3Eg1fDTQcJCyqoOD6U4iLSXUxnm_WsJA8UaPDUj5qX4fdAXAvdQA8LnA23Py4ZsfRDDU4eBvqdvzdXb6C4wULPxZjtTvE8KWlQ89ZGwQXcsZAfskFp1TvpK0CWTHhY8_97ig86T5MpBVMJ6z6xRlzDxtTmcsKegYoKnFPL4xbIRHstXeTP2POIIe2XI5NYYPiSdXDYJieq5HP1d_QRtJRVL3OWeh3aqF7ccTcyMYL_gvU5vJdReEuip0ag_fowZLC6CnEUc4tg1zMl7itsaqZy9c793f7t8cX_inECrrjlMc2e7gnMomKlQ67ACQb1lwzkm0BQW4H1rKQ_gkP-D0rQJFpBF814nE8b51hH--L358GOqVIF3z57NP7jdgLFTb4rNNykxklvXfiMa5bUPN5N8VJQmZOhGLUw31Bj_8ykF-gJCADAZaVnrOs3EYKF0AzWFsTrdQo6q1iDgsWAMvKOg_LYtLalxzOH_VP8E-axkNGkejnmeG1PSLA6yL3O-3tPW5ticMf49NN2d4S72cCKp01-n6ipW8NvgaQPqkkmEChMOLB4D-huvQVWLffU8xBaF-5MG2T06ASjSmAg0-a0v5bDPR27BVmOrwnmEw0CgGG-OVHQwg-Z1450cT8TQ7iYueKfNDDSfbypThJY381hia8PHNpHAM9GB-2m5jF9OJWre5CzLYhbgC3CdeeAYmRDcEyPib82Mx07oCWKOWHmN53xPumIAi9lONZuIPKG_bXNo6z5vP0ik3G4jgFnpMI-eiOlNn86Ffg4KrOGuw6biZ8eNhqjTGbFhRz7eU0Nya8TH-OQZeEr2F4P_pn0aYQy7a47VvKIvQwcu-ymE6y83fA1-xrCqpqcCkog-fiIRgHm0ggS1RfZMgP1BfYmvCcLkOFqW3cLMMbhQJdD2lJSkvfw3lUigWjVQXUa3uih_WK0?></g></svg>