<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1228px" preserveAspectRatio="none" style="width:600px;height:1228px;background:#FFFFFF;" version="1.1" viewBox="0 0 600 1228" width="600px" zoomAndPan="magnify"><title>ADR-006 - OpenZFS NVMe-oF and Media Layout</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="502.3691" x="47.3838" y="35.6357">ADR-006 - OpenZFS NVMe-oF and Media Layout</text></g><ellipse cx="293.0505" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="338.0178" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="339.5039" x="129.2986" y="81.2979"/><path d="M316.7527,81.2979 L316.7527,90.3965 L306.7527,100.3965 L129.2986,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="177.4541" x="132.2986" y="95.4297">Namespace and pool design</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="229.4668" x="178.3171" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="175.3828" x="188.3171" y="138.6523">Create mirrored NAND vdev sets</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="209.4668" x="188.3171" y="152.4512">across independent storage nodes/rails</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="237.4531" x="174.324" y="184.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="217.4531" x="184.324" y="206.25">Expose zvol/object backing through DPU</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="200.1035" x="184.324" y="220.0488">NVMe-oF port 4420 on storage VLAN</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="287.5039" x="149.2986" y="300.9163"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="267.5039" x="159.2986" y="322.1721">Reject layout; failure domains are not independent</text><ellipse cx="293.0505" cy="374.3157" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="293.0505" cy="374.3157" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><polygon fill="#FCF3CF" points="187.3018,252.5918,398.7993,252.5918,410.7993,264.5918,398.7993,276.5918,187.3018,276.5918,175.3018,264.5918,187.3018,252.5918" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="31.1846" x="297.0505" y="286.9097">invalid</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="211.4976" x="187.3018" y="268.5852">mirror legs share rack, PSU, switch, or rail?</text><rect fill="#FFFFFF" height="213.4951" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="498.877" x="37.2913" y="429.3157"/><path d="M111.0911,429.3157 L111.0911,438.4143 L101.0911,448.4143 L37.2913,448.4143" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="63.7998" x="40.2913" y="443.4475">Write path</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="339.1367" x="123.4822" y="465.4143"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="319.1367" x="133.4822" y="486.6702">Coherence durable object -&gt; DPU -&gt; NVMe-oF -&gt; OpenZFS</text><polygon fill="#FCF3CF" points="2