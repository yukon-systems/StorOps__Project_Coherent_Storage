554.7432" x="15" y="1094.6311">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="15" y="1110.7297">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="15" y="1126.8284">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="15" y="1142.927">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="22.7793" y="1159.0256">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="15" y="1175.1243">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="15" y="1191.2229">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="22.7793" y="1207.3215">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLRRRjj647tNLqpJbmIWGjqSXnBGGjO5DUgBwaiA50QC5JaYDrxk4hjBAKgHV-_CafBLj7cnzZfxvioPG__a2omHAYMaxhWNgIjXHGck49dPIPt3HYY79plMr3fBZTLeeJyusSXm8shbbqRx6q4Xv_XPVAhXNcXtScfghTdDZ38MVXwEHidPucHJf5vkfT_3tns02v6-vE6rzlXolbmi5xnZR8QsNJtxyE7iV4YhSobAexF_NfijXxFboO7JsnVdoLdlWZRllR2-NUoFpgR30IqkZa6ImU1YqEzyEm6hZSSV05qiayNvzq3RfxvrlFGAOJg_w_Pw7w0BjnNglvRtSFFf6hjc2K9dS8sP570bzgRsdOx276dHohp