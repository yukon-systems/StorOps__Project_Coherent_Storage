n ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="154.834" y="965.5088">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="154.834" y="981.6074">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="154.834" y="997.7061">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="154.834" y="1013.8047">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="154.834" y="1029.9033">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="154.834" y="1046.002">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="162.6133" y="1062.1006">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="154.834" y="1078.1992">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="154.834" y="1094.2979">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="162.6133" y="1110.3965">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLNRZjis47ttLqpJbmIm8zys6zje2byJe-jTTUtT5iK21YsD9SOKgP2KDqwHV--GaY-Re2-sU1kUcJddy1UROeQG2yPbpUoup9bc6PYKnUgPomIsJ1YyMD6ga76aj4GDhVR5GenRLWWxKzBUCWevmS_iiO0ba-PYrr1hzJnMGcdujTFjzgwc5uiiidpFxG7-hG6CMBHB_6tLzjbaDfrDtOhICUfgzkhTkwlh3irEECkKZ7y-DfvrnhEB3PUdHzUzg-Q85fUMQLjDjhfNmqwR9gUd8BrsUzHkrRvVW9NAuly0dSvwq-iVWLPNVQzPRWN2S7BVQ3RRq81Foi8VZy1a3A76BVyAOnQbL41c6OI2IQpL12P8wvedgQrDqF147WjkO4lXOyuIGcMWa0ADeMZk1f3CrTk0wtA_re1XP9KEXk6y3vzMgt09tMu7wFXx-X_0NOvoE6z4AikPvHk7CfmJDme3OvMYHXbXGzBItg-yfO3tQZpTj_lmC0a9aB7SBIi9tUjUQm2VYsoZOB5wW5wpsHn0E1k3ak90Ft0_MGmXrrnfRZaQ5-psSO4DDUjJDYPIUzI7828wQIK4iSsWtlC8tTdLE0pAyqfRog5DiIVXGoD3geF56AYR2LeVT8M266xreGztgviGaljm3DrEwxfUZbqTtFXzdSglQ6UAb6-lsMi6lLQpMOVaTZ67NgVJyz5uHgheGqY7S8_I1jGOr4pu2dHQlQ3JRZg8r01kb2ZH-4D1nYHB28kq40bcFBh7c-6jKv_iW-4M6oR7Y6zv1FC9DL4ZC27KCyPrs1JLCJIG5SQ2iUnmkgDFTCkIp0PtTwCwR3MLZGZZEbqlAwqP5utXvO3s6M83GGggmjV17ejLhq3xd7KXTwOFxvljjwq_gRP9GaaLkU0qFQWYU_wMSKjuf0zd8ou5CX4k2lgALKO-usAEYkqMDGNTxTVf9bjxwMFT3MFYyVgPwSoFeg_YFD1nnjQKTqB8wfJnjwrP6w6IklzYEYe_HDj_girdZEmwScggmnuTzzSfihYSUbkZ2fN2gjMCqt-Db4tgTFnzDPVRal3EbPH-vQNUtz_SB835BBT4IAUJmb8xSY_RzGuFJp9JCOfroanA9LGxbFmRwkCO9PEMoevVrfh910SkPdYtN04HlH9OiDi7GgbTaJ_9KgEbE3qCEahtfSm1DrvA0tAK2zXddOwdaA59I-1y2wzBb91o2ro-hFllRvn3I7XDYszeEw6wHrje2Hz9LK95n6zITwHvJY08rsW1EH67kE1SWWdEJ9qwVYGKBThK9OVqUC3hZ1jJXdKupW1EdNOMTD7h4no_Ti94g9RKjxYWAud5fGEa1uhYSd-IFn046XzUPZdmKKf8aH8nd76vq4Jzo8B6ggqEKrned-0MRPG-IP9Lze9LWNFCVsPBs7Fc3AYwGSPyMpl-lsZF0ZEb3ruhMxRHfFECVCvPmhbFclRGzQV42DANWckCJsKvO0Mx_q2vb1Ri_SUvhZEVKf91ASSdELcINphlhUpsu9yCNxwIGcK1hEiSbrRzABKdcNCfIVEfCZOWIX2pV1uQ4svi2VFSRgdUd29wgoy958xd68p_lWaUXeqRieupINwkqr-44eCYZydRoEG5Zmxd0j5ZwOqGFln63sTZqZuLfkfNTNrOR0GtAV0OivnAIhvRDW-UkKq1S-MRIizRMjr1YdLjFBNr9OsFrBYuufwcT4ml0OyyS6-29mQbL4npAl4nJT98_Xy0?></g></svg>