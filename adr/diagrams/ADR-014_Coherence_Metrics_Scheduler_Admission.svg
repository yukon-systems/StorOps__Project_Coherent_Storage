2.9844" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="374.499" x2="374.499" y1="469.8857" y2="515.9844"/><line style="stroke:#34495E;stroke-width:1;" x1="374.499" x2="136.4053" y1="515.9844" y2="515.9844"/><line style="stroke:#34495E;stroke-width:1;" x1="136.4053" x2="136.4053" y1="515.9844" y2="530.9844"/><polygon fill="#34495E" points="132.4053,520.9844,136.4053,530.9844,140.4053,520.9844,136.4053,524.9844" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="430.811" x2="634.2871" y1="542.9844" y2="542.9844"/><line style="stroke:#34495E;stroke-width:1;" x1="634.2871" x2="634.2871" y1="542.9844" y2="590.3772"/><polygon fill="#34495E" points="630.2871,580.3772,634.2871,590.3772,638.2871,580.3772,634.2871,584.3772" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="634.2871" x2="634.2871" y1="624.176" y2="654.3999"/><polygon fill="#34495E" points="630.2871,644.3999,634.2871,654.3999,638.2871,644.3999,634.2871,648.3999" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="136.4053" x2="634.2871" y1="654.3999" y2="654.3999"/><line style="stroke:#34495E;stroke-width:1;" x1="374.499" x2="374.499" y1="654.3999" y2="712.4985"/><polygon fill="#34495E" points="370.499,702.4985,374.499,712.4985,378.499,702.4985,374.499,706.4985" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="374.499" x2="374.499" y1="760.0962" y2="792.0962"/><polygon fill="#34495E" points="370.499,782.0962,374.499,792.0962,378.499,782.0962,374.499,786.0962" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="158.8613" y="818.0962"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="163.8613" y="836.228">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="163.8613" y="852.3267">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="163.8613" y="868.4253">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="163.8613" y="884.5239">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="163.8613" y="900.6226">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="163.8613" y="916.7212">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="163.8613" y="932.8198">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="171.6406" y="948.9185">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="163.8613" y="965.0171">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="163.8613" y="981.1157">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="171.6406" y="997.2144">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLNRSjis47tNLspJbsI6YgwE8_cX8-lIU6h9ggnu-f0P3KIkICGWm0AWNAMJV-y1ITjgEdsHYDlYxDbp5Z_vZ7EcGWcfM-vHwa9OaPFBH6AUf4xf89JZinLhIft4ncgsrEkVBIHy4ANo2wFzIY3aZB-AXvBkXNPdkoRMcgUfKSRIpuFXS7GnFriKiPT7wK_qTuleMiIFQNLRitqnMymNyx1YRCAscRtuyE7YSe3PcHIvqSb_ZqqNW-dYRCFvwUlBqKNt6eltNbZVJFQ65vD17vFpbo2ZVl-wtsjzFmEhZUV_0JfVZEQNFm9jhlhUyj8hfibiq-xsXjIcgSdOiewPbkojZ1rjZ59bGTxGVPnnKYfmFKbowPmqkjLIdB9EoCeqywqPEvdgP_OT7N1N8aKAY8vAhTWv4ZfSHre4yXs5aezRRPh4tjZEP7qpfa_RxVgUXiC1uVX7_5_HNS5wSjEEJLu8B_S1yle6GYdTA-AsnjAnMdcFW1ipdH_xO_eyMmEGyp8i6qt3or7lYhwM-TxGSlkPHjrkzuhMYoaPhKxueSriEQ72IcEbb-n2iDN3ajjcCKOsBZP7jgTE36rPS0Cw7DkZ16KukvskE_LvOprow2FsRFsvdJDuy9mGIfkohu9kMK7ktfx6TBUzNLEwMKzfEEXTHlKuy1367oDQMuET6IFVKNVKxOnwtMv4wMfvGwF1O5H5apaiCgOr3l6HjU-WC6o5gXWOz4QTGRyR8A80qXbLewaETNAXHGeisbEiXAlGFTnELi6AUanEUcwxWcDva37Tp514ooIKCa-SHBGlcsFiA2-T9-V5wUMECRINfxdltDrTHtIme0s22PMEQgQjaAezEHzWduCQ0AdJ41-HVoOhQa1NETjIFxenVUpst_T-1xTfYgJAGabCNpMHaN3InAtXmIoXfuGKq56aAl6Lc1nD9yIyBWy7jWZwUDnb-tnNzG6EmZ21ZdTFmkRLAFvBlGviaeiTyaw1B4B6tmvkvvH9e-fBsBZ-KFtgq-o_SkntiO2Z8ZfoqFukOv7KK-zROAWsLglbGZDemUQmQj3lczgOv4nfOtPlAjkFfq69iQz0Ix-pO3w2MAq_xVOdpmxCmopP3fn6N_IdwsLdjfaiEzC_Rg5qs18SH46ez6V99UZWmcTNvu63dQWOZIAQJrSTs0K95SQeK6mVOkOcOKM89HEu4ML2NowWLnlWyX4w37B0oXNQpbawJNyfPC4e6zVvo0EzpUiyKMsuL-G5xVc4badRxUqlxqBVqFGM2uhVuG2GBeLzR5YXQluALQsABJKgIk1N-Ime44-ALA5bX0mPJmgzFG1urWHQ6PiB9RynxK_GdHRQHrIb5y7M47mG4pB-xQ6MVLGfJ9aOX_1Ur5AgGkj47ceIyw94XnRFVREfEVswcSzNdSdoUhxfREQpK9IRrHVz907Kid3O6UDYLsiOJEtHtocJsl_0ucjlJc3JSCKhaTKbBvG53Bx9TAq4oBACeiCNrQqAjt9rtVtj7QoTe5izqnI2LLXVWg499XK2ePgGKu522HzdKH1MxG_7bOH0FrjqONuc40JKSjipKafgYRxMv8MG9lI6WsjG2fdM-Wwl2q9foepp7PJcbVH_aJCf0R8noXhUbaZscIQ80wMf2VOMTEnayaM7XsipRLe75zOaPLmzEtl89ik3qggtoABBwL0AzAlY7m00?></g></svg>