<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1018px" preserveAspectRatio="none" style="width:748px;height:1018px;background:#FFFFFF;" version="1.1" viewBox="0 0 748 1018" width="748px" zoomAndPan="magnify"><title>ADR-014 - Coherence Metrics Rollup to Scheduler Admission</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="640.5674" x="52.7153" y="35.6357">ADR-014 - Coherence Metrics Rollup to Scheduler Admission</text></g><ellipse cx="374.499" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="163.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="284.1016" x="232.4482" y="81.2979"/><path d="M333.4688,81.2979 L333.4688,90.3965 L323.4688,100.3965 L232.4482,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="91.0205" x="235.4482" y="95.4297">Metric sources</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="264.1016" x="242.4482" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="225.4512" x="252.4482" y="138.6523">Collect kv_hit_rate, dirty_bytes, flush_age,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="244.1016" x="252.4482" y="152.4512">HBM/DRAM/CXL pressure, DPU queue depth</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="242.7559" x="253.1211" y="184.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="222.7559" x="263.1211" y="206.25">Collect RoCE p99, ECN/PFC, zpool state,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="217.4297" x="263.1211" y="220.0488">model residency, corpus retrieval latency</text><rect fill="#FFFFFF" height="227.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="564.2207" x="75.7144" y="254.5918"/><path d="M177.5552,254.5918 L177.5552,263.6904 L167.5552,273.6904 L75.7144,273.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="91.8408" x="78.7144" y="268.7236">Rollup pipeline</text><polygon fill="#FCF3CF" points="298.6941,290.6904,450.304,290.6904,462.304,302.6904,450.304,314.6904,298.6941,314.6904,286.6941,302.6904,298.6941,290.6904" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="151.6099" x="298.6941" y="306.6838">metric timestamp beyond TTL?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="23.2354" x="263.4587" y="300.3594">stale</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="24.4546" x="462.304" y="300.3594">fresh</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="285.459" x="95.7144" y="324.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="265.459" x="105.7144" y="345.9463">Mark source stale; do not infer health from silence</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="218.7617" x="401.1733" y="324.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="198.7617" x="411.1733" y="345.9463">Normalize by tenant, model, pod, rail,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="156.0762" x="411.1733" y="359.7451">KV class, and locality domain</text><polygon fill="#FCF3CF" points="374.499,378.2881,386.499,390.2881,374.499,402.2881,362.499,390.2881,374.499,378.2881" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="323.416" x="212.791" y="422.2881"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="303.416" x="222.791" y="443.5439">Compute admission vector GREEN/AMBER/RED/DRAIN</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="187.4414" x="222.791" y="457.3428">with reason codes and rollback hint</text><rect fill="#FFFFFF" height="174.5142" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="736.998" x="6" y="491.8857"/><path d="M134.2959,491.8857 L134.2959,500.9844 L124.2959,510.9844 L6,510.9844" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="118.2959" x="9" y="506.0176">Scheduler decision</text><polygon fill="#FCF3CF" points="113.7876,530.9844,159.0229,530.9844,171.0229,542.9844,159.0229,554.9844,113.7876,554.9844,101.7876,542.9844,113.7876,530.9844" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="26.8984" x="140.4053" y="565.3022">admit</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="45.2354" x="113.7876" y="546.9778">GREEN?</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="240.8105" x="16" y="586.8022"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="220.8105" x="26" y="608.0581">Place request with lease and SLO budget</text><polygon fill="#FCF3CF" points="373.5757,530.9844,418.811,530.9844,430.811,542.9844,418.811,554.9844,373.5757,554.9844,361.5757,542.9844,373.5757,530.9844" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="52.5938" x="400.1934" y="565.3022">conditional</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="45.2354" x="373.5757" y="546.9778">AMBER?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="60.5054" x="430.811" y="540.6533">RED/DRAIN</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="238.7656" x="276.8105" y="586.8022"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="218.7656" x="286.8105" y="608.0581">Cap batch, prewarm, select alternate rail,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="115.4238" x="286.8105" y="621.8569">or queue behind flush</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="197.4219" x="535.5762" y="590.3772"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="177.4219" x="545.5762" y="611.6331">Reject, migrate, or drain host/pod</text><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="303.4609" x="222.7686" y="676.3999"/><path d="M264.6787,676.3999 L264.6787,685.4985 L254.6787,695.4985 L222.7686,695.4985" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="31.9102" x="225.7686" y="690.5317">Audit</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="283.4609" x="232.7686" y="712.4985"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="188.7715" x="242.7686" y="733.7544">Persist decision inputs and trace_id</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="263.4609" x="242.7686" y="747.5532">for RCA and reproducible benchmark comparison</text><ellipse cx="374.499" cy="803.0962" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="374.499" cy="803.0962" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="374.499" x2="374.499" y1="164.9941" y2="184.9941"/><polygon fill="#34495E" points="370.499,174.9941,374.499,184.9941,378.499,174.9941,374.499,178.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="374.499" x2="374.499" y1="71.2979" y2="117.3965"/><polygon fill="#34495E" points="370.499,107.3965,374.499,117.3965,378.499,107.3965,374.499,111.3965" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="286.6941" x2="238.4438" y1="302.6904" y2="302.6904"/><line style="stroke:#34495E;stroke-width:1;" x1="238.4438" x2="238.4438" y1="302.6904" y2="324.6904"/><polygon fill="#34495E" points="234.4438,314.6904,238.4438,324.6904,242.4438,314.6904,238.4438,318.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="462.304" x2="510.5542" y1="302.6904" y2="302.6904"/><line style="stroke:#34495E;stroke-width:1;" x1="510.5542" x2="510.5542" y1="302.6904" y2="324.6904"/><polygon fill="#34495E" points="506.5542,314.6904,510.5542,324.6904,514.5542,314.6904,510.5542,318.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="238.4438" x2="238.4438" y1="358.4893" y2="390.2881"/><line style="stroke:#34495E;stroke-width:1;" x1="238.4438" x2="362.499" y1="390.2881" y2="390.2881"/><polygon fill="#34495E" points="352.499,386.2881,362.499,390.2881,352.499,394.2881,356.499,390.2881" style="stroke:#34495E;stroke-width:1;"/><line style="