705.582"/><polygon fill="#34495E" points="430.6982,695.582,434.6982,705.582,438.6982,695.582,434.6982,699.582" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="160.2588" x2="160.2588" y1="753.1797" y2="771.1797"/><line style="stroke:#34495E;stroke-width:1;" x1="160.2588" x2="285.4785" y1="771.1797" y2="771.1797"/><polygon fill="#34495E" points="275.4785,767.1797,285.4785,771.1797,275.4785,775.1797,279.4785,771.1797" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="434.6982" x2="434.6982" y1="739.3809" y2="771.1797"/><line style="stroke:#34495E;stroke-width:1;" x1="434.6982" x2="309.4785" y1="771.1797" y2="771.1797"/><polygon fill="#34495E" points="319.4785,767.1797,309.4785,771.1797,319.4785,775.1797,315.4785,771.1797" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="297.4785" x2="297.4785" y1="613.4834" y2="671.582"/><polygon fill="#34495E" points="293.4785,661.582,297.4785,671.582,301.4785,661.582,297.4785,665.582" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="297.4785" x2="297.4785" y1="783.1797" y2="841.2783"/><polygon fill="#34495E" points="293.4785,831.2783,297.4785,841.2783,301.4785,831.2783,297.4785,835.2783" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="297.4785" x2="297.4785" y1="888.876" y2="920.876"/><polygon fill="#34495E" points="293.4785,910.876,297.4785,920.876,301.4785,910.876,297.4785,914.876" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="13.0762" y="946.876"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="18.0762" y="965.0078">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="18.0762" y="981.1064">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="18.0762" y="997.2051">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="18.0762" y="1013.3037">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="18.0762" y="1029.4023">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="18.0762" y="1045.501">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="18.0762" y="1061.5996">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="25.8555" y="1077.6982">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="18.0762" y="1093.7969">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="18.0762" y="1109.8955">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="25.8555" y="1125.9941">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLRRRXit47tNLqpJbmIGihhOSIG1BNHj14IsuakU0XZqxgp4c4jkIAvijSY_zv2xbeKMUR6Nj-7CcNCEzPlVSS5KAY5roprANGeh2d8xaPadgRUK2-NuPCMQIcUfiPejzVed2nddeb9-QRI_50Wvv-_YQqKtGhkJNHDhpTFCA6Ffzy7PsV1ySR8eKY_tqX_ednRHLAIFstXRitqvNowMYx1YRCQscJt_yE7yOe3PkHI5qTd_ZysMWzdoPCFfwUd5yBmxnUAD5zOtaxspyycWZyd5CSYmtv_sUwsV9ybgu_aNYIwMmyN5VnDjhlhPyj8hfidykjFjdbE7ra9dmXjxeFdcBhafaCZbQaPNUQwCo104aOKzj5gAjwmpidAxywqvExdLBwWxod579iKMgJcgj6BdIEXm3MaHG7SKMZrgTMYIuhPaibcDwDFjxUQ6piu6XECVyNzCLoNhoQgJcg8KNZw4L3Sh4AHoD3CxjgnJxcWixUFAUmIyDhF5lZ-Yk_a62JalmxBHT7Onx8tfUrKy65hVtj6ms-sEQRESaT7gW3zqFLzFgBJIMEabkn3iykkQEsOvGZKkDNksXoG5fwnH2fHpRFSovN3sThP9wlF6UjJGHsmWs2aOE7ZE22tTiez1Rrc1vjuUHdHr-tb3s-lDZCu6lOjsFGuuXF77DcsimSuTezvXTzXDXhrkjqtRo_MAXeF1C4QJ1QGneWqEyPwrJz0Oja9510QzOJBeTqEAQ81qHjNPn4D98RJO8XVjALN2nUo-VfvS1Wdg4JdfkUDAJcKkKrhDqKJB99GoJvorwQ5gZh6ZedAUd1U7unqZSAxO5ZwvkfgsARU03OG9dMxNI5iXLMToEi0-1pOWfQG1lat-1QnsatIisLRwqOteOxV_llS5s6wtAAegbSJqk8cCWhCcRfqUH1Ay99G09v6gmbTc2fXDY3cjyfmjWZxkxtSFnNtKFxV3C0EFxv-4BU8eVLQl0viLuXvrRv5P6nN_dRjxfyos7R-4JUiFrO-Vvk4xf_u-5UaEaVSSk7-_Ov7LK-zRGAWMLglbWWcq86z8DF3tpIU36a9Du1L97LeDdRw9iX_D6tx6nSrinOarnaVXA7ucPLAXO6RjRph8EP3KjIEx8SY2NIbInaHg3wKt9w2F4LlczBPf2q65ErBm64S_AaJC9STy_dmN1AtfRS0uNYg5zkzm6hcjXNsadOa4EGbplPX_qt4QjguU4FI5MhKYeuamF2J3J6QbKcuS0o9AYG_6Mq1lZsaqbqqb43go9t9hVPrysL2jH2093C14fDTGDKn5N8zLapSHnzAQN2eEjw8bCeTVdlHZBho8bJGjE1eIPPKLmQjMLsJvHmKJ-gOxVyIG65MXVcdZbKVmqH8bquZtAEppR8lWNEoInaBSIrNVzD5ZOepQyABQeySrBJCbJ21cAXsv0j2IE-Xq1o4QsCaJJ8wFROkZ1i59MG9zcN5HubNHwO4U6UgBpqTuXBaqwGuWcZ94Xy_Kh4b2sosSFbnfwlTYV6oJ1ScJXqezDfVSOJBCePbSXutCHhU0VI15yXTGQ8JrYmRCQYUE9u-jh9iH0AXXV6afGg4Ze5GkRV4KJ02KolqHWKexaRz0C8TjwDVcj97gtZmoc0IHvB77NpOE61JG78cia7NPo7sodYwk4t3xjVQJm8ldqZYk-VtAbv2XJ5quxc03MON7vHSrBnkfD9pxLAigQESeea0vYKOGFqE6gVHKKm6r5oPZP2sg3BFniK1fu1OfMAklLH3UjXXdYuLn-9K1kVqB?></g></svg>