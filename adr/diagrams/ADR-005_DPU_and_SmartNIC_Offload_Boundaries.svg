<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1146px" preserveAspectRatio="none" style="width:606px;height:1146px;background:#FFFFFF;" version="1.1" viewBox="0 0 606 1146" width="606px" zoomAndPan="magnify"><title>ADR-005 - Mandatory DPU/SmartNIC Offload Boundary</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="573.2891" x="15" y="35.6357">ADR-005 - Mandatory DPU/SmartNIC Offload Boundary</text></g><ellipse cx="297.4785" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="239.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="573.5898" x="11.3486" y="81.2979"/><path d="M171.5273,81.2979 L171.5273,90.3965 L161.5273,100.3965 L11.3486,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="150.1787" x="14.3486" y="95.4297">Host and DPU inventory</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="277.4199" x="158.7686" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="221.3965" x="168.7686" y="138.6523">Discover DPU PCIe/root-complex locality,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="257.4199" x="168.7686" y="152.4512">NIC ports, NVMe namespaces, crypto, telemetry</text><polygon fill="#FCF3CF" points="214.6267,184.9941,380.3303,184.9941,392.3303,196.9941,380.3303,208.9941,214.6267,208.9941,202.6267,196.9941,214.6267,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="165.7036" x="214.6267" y="200.9875">storage path lacks qualified DPU?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="65.4253" x="137.2014" y="194.6631">not compliant</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="40.9761" x="392.3303" y="194.6631">qualified</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="255.4648" x="31.3486" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="151.4004" x="41.3486" y="240.25">Mark host storage path RED</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="235.4648" x="41.3486" y="254.0488">host fallback allowed only for degraded drills</text><ellipse cx="159.0811" cy="297.5918" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="159.0811" cy="297.5918" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="258.125" x="306.8135" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="222.0586" x="316.8135" y="240.25">Bind NVMe-oF, RDMA MR/QP mediation,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="238.125" x="316.8135" y="254.0488">tenant isolation, and telemetry to DPU profile</text><rect fill="#FFFFFF" height="294.8916" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="572.2539" x="22.6865" y="330.5918"/><path d="M93.3965,330.5918 L93.3965,339.6904 L83.3965,349.6904 L22.6865,349.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="60.71" x="25.6865" y="344.7236">Data path</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="242.4629" x="176.2471" y="366.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="161.4316" x="186.2471" y="387.9463">Coherence durable IO request</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="222.4629" x="186.2471" y="401.7451">-&gt; DPU queue pair and namespace policy</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="211.3906" x="191.7832" y="434.2881"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="191.3906" x="201.7832" y="455.5439">DPU terminates/mediates NVMe-oF</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="180.7793" x="201.7832" y="469.3428">port 4420 and RoCEv2 UDP 4791</text><polygon fill="#FCF3CF" points="205.7698,501.8857,389.1873,501.8857,401.1873,513.8857,389.1873,525.8857,205.7698,525.8857,193.7698,513.8857,205.7698,501.8857" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="183.4175" x="205.7698" y="517.8792">operation is small synchronous write?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="23.2246" x="170.5452" y="511.5547">write</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="45.2515" x="401.1873" y="511.5547">read/bulk</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="233.457" x="42.6865" y="535.8857"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="213.457" x="52.6865" y="557.1416">Apply idempotency key, ordering epoch,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="188.7715" x="52.6865" y="570.9404">optional crypto/compression offload</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="278.7969" x="296.1436" y="535.8857"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="258.7969" x="306.1436" y="557.1416">Use read steering and DMA to host/GPU staging</text><polygon fill="#FCF3CF" points="297.4785,589.4834,309.4785,601.4834,297.4785,613.4834,285.4785,601.4834,297.4785,589.4834" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="159.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="568.8789" x="14.8789" y="635.4834"/><path d="M152.5127,635.4834 L152.5127,644.582 L142.5127,654.582 L14.8789,654.582" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="127.6338" x="17.8789" y="649.6152">Control and isolation</text><polygon fill="#FCF3CF" points="205.7886,671.582,389.1685,671.582,401.1685,683.582,389.1685,695.582,205.7886,695.582,193.7886,683.582,205.7886,671.582" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="183.3799" x="205.7886" y="687.5754">DPU telemetry stale or firmware drift?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="33.0269" x="160.7617" y="681.251">unsafe</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="20.7915" x="401.1685" y="681.251">safe</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="250.7598" x="34.8789" y="705.582"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="230.7598" x="44.8789" y="726.8379">Drain namespace, revoke MRs, fence QPs,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="174.7207" x="44.8789" y="740.6367">move admission to AMBER/RED</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="258.1191" x="305.6387" y="705.582"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="238.1191" x="315.6387" y="726.8379">Expose only Coherence metrics to scheduler</text><polygon fill="#FCF3CF" points="297.4785,759.1797,309.4785,771.1797,297.4785,783.1797,285.4785,771.1797,297.4785,759.1797" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="311.4531" x="141.752" y="805.1797"/><path d="M203.8828,805.1797 L203.8828,814.2783 L193.8828,824.2783 L141.752,824.2783" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="52.1309" x="144.752" y="819.3115">Fallback</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="291.4531" x="151.752" y="841.2783"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="271.4531" x="161.752" y="862.5342">Host stack fallback requires explicit operator mode,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="208.7813" x="161.752" y="876.333">audit event, rate limit, and rollback gate</text><ellipse cx="297.4785" cy="931.876" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="297.4785" cy="931.876" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="159.0811" x2="159.0811" y1="266.5918" y2="286.5918"/><polygon fill="#34495E" points="155.0811,276.5918,159.0811,286.5918,163.0811,276.5918,159.0811,280.5918" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="202.6267" x2="159.0811" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="159.0811" x2="159.0811" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="155.0811,208.9941,159.0811,218.9941,163.0811,208.9941,159.0811,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="392.3303" x2="435.876" y1="196.9941" y2="196.9941"/><line style="stroke:#34495E;stroke-width:1;" x1="435.876" x2="435.876" y1="196.9941" y2="218.9941"/><polygon fill="#34495E" points="431.876,208.9941,435.876,218.9941,439.876,208.9941,435.876,212.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="435.876" x2="435.876" y1="266.5918" y2="313.5918"/><line style="stroke:#34495E;stroke-width:1;" x1="435.876" x2="297.4785" y1="313.5918" y2="313.5918"/><line style="stroke:#34495E;stroke-width:1;" x1="297.4785" x2="297.4785" y1="313.5918" y2="366.6904"/><polygon fill="#34495E" points="293.4785,356.6904,297.4785,366.6904,301.4785,356.6904,297.4785,360.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="297.4785" x2="297.4785" y1="164.9941" y2="184.9941"/><polygon fill="#34495E" points="293.4785,174.9941,297.4785,184.9941,301.4785,174.9941,297.4785,178.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="297.4785" x2="297.4785" y1="71.2979" y2="117.3965"/><polygon fill="#34495E" points="293.4785,107.3965,297.4785,117.3965,301.4785,107.3965,297.4785,111.3965" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="297.4785" x2="297.4785" y1="414.2881" y2="434.2881"/><polygon fill="#34495E" points="293.4785,424.2881,297.4785,434.2881,301.4785,424.2881,297.4785,428.2881" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="193.7698" x2="159.415" y1="513.8857" y2="513.8857"/><line style="stroke:#34495E;stroke-width:1;" x1="159.