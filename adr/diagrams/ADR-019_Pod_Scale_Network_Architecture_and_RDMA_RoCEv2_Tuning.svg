<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1341px" preserveAspectRatio="none" style="width:635px;height:1341px;background:#FFFFFF;" version="1.1" viewBox="0 0 635 1341" width="635px" zoomAndPan="magnify"><title>ADR-019 - Pod-Scale Network Planes and RoCEv2 Tuning</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="602.6797" x="15" y="35.6357">ADR-019 - Pod-Scale Network Planes and RoCEv2 Tuning</text></g><ellipse cx="330.0024" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="338.0178" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="385.7979" x="141.9702" y="81.2979"/><path d="M232.9214,81.2979 L232.9214,90.3965 L222.9214,100.3965 L141.9702,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="80.9512" x="144.9702" y="95.4297">Plane design</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="356.0645" x="151.9702" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="266.1152" x="161.9702" y="138.6523">Define isolated classes: mgmt/OOB, frontend/API,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="336.0645" x="161.9702" y="152.4512">RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="272.7793" x="193.6128" y="184.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="252.7793" x="203.6128" y="206.25">Use 802.1Q trunks with explicit allowed VLANs;</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="248.8301" x="203.6128" y="220.0488">no native untagged data VLAN on fabric trunks</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="331.5313" x="164.2368" y="300.9163"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="311.5313" x="174.2368" y="322.1721">Reject bandwidth/failover design; rails are not independent</text><ellipse cx="330.0024" cy="374.3157" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="330.0024" cy="374.3157" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><polygon fill="#FCF3CF" points="206.5156,252.5918,453.4893,252.5918,465.4893,264.5918,453.4893,276.5918,206.5156,276.5918,194.5156,264.5918,206.5156,252.5918" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="31.1846" x="334.0024" y="286.9097">invalid</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="246.9736" x="206.5156" y="268.5852">rail-A and rail-B share switch ASIC, PSU, or trunk?</text><rect fill="#FFFFFF" height="294.8916" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="509.6333" x="63.0232" y="429.3157"/><path d="M167.1882,429.3157 L167.1882,438.4143 L157.1882,448.4143 L63.0232,448.4143" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="94.165" x="66.0232" y="443.4475">RoCEv2 tuning</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="327.4824" x="166.2612" y="465.4143"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="250.1016" x="176.2612" y="486.6702">Map RDMA priority to PFC only where needed;</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="307.4824" x="176.2612" y="500.469">set ECN/DCQCN thresholds and headroom by port speed</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="243.4297" x="208.2876" y="533.012"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="223.4297" x="218.2876" y="554.2678">Validate MTU 9000, FEC, ECMP hashing,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="188.0977" x="218.2876" y="568.0667">flowlet/packet spray only if qualified</text><polygon fill="#FCF3CF" points="215.3806,600.6096,444.6243,600.6096,456.6243,612.6096,444.6243,624.6096,215.3806,624.6096,203.3806,612.6096,215.3806,600.6096" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="229.2437" x="215.3806" y="616.603">PFC pause storm or ECN mismatch observed?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="40.3691" x="163.0115" y="610.2786">degrade</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="35.4707" x="456.6243" y="610.2786">healthy</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="236.7148" x="75.0232" y="634.6096"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="216.7148" x="85.0232" y="655.8655">Mark rail AMBER/RED, lower admission,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="130.0488" x="85.0232" y="669.6643">reroute non-critical flows</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="188.0645" x="372.592" y="634.6096"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="168.0645" x="382.592" y="655.8655">Admit RoCEv2 UDP 4791 flows</text><polygon fill="#FCF3CF" points="330.0024,688.2073,342.0024,700.2073,330.0024,712.2073,318.0024,700.2073,330.0024,688.2073" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="255.6184" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="277.675" x="199.5884" y="734.2073"/><path d="M311.5327,734.2073 L311.5327,743.3059 L301.5327,753.3059 L199.5884,753.3059" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="101.9443" x="202.5884" y="748.3391">Storage network</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="240.8281" x="209.5884" y="770.3059"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="216.0938" x="219.5884" y="791.5618">NVMe-oF uses DPU-mediated port 4420</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="220.8281" x="219.5884" y="805.3606">separate storage class and queue budget</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="220.0977" x="219.9536" y="886.228"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="200.0977" x="229.9536" y="907.4839">Throttle background storage/prewarm</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="126.0586" x="229.9536" y="921.2827">or move to alternate rail</text><polygon fill="#FCF3CF" points="225.7415,837.9036,434.2634,837.9036,446.2634,849.9036,434.2634,861.9036,225.7415,861.9036,213.7415,849.9036,225.7415,837.9036" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="334.0024" y="872.2214">yes</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="208.522" x="225.7415" y="853.897">storage and inference collectives contend?</text><polygon fill="#FCF3CF" points="330.0024,953.8257,342.0024,965.8257,330.0024,977.8257,318.0024,965.8257,330.0024,953.8257" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="298.1641" x="180.9204" y="999.8257"/><path d="M253.1548,999.8257 L253.1548,1008.9243 L243.1548,1018.9243 L180.9204,1018.9243" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="62.2344" x="183.9204" y="1013.9575">Telemetry</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="278.1641" x="190.9204" y="1035.9243"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="258.1641" x="200.9204" y="1057.1802">Export per-port p99 latency, queue depth, drops,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="231.3984" x="200.9204" y="1070.979">PFC, ECN, QP errors, trunk member health</text><ellipse cx="330.0024" cy="1126.522" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="330.0024" cy="1126.522" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="164.9941" y2="184.9941"/><polygon fill="#34495E" points="326.0024,174.9941,330.0024,184.9941,334.0024,174.9941,330.0024,178.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="334.7151" y2="363.3157"/><polygon fill="#34495E" points="326.0024,353.3157,330.0024,363.3157,334.0024,353.3157,330.0024,357.3157" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="276.5918" y2="300.9163"/><polygon fill="#34495E" points="326.0024,290.9163,330.0024,300.9163,334.0024,290.9163,330.0024,294.9163" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="465.4893" x2="505.7681" y1="264.5918" y2="264.5918"/><polygon fill="#34495E" points="501.7681,333.3157,505.7681,343.3157,509.7681,333.3157,505.7681,337.3157" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="505.7681" x2="505.7681" y1="264.5918" y2="407.3157"/><line style="stroke:#34495E;stroke-width:1;" x1="505.7681" x2="330.0024" y1="407.3157" y2="407.3157"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="407.3157" y2="465.4143"/><polygon fill="#34495E" points="326.0024,455.4143,330.0024,465.4143,334.0024,455.4143,330.0024,459.4143" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="232.5918" y2="252.5918"/><polygon fill="#34495E" points="326.0024,242.5918,330.0024,252.5918,334.0024,242.5918,330.0024,246.5918" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="71.2979" y2="117.3965"/><polygon fill="#34495E" points="326.0024,107.3965,330.0024,117.3965,334.0024,107.3965,330.0024,111.3965" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="513.012" y2="533.012"/><polygon fill="#34495E" points="326.0024,523.012,330.0024,533.012,334.0024,523.012,330.0024,527.012" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="203.3806" x2="193.3806" y1="612.6096" y2="612.6096"/><line style="stroke:#34495E;stroke-width:1;" x1="193.3806" x2="193.3806" y1="612.6096" y2="634.6096"/><polygon fill="#34495E" points="189.3806,624.6096,193.3806,634.6096,197.3806,624.6096,193.3806,628.6096" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="456.6243" x2="466.6243" y1="612.6096" y2="612.6096"/><line style="stroke:#34495E;stroke-width:1;" x1="466.6243" x2="466.6243" y1="612.6096" y2="634.6096"/><polygon fill="#34495E" points="462.6243,624.6096,466.6243,634.6096,470.6243,624.6096,466.6243,628.6096" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="193.3806" x2="193.3806" y1="682.2073" y2="700.2073"/><line style="stroke:#34495E;stroke-width:1;" x1="193.3806" x2="318.0024" y1="700.2073" y2="700.2073"/><polygon fill="#34495E" points="308.0024,696.2073,318.0024,700.2073,308.0024,704.2073,312.0024,700.2073" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="466.6243" x2="466.6243" y1="668.4084" y2="700.2073"/><line style="stroke:#34495E;stroke-width:1;" x1="466.6243" x2="342.0024" y1="700.2073" y2="700.2073"/><polygon fill="#34495E" points="352.0024,696.2073,342.0024,700.2073,352.0024,704.2073,348.0024,700.2073" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="580.6096" y2="600.6096"/><polygon fill="#34495E" points="326.0024,590.6096,330.0024,600.6096,334.0024,590.6096,330.0024,594.6096" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="861.9036" y2="886.228"/><polygon fill="#34495E" points="326.0024,876.228,330.0024,886.228,334.0024,876.228,330.0024,880.228" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="446.2634" x2="458.2634" y1="849.9036" y2="849.9036"/><polygon fill="#34495E" points="454.2634,900.0269,458.2634,910.0269,462.2634,900.0269,458.2634,904.0269" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="458.2634" x2="458.2634" y1="849.9036" y2="965.8257"/><line style="stroke:#34495E;stroke-width:1;" x1="458.2634" x2="342.0024" y1="965.8257" y2="965.8257"/><polygon fill="#34495E" points="352.0024,961.8257,342.0024,965.8257,352.0024,969.8257,348.0024,965.8257" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="933.8257" y2="953.8257"/><polygon fill="#34495E" points="326.0024,943.8257,330.0024,953.8257,334.0024,943.8257,330.0024,947.8257" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="817.9036" y2="837.9036"/><polygon fill="#34495E" points="326.0024,827.9036,330.0024,837.9036,334.0024,827.9036,330.0024,831.9036" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="712.2073" y2="770.3059"/><polygon fill="#34495E" points="326.0024,760.3059,330.0024,770.3059,334.0024,760.3059,330.0024,764.3059" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="977.8257" y2="1035.9243"/><polygon fill="#34495E" points="326.0024,1025.9243,330.0024,1035.9243,334.0024,1025.9243,330.0024,1029.9243" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="330.0024" x2="330.0024" y1="1083.522" y2="1115.522"/><polygon fill="#34495E" points="326.0024,1105.522,330.0024,1115.522,334.0024,1105.522,330.0024,1109.522" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="27.7715" y="1141.522"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="32.7715" y="1159.6538">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="32.7715" y="1175.7524">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="32.7715" y="1191.8511">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="32.7715" y="1207.9497">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="32.7715" y="1224.0483">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="32.7715" y="1240.147">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="32.7715" y="1256.2456">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="40.5508" y="1272.3442">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="32.7715" y="1288.4429">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="32.7715" y="1304.5415">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="40.5508" y="1320.6401">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src fLPDZzis4BtxLqpJI