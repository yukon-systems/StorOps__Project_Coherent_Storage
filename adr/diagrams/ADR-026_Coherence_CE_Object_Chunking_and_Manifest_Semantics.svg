<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1738px" preserveAspectRatio="none" style="width:734px;height:1738px;background:#FFFFFF;" version="1.1" viewBox="0 0 734 1738" width="734px" zoomAndPan="magnify"><title>ADR-026 - Coherence-CE Object Chunking and Manifest Semantics</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="701.6904" x="15" y="35.6357">ADR-026 - Coherence-CE Object Chunking and Manifest Semantics</text></g><ellipse cx="367.3452" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="284.6904" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="234.0684" x="250.311" y="81.2979"/><path d="M426.0552,81.2979 L426.0552,90.3965 L416.0552,100.3965 L250.311,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="165.7441" x="253.311" y="95.4297">External protocol contracts</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="214.0684" x="260.311" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="194.0684" x="270.311" y="138.6523">S3 client uses S3 CRUD or multipart</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="180.7344" x="276.978" y="171.1953"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="160.7344" x="286.978" y="192.4512">Git LFS client uses Batch API,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="129.3926" x="286.978" y="206.25">basic transfer, and locks</text><rect fill="#F