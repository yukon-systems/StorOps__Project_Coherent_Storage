495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="367.3452" x2="367.3452" y1="1214.6821" y2="1272.7808"/><polygon fill="#34495E" points="363.3452,1262.7808,367.3452,1272.7808,371.3452,1262.7808,367.3452,1266.7808" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="367.3452" x2="367.3452" y1="1480.3005" y2="1512.3005"/><polygon fill="#34495E" points="363.3452,1502.3005,367.3452,1512.3005,371.3452,1502.3005,367.3452,1506.3005" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="94.3647" y="1538.3005"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="99.3647" y="1556.4324">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="99.3647" y="1572.531">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="99.3647" y="1588.6296">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="99.3647" y="1604.7283">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="99.3647" y="1620.8269">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="99.3647" y="1636.9255">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="99.3647" y="1653.0242">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="107.144" y="1669.1228">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="99.3647" y="1685.2214">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="99.3647" y="1701.3201">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="107.144" y="1717.4187">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLPTS-8u5dtdLzoPVUckXeP0qcb8xKuHFZAPwYGi9DcjVQ64BMDrRCaZoIJqLF_tELSsuEcjUKcGT7LrTCwvL_x9fpANL6H2wPPxKReGLkJaKX6RLwMtb8ZCoSQADQME8sErj7JMRop4CX5bvkT6-tk1b5FvLJoNj1BQDQB6rfhNYScCfNyCpi-75xF6eeYysYc_fpzQHDSYUjc6q-hm-NG-cyzunTXOsdhsujEdYyi1PgTAv4R7_xzjCXzCves0vkxho-55xngBAo-ihoVFpY_6WpucPySamtx_kd_M-ju0gusNVmDqDX_EBdy4MX_rlUMLpoIDfyjEh_-9EZGngRHIHx8pcT73vgkCF4tIKhym_KB7T2UqIgJpj9Avq5v5hjNAv5PYoQfjwbjJwTHM7nHmbE2yM8ajO3egTIQTGo8-ahHW0HonxADMXyQHDxOxNjoEwDV7nyMApiy7XEsVyV-A7WgfnxUToEI5y6h3i1UtC4lf6gWrbdPXvICIBirajkkFw6cw023d5IyRJUUNmxCh-bhc6qDtZqyqxFLwLxIOJyZeR8y_j9pUZQcmobZbbNISxFxvJdRCV8JRkCZifDrt8_ZBcYo3_PoqEnL9tliuMNIh_SPwtA6FtDF5KoUNuC7Bc23lLlgGz55ciBot-n4zF7vPq7QvcD3vuEooNOsP1nv_RjF26aIc4lSTzeQzxl2irslJzlxkbeQ3mJ1aKpbq6j42c-HEQj-5CDAAB30mE1js1_qUGuG0ofciGXCsTQ6cs0ABzXHbmWLqpr_6zroEUaHEUTbnXOnKeYAwdK94AqbacNcLSPisPRrDEifBsCDviJ-UCOB_yctkkmyFrsrAB6Y3OLZfTiMq5IhhZ9i3n3cu0P2wDV5jyWUosZNeS6SBTxeHVUxrFvxz6zn