 them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="27.2822" y="1528.8423">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="27.2822" y="1544.9409">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="27.2822" y="1561.0396">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="27.2822" y="1577.1382">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="27.2822" y="1593.2368">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="27.2822" y="1609.3354">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="35.0615" y="1625.4341">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="27.2822" y="1641.5327">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="27.2822" y="1657.6313">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="35.0615" y="1673.73">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src VLPRT-8s47xdLqpRb-qvPaqWQHRoq0C6shG4M23fvOKZR66qaIrNaabep_xtVf8DSQylO4cZkNmpyus-i0UUSIea4tdBF8kyO9fbP0uiKIyYJsdFfE6D4wtAF8cLphccgsxZ8E5xLaexLRcTCwWSyq_igQGroqr3QgYrUecKL9g-wbrVzsycZKCMMt4KzaH_j8X6B7vElRLQV3gUJgOJTw9qmdMzU_FDDpUtFUoE1SjKdlppMZJjHTE6GFFswBP_qndXS6sPjlNcrVNDiDV5vkIYfD_jZhfNhSyDPtDb-NyuEfds9xT_TxGszRbbXPMSXkDLkzEzfZQjJyRoh3tZHovfnFFua37zxB1Vby8w8FSY5rOe0DcIFELvGbga1ziQSoFI_8oyeJti98AbSCzGcKjk3B7ScQASEU0DkNGFMcqQnbRfSBYy7z3tcyroJTVNFSBr3_Y_eqN1y-5zErPPmQpOENUNzoYIqb2a3bp3ITxESNJq9--XSAMYoR4xeCVn4WuPAzonokdwjdzrHv_ARAVeOVD8_KwdSqVBQKGgboVyq6hyCAH22wKH93TEsVpfWRVLT81eJAoEN9_267MbbPGeEyFrKSJStTr4ox2whxH535te7YyVsna73fOdXBIct7gb6ovHwbQV1hJOp9QKhfOHNVUkReDgxN1mwmy1BRM2v84ZtdwdtmdxLvrEGEdyuPxwlLxVQnCPKZIW9IuXSxaDaHYkcVG8zAxwOQ_RSIuY0S8eMNdZBuKPoraANt9BiMJ6U_Sq6yvT6-O3CiXwsnGy5diHq_qOITISc9JgXIS1xShw6ZUKbSQIiUnqiJ50tMLfPiF5OXJGNWCs58pBT50XhPcGxM5p0Jc3Qe1BOGryGFOCLb0xxMFMPVvi1lIXqtr_zH7OfYc2AWifi7rNQqR0IQstSW-DulZ4XG0s4RB4Lw8o48xJEIhtUwwXzFcuFUoohUS07hXbWZhUlZ2T-LNyAjyMEidO5d6dy2n0nB_lpTP8bGR-Y-cu-f1T_wbsdtXijp6B3z1yvAxsjmVEachhVGi8LOtLQXb712sqkFKjHrzMJOYKYJtA-alVyeCnHmOGXt67Mu6ik5vHELAwjQU2Ev_gCgtM0DJOhN39i5Ye0gIGdfmOScxHk1bCM2rUtQ6IyG7mDBC0GOThYXIZXpKt1oKJSuTjiQTtphYGoCNkJ1_VVkrQFQTt9sw-XXHyVZISPhEdXp12bQMqEvs9uywVEprbOQpcZkNvRwM05VekYYwg-6lC2mTAfH0gLnoJ8752T3aCS9aP_DT2w5xZjvt_hatPJaX7yWBa4jV60RtOjyx_d_-2VwmANXMywmVFAbKMpf5xsFybzCjP3S2gp2bQFWQKyKovoWQxF0UKS_kYz7FbBujZOAuPAYIWwETPuEWa_3ZS1FJhT5t9W2RtGDjutgPCn5gXfV4B5bFknCN4CJRfNLq33GVcq4ABsMOPUC89LvFrfb8h5KC26P8JSnZV0_yND3tSLGacWrE5VIywcprGNSqm-GfsR9Ps9MEmavJIgOB3QkVkdw5l-lblYDStaLGUbty5V3rxN3qGEwAH6GR31MmGEC0_rP6korqcqFOxPkD3QC0RJPjrCNvIEp2RPgTgSfaNpWiti18lSk2MQ-L8LO668Lj9PIXOqSOauBwbp1lMB645hjGUFB3YqhHeAQ0RCs0vbULhXO-RSSiHaZ475w61Vont7AyQABrasH7n6ux801HQ4Pl_m6rvxcHOacrLMlC6svupwucFmsnYt6287iV3SBM8iX3Z8u6v7HuI-Bf0