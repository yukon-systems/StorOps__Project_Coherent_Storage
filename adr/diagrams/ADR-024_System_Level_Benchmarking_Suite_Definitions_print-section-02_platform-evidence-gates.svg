<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="754px" preserveAspectRatio="none" style="width:721px;height:754px;background:#FFFFFF;" version="1.1" viewBox="0 0 721 754" width="721px" zoomAndPan="magnify"><title>ADR-024 Print Section 02 - Platform Call-outs and Evidence Gates</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="688.2842" x="15" y="35.6357">ADR-024 Print Section 02 - Platform Call-outs and Evidence Gates</text></g><ellipse cx="377.7981" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="227.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="526.8257" x="97.2292" y="81.2979"/><path d="M255.0427,81.2979 L255.0427,90.3965 L245.0427,100.3965 L97.2292,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="147.8135" x="100.2292" y="95.4297">Cross-platform call-outs</text><polygon fill="#FCF3CF" points="300.1563,117.3965,455.4399,117.3965,467.4399,129.3965,455.4399,141.3965,300.1563,141.3965,288.1563,129.3965,300.1563,117.3965" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="155.2837" x="300.1563" y="133.3899">CUDA/ROCm/vendor backend?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="81.9307" x="206.2256" y="127.0654">backend-specific</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="39.7515" x="467.4399" y="127.0654">portable</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="200.1113" x="147.2039" y="151.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="180.1113" x="157.2039" y="172.6523">Qualify backend on supported OS</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="276.0605" x="109.2292" y="218.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="256.0605" x="119.2292" y="240.25">Use SKIPPED_PLATFORM or INCONCLUSIVE</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="157.4355" x="119.2292" y="254.0488">where backend is unavailable</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="206.0938" x="405.2898" y="151.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="113.3848" x="415.2898" y="172.6523">Run Linux, FreeBSD,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="186.0938" x="415.2898" y="186.4512">Solaris, and illumos-capable profile</text><polygon fill="#FCF3CF" points="377.7981,272.5918,389.7981,284.5918,377.7981,296.5918,365.7981,284.5918,377.7981,272.5918" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="137.0928" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="280.7617" x="237.4172" y="318.5918"/><path d="M380.4924,318.5918 L380.4924,327.6904 L370.4924,337.6904 L237.4172,337.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="133.0752" x="240.4172" y="332.7236">Abstraction validation</text><rect fill="#FDFEFE" height="88.9941" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="260.7617" x="247.4172" y="354.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="240.7617" x="257.4172" y="375.9463">