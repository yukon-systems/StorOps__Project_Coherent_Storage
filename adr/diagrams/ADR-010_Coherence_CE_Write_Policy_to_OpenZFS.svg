95E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="295.6094" x2="257.0767" y1="723.3999" y2="723.3999"/><line style="stroke:#34495E;stroke-width:1;" x1="257.0767" x2="257.0767" y1="723.3999" y2="745.3999"/><polygon fill="#34495E" points="253.0767,735.3999,257.0767,745.3999,261.0767,735.3999,257.0767,739.3999" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="506.6738" x2="545.2065" y1="723.3999" y2="723.3999"/><line style="stroke:#34495E;stroke-width:1;" x1="545.2065" x2="545.2065" y1="723.3999" y2="745.3999"/><polygon fill="#34495E" points="541.2065,735.3999,545.2065,745.3999,549.2065,735.3999,545.2065,739.3999" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="257.0767" x2="257.0767" y1="779.1987" y2="797.1987"/><line style="stroke:#34495E;stroke-width:1;" x1="257.0767" x2="389.1416" y1="797.1987" y2="797.1987"/><polygon fill="#34495E" points="379.1416,793.1987,389.1416,797.1987,379.1416,801.1987,383.1416,797.1987" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="545.2065" x2="545.2065" y1="779.1987" y2="797.1987"/><line style="stroke:#34495E;stroke-width:1;" x1="545.2065" x2="413.1416" y1="797.1987" y2="797.1987"/><polygon fill="#34495E" points="423.1416,793.1987,413.1416,797.1987,423.1416,801.1987,419.1416,797.1987" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="401.1416" x2="401.1416" y1="691.3999" y2="711.3999"/><polygon fill="#34495E" points="397.1416,701.3999,401.1416,711.3999,405.1416,701.3999,401.1416,705.3999" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="401.1416" x2="401.1416" y1="531.9048" y2="590.0034"/><polygon fill="#34495E" points="397.1416,580.0034,401.1416,590.0034,405.1416,580.0034,401.1416,584.0034" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="401.1416" x2="401.1416" y1="809.1987" y2="841.1987"/><polygon fill="#34495E" points="397.1416,831.1987,401.1416,841.1987,405.1416,831.1987,401.1416,835.1987" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="212.1465" y="867.1987"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="217.1465" y="885.3306">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="217.1465" y="901.4292">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="217.1465" y="917.5278">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="217.1465" y="933.6265">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="217.1465" y="949.7251">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="217.1465" y="965.8237">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="217.1465" y="981.9224">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="224.9258" y="998.021">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="217.1465" y="1014.1196">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="217.1465" y="1030.2183">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="224.9258" y="1046.3169">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLLRRzis67tth_ZMlRI0N5_JrCx3uFY21MqIBxS1Gm23fZvBR2JI82cdtj3_laDAJhm5VR4bKlmkvpldy1UVSycqBOJIBVUaz5POKPBBHMgUbSve8mh7HplML3gLncgsrEiVRQIy4LNX5qRxAu6GC_uc7Ygw5TeTVJMnrZnFJM4i_JeO3aSdywDD8RtQAR-dVrf4vq8-PJ5Ry_bYjfWlvc77s9HjithowTF9wG2hCoLAezEtnwQBmNHnzC7nwVFJqKdt79ktNbZVBFQ69vD17ulpbo2ZVl-ytslzE2fM6yy_ANI-6CrF_rzea-f7oojVC4rcD-rkhqjjcfgSBMl9xUcS_hGAOPUcK79Ftj3rblLVYzjMg-2CTKfMPRblpTYfJ1yWTxH1WbI937KvgdJ1pf7G8GTf4H1t5EOyRhLf8hsndSdoOao_tzqjRsau712EVyR_MKmtkMXBKsw5L-jGv_82xAZSKPaQMxkuyn41RynqlkkFwNwsH47Egx1jD0rFHxqp-bQLQqENT_SqwdQxPxHSJCdeOeyVkfbTJcXhbK7FYbq8TlLmoMsp6ACR9ysExRuZGIXhYW9ySsntId8uUpTTTkhpndhqq4VisVA-NJ9my9mIvfcnZq7lk037lTsFwVhkwvAoc-MKXeFUQLA_1np2--U4bjRWovpHxwWxwdP6lMuteUpgye96Wy4eHbCbT36c9GxnZhNlO31iHH4H6FH6dK6_6qh409GpHLrDFDGfXHOPQj6UP25ShExXw-Ggw4-FoM7sRRTbgJPAqiKCGxHCeYZCCwS9hQlc63igA-V9UR5_oJ46uSgiz9thw_E4DXQmWJ1XqacDj1MgQ4-EN_2T0njGKgS1FY5_02jfYeuzsqe_kJ5zxlO_zlu0jbc6fgfjeR1yraH6msaJjouF2Wb64bg0ZQYYmbDgIZXDY7bURJPi4VHfjyhNvIgAdvFmceB7gsTXo_WclnUlBpOjnGfzPwWiGST_RzpA5IPBufEmidue-l7HhB-nz2ifP8x8EmxSN-KiqdhfOmi8rS9gjLnmW1Qq3Nq6_hwhfHW13_E8h7uN5JzULkj2kPo-F7Jg56ZOrxH_LZwdjB9YhOfWPV5yyWXD2iShtXgP9wHIBhVm3ottgoS6rEkzvvM4X_Wpn5SRUX_FORZ8qPvrE-6tzzk786DDxoq7XI8b5Fe11r3IlMDw3XMtHVIYeEcIIsFtxQYtUcyDhthKsjGL1dbFlq22fbIEqv2QuVPlqlTZ-i5B-dL8008KnhatwKEA6eKDR0