<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1067px" preserveAspectRatio="none" style="width:802px;height:1067px;background:#FFFFFF;" version="1.1" viewBox="0 0 802 1067" width="802px" zoomAndPan="magnify"><title>ADR-010 - Coherence-CE Write Policy to OpenZFS</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="525.6367" x="136.8232" y="35.6357">ADR-010 - Coherence-CE Write Policy to OpenZFS</text></g><ellipse cx="401.1416" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="239.1118" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="790.2832" x="6" y="81.2979"/><path d="M131.917,81.2979 L131.917,90.3965 L121.917,100.3965 L6,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="115.917" x="9" y="95.4297">Write classification</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="273.4531" x="264.415" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="253.4531" x="274.415" y="138.6523">Publish KV/object mutation with durability class,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="233.4902" x="274.415" y="152.4512">lease_epoch, idempotency_key, byte_count</text><polygon fill="#FCF3CF" points="87.49,184.9941,200.5784,184.9941,212.5784,196.9941,200.5784,208.9941,87.49,208.9941,75.49,196.9941,87.49,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="66.6499" x="148.0342" y="219.312">recomputable</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="113.0884" x="87.49" y="200.9875">class is KV-D0/KV-D1?</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="256.0684" x="16" y="240.812"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="236.0684" x="26" y="262.0679">Use write-around or memory-only write-back</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="137.4082" x="26" y="275.8667">no durable ACK promised</text><polygon fill="#FCF3CF" points="348.2478,184.9941,461.3362,184.9941,473.3362,196.9941,461.3362,208.9941,348.2478,208.9941,336.2478,196.9941,348.2478,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="65.4414" x="408.792" y="219.312">bounded loss</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="113.0884" x="348.2478" y="200.9875">class is KV-D2/KV-D3?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="36.6953" x="473.3362" y="194.6631">durable</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="225.4473" x="292.0684" y="240.812"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="181.418" x="302.0684" y="262.0679">Use write-back with flush deadline</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="205.4473" x="302.0684" y="275.8667">and scheduler-visible dirty-byte budget</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="248.7676" x="537.5156" y="244.387"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="228.7676" x="547.5156" y="265.6428">Use write-through to OpenZFS before ACK</text><rect fill="#FFFFFF" height="213.4951" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="586.2461" x="93.8506" y="330.4097"/><path d="M159.8848,330.4097 L159.8848,339.5083 L149.8848,349.5083 L93.8506,349.5083" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="56.0342" x="96.8506" y="344.5415">Buffering</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="236.0703" x="283.1064" y="366.5083"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="216.0703" x="293.1064" y="387.7642">Stage in kv_dram_warm or kv_cxl_warm</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="190.7637" x="293.1064" y="401.563">track dirty_ranges and writer_epoch</text><polygon fill="#FCF3CF" points="343.9609,434.106,458.3223,434.106,470.3223,446.106,458.3223,458.106,343.9609,458.106,331.9609,446.106,343.9609,434.106" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="114.3613" x="343.9609" y="450.0994">dirty budget exceeded?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="314.8433" y="443.7749">yes</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="470.3223" y="443.7749">no</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="291.459" x="113.8506" y="468.106"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="271.459" x="123.8506" y="489.3618">Force flush, throttle producer, or demote admission</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="234.7871" x="425.3096" y="468.106"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="214.7871" x="435.3096" y="489.3618">Continue coalescing and checksumming</text><polygon fill="#FCF3CF" points="401.1416,507.9048,413.1416,519.9048,401.1416,531.9048,389.1416,519.9048,401.1416,507.9048" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="267.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="596.2598" x="92.3521" y="553.9048"/><path d="M182.5171,553.9048 L182.5171,563.0034 L172.5171,573.0034 L92.3521,573.0034" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="80.165" x="95.3521" y="568.0366">Durable path</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="205.4023" x="298.4404" y="590.0034"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="185.4023" x="308.4404" y="611.2593">Flush via DPU NVMe-oF port 4420</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="177.416" x="308.4404" y="625.0581">RoCEv2 UDP 4791 storage class</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="294.7227" x="253.7803" y="657.6011"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="274.7227" x="263.7803" y="678.8569">OpenZFS commits zfs_slog, checksum, mirror write</text><polygon fill="#FCF3CF" points="307.6094,711.3999,494.6738,711.3999,506.6738,723.3999,494.6738,735.3999,307.6094,735.3999,295.6094,723.3999,307.6094,711.3999" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="187.0645" x="307.6094" y="727.3933">ACK mismatch, timeout, or split brain?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="29.96" x="265.6494" y="721.0688">failure</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="39.7354" x="506.6738" y="721.0688">success</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="289.4492" x="112.3521" y="745.3999"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="269.4492" x="122.3521" y="766.6558">Fence writer epoch and trigger recovery semantics</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="246.8105" x="421.8013" y="745.3999"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="226.8105" x="431.8013" y="766.6558">Return durable_epoch to Coherence mesh</text><polygon fill="#FCF3CF" points="401.1416,785.1987,413.1416,797.1987,401.1416,809.1987,389.1416,797.1987,401.1416,785.1987" style="stroke:#B7950B;stroke-width:1;"/><ellipse cx="401.1416" cy="852.1987" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="401.1416" cy="852.1987" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="144.0342" x2="144.0342" y1="208.9941" y2="240.812"/><polygon fill="#34495E" points="140.0342,230.812,144.0342,240.812,148.0342,230.812,144.0342,234.812" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="144.0342" x2="144.0342" y1="288.4097" y2="308.4097"/><polygon fill="#34495E" points="140.0342,298.4097,144.0342,308.4097,148.0342,298.4097,144.0342,302.4097" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="404.792" x2="404.792" y1="208.9941" y2="240.812"/><polygon fill="#34495E" points="400.792,230.812,404.792,240.812,408.792,230.812,404.792,234.812" style="stro