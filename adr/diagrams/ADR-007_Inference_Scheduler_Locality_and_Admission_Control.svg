lygon fill="#34495E" points="676.2803,800.2747,680.2803,810.2747,684.2803,800.2747,680.2803,804.2747" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="680.2803" x2="680.2803" y1="844.0735" y2="874.2974"/><polygon fill="#34495E" points="676.2803,864.2974,680.2803,874.2974,684.2803,864.2974,680.2803,868.2974" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="144.7227" x2="680.2803" y1="874.2974" y2="874.2974"/><line style="stroke:#34495E;stroke-width:1;" x1="405.498" x2="405.498" y1="874.2974" y2="906.2974"/><polygon fill="#34495E" points="401.498,896.2974,405.498,906.2974,409.498,896.2974,405.498,900.2974" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="220.8594" y="932.2974"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="225.8594" y="950.4292">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="225.8594" y="966.5278">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="225.8594" y="982.6265">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="225.8594" y="998.7251">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="225.8594" y="1014.8237">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="225.8594" y="1030.9224">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="225.8594" y="1047.021">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="233.6387" y="1063.1196">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="225.8594" y="1079.2183">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="225.8594" y="1095.3169">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="233.6387" y="1111.4155">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLRRRjj647tNLqpJbmIWGbtiE98V2kgM6BLaHPQDeZ0WhCaHkV5obzrTofQB_7jdI5fIM-H5tklicJDd3lsBpp17A9IGkkMUf2w45JcuJ2JcMUeKja8vFDcnfjH9RAn62ztUoKQ2Mr4gFpFQBmI5dE1tSL_2hT3kv5HahNaU6sKi_De_EnkSJqysHUpbJlez_Dq268duAQrUQuxF9hFfRCexnYPeczNpJv_EB_gqEf4YDphv_xNnh3-UdHmulJsw69ntHhHvwuNrpMBtx3pgzsXnUWWowFL6lMxhnmbORJp-1EXqDfXU_1TeyzIFbfTU8KIJLRlJkO0stCOP9gKYFgzDB1JdBtG2KP9BvwJHC2PAhL6jbi8KQSVADFEj2JgPwZVQ7MpfaKIAbB0vABL2voWElmDQCEiEkDR3LXkYs1iRHikh8NnThvUtS7RM1xh-cVvUmas1EhfgnoOlX9UFZ7LvHGef7I79qAAEiQrfQrVjVAI0ApEUxdf3k9ii2P3pahS9-Td5e7i9tylyqS1yVGU3JgTp2SlP68nMU_g1rMGUGM6biT9BT1niSJ_7jfaDAHiNcntQVHZN33173krEniXtr-DbMDytrbCEFOezMTwrSoGUF2P0DKtHLq7Ng4Zdtkw7SBE-NaAwMexXhD-z2Eevyy3ppm4ihQ6J6LA-WywW4mwwdKu0wM9-1OD-Vr15a