acing" textLength="528.3633" x="42.5605" y="991.71">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="42.5605" y="1007.8086">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="42.5605" y="1023.9072">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="42.5605" y="1040.0059">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="42.5605" y="1056.1045">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="42.5605" y="1072.2031">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="50.3398" y="1088.3018">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="42.5605" y="1104.4004">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="42.5605" y="1120.499">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="50.3398" y="1136.5977">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLNRRkCs47ttLqotBrd0ZdpB9d8U2iUNra0kNji9YYA0GOiZYMkAT4dAMRVOV--GKcnljtsnAP8pF9mvv_0dbsE1i9DCg8RT2hLZXXLWSyRrcr0Pf4nQF5inkbGyqKQXWKxtR85ZoahffbgvHqOfn_Y5lPImPCgUxHeQezz6Mce3F_Vw_VXgShR84YVsmXtWxmR07KksMJYjtZuTJoVJYL_HXgEfPwy-VRgwxj7iMB12A_vZs6ZQ6qtFDfn7trt7L-qxMbmwPbmzsUbV3NjTcfmSayJTxbstq_Xs1bPfX_y3T3AD9zV_1beVzQtXX9C8m_6YrMxVG0iMmr_X1HD7csQAurTWYiD8crrfOObcBn9iD2HcIDD6PBbhZD6AJBrNt49AeLomZ61PA9L4Qoc9Fm8KymMtuDiyQBHWwC-9XlFP07vRhUPBwFTxGE4tz7yBJpjKmrahqSMEER7nCESp8WSX6UaS3Qe4MugMzc7baX8kz6YoxmxWUJmdGDO9lwmLzA_ZpYryAOkDXeVLCyJjTliMvjCHQ2KFz0EBySCGTaPe8vn0wvCzlZnWIqy7T1kRw3sQGvGGduoMakXcgsBusDLe7bNnsZYwGvToZ-VFhGAf3WuvK3ipT27f2YLHt9d309vMztF85lCHz7kTwsRrxUlWls-QC3UQTkP8zutRSJkAE-rs4xB7Xnd4lLuSiec2P360EGNX7fMBg35ec0mLw7NYgDTjUuZK066rhD24eAXWYcM4HJb89BC1tSlzyD7BJmt02eSjkyD4f2A1sPYQQ12ObFeDUHCsPHs65ehIEh2E7Ovd38XlHLQuwEdfhWcfeR8HONodcrMb3HEoDJp_e7sMs42GehhmJN3lnMhMeCETJQcsTW0txUvbvpFLDileKkLE2fg-hJC7sbPvAtWa4EyZ_Wha8aAMDEAw8AFnEU_AD4L3IRVxTRufra7xsFIVd7YyVcEc25_9LtdwCBnWQxftHiYQTEE_KhksKcVDC68cgGQo6uPwyuLqjKvOabFcVT3OEaV6gwdB1bMe4bQZORq1D4ZQ94_Ftm-VIw8Vq3c6vFGXA7qmKsab0Z3uPqbi3_-2Tj306O5x9b-9hop1jQ2M9K75OOZ51ZcdTEkTqQcGUEiJZgYxzQuZlLrEPfBb9yN1nfiBCuTNTTHi50HBRdA6UF9-H6Y525v2Eiuhy2A5YoC820NWltpqng3W8XVk8-qXHCyMpx26RI7T3zNp-97U1hWeXBLrzA9KfsWeD4T9XiIzUFrvfPVnylw9kCn9dY65uYAjuLLd1D9ma3eXKJbD4Z_X39FrMKka9kVrll5Y-12DVh-lh-rXsXD2WmMvTHqtHKTXrI7UOseBYogsX8gzAelUvHsU-WhKrjGBCsZm1Fsx5jIsdH-8mtwcviq2IQNacKbEGWAo0P5wyeGs5KNfcBTQAb2ojMLnMrUZsYpKTpIEQfuVAr9rwDI_1RhIgFgaJUa97ef8phPpD24aTUDKcKHBVenat1j74Pw1FwRBzugGEnlO2-OTzbNLLX5CrxySWPBHiWU1aFzPbI7t5F73595lwBqyKV9KtrqSU-uZLLrPMAscg-CbETBRnl48b9TU9tgttZQfGOQ5gtf6DJqYUXS9SAtGqrNrjeuVaJSALU9xKRob5Xjwb7m_E2R4slEBa4Vk_W40?></g></svg>