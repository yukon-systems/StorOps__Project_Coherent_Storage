<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="962px" preserveAspectRatio="none" style="width:752px;height:962px;background:#FFFFFF;" version="1.1" viewBox="0 0 752 962" width="752px" zoomAndPan="magnify"><title>ADR-012 - Coherence-CE API Contract for vLLM Adapters</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="602.6475" x="73.4858" y="35.6357">ADR-012 - Coherence-CE API Contract for vLLM Adapters</text></g><ellipse cx="376.3096" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="163.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="292.1348" x="230.2422" y="81.2979"/><path d="M344.5107,81.2979 L344.5107,90.3965 L334.5107,100.3965 L230.2422,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="104.2686" x="233.2422" y="95.4297">Client-facing API</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="272.1348" x="240.2422" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="230.7715" x="250.2422" y="138.6523">Client calls /chat/completions or /responses</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="252.1348" x="250.2422" y="152.4512">HTTPS 443 using OpenAI-compatible payloads</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="258.7871" x="246.916" y="184.9941"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="206.7656" x="256.916" y="206.25">vLLM adapter may call /coherence/kv/*</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="238.7871" x="256.916" y="220.0488">HTTPS 8443 for lookup/publish/reserve/flush</text><rect fill="#FFFFFF" height="171.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="677.3247" x="31.8215" y="254.5918"/><path d="M142.1868,254.5918 L142.1868,263.6904 L132.1868,273.6904 L31.8215,273.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="100.3652" x="34.8215" y="268.7236">Contract firewall</text><polygon fill="#FCF3CF" points="215.2063,290.6904,537.4128,290.6904,549.4128,302.6904,537.4128,314.6904,215.2063,314.6904,203.2063,302.6904,215.2063,290.6904" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="322.2065" x="215.2063" y="306.6838">adapter request references DPU, zvol, QP, VLAN, or CXL device?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="31.1846" x="172.0217" y="300.3594">invalid</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="22.623" x="549.4128" y="300.3594">valid</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="282.7695" x="51.8215" y="324.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="262.7695" x="61.8215" y="345.9463">Reject lower-layer leakage with 4xx contract error</text><ellipse cx="193.2063" cy="403.2881" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="193.2063" cy="403.2881" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="259.4668" x="429.6794" y="324.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="239.4668" x="439.6794" y="345.9463">Accept logical handles: model_id, prefix_key,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="200.7656" x="439.6794" y="359.7451">durability_class, locality_hint, trace_id</text><rect fill="#FFFFFF" height="174.5142" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="740.6191" x="6" y="436.2881"/><path d="M133.5166,436.2881 L133.5166,445.3867 L123.5166,455.3867 L6,455.3867" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="117.5166" x="9" y="450.4199">Operation dispatch</text><polygon fill="#FCF3CF" points="106.6274,475.3867,145.1597,475.3867,157.1597,487.3867,145.1597,499.3867,106.6274,499.3867,94.6274,487.3867,106.6274,475.3867" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="22.0161" x="129.8936" y="509.7046">read</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="38.5322" x="106.6274" y="491.3801">lookup?</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="219.7871" x="16" y="531.2046"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="199.7871" x="26" y="552.4604">Return hit/miss + opaque payload_ref</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="185.4375" x="26" y="566.2593">no physical address or namespace</text><polygon fill="#FCF3CF" points="317.5479,475.3867,384.8154,475.3867,396.8154,487.3867,384.8154,499.3867,317.5479,499.3867,305.5479,487.3867,317.5479,475.3867" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="23.2246" x="355.1816" y="509.7046">write</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="67.2676" x="317.5479" y="491.3801">publish/flush?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="82.5483" x="396.8154" y="485.0557">admission/health</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="190.7891" x="255.7871" y="531.2046"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="170.7891" x="265.7871" y="552.4604">Return accepted/durable_epoch</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="130.0605" x="265.7871" y="566.2593">according to class policy</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="270.043" x="466.5762" y="534.7795"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="250.043" x="476.5762" y="556.0354">Return GREEN/AMBER/RED/DRAIN summary</text><rect fill="#FFFFFF" height="95.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="360.1445" x="196.2373" y="620.8022"/><path d="M327.6367,620.8022 L327.6367,629.9009 L317.6367,639.9009 L196.2373,639.9009" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="121.3994" x="199.2373" y="634.9341">Streaming behavior</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="340.1445" x="206.2373" y="656.9009"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="197.4141" x="216.2373" y="678.1567">Preserve token streaming semantics;</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="320.1445" x="216.2373" y="691.9556">Coherence errors map to retryable, throttled, or fatal classes</text><ellipse cx="376.3096" cy="747.4985" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="376.3096" cy="747.4985" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="376.3096" x2="376.3096" y1="164.9941" y2="184.9941"/><polygon fill="#34495E" points="372.3096,174.9941,376.3096,184.9941,380.3096,174.9941,376.3096,178.9941" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="376.3096" x2="376.3096" y1="71.2979" y2="117.3965"/><polygon fill="#34495E" points="372.3096,107.3965,376.3096,117.3965,380.3096,107.3965,376.3096,111.3965" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="193.2063" x2="193.2063" y1="358.4893" y2="392.2881"/><polygon fill="#34495E" points="189.2063,382.2881,193.2063,392.2881,197.2063,382.2881,193.2063,386.2881" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="203.2063" x2="193.2063" y1="302.6904" y2="302.6904"/><line style="stroke:#34495E;stroke-width:1;" x1="193.2063" x2="193.2063" y1="302.6904" y2="324.6904"/><polygon fill="#34495E" points="189.2063,314.6904,193.2063,324.6904,197.2063,314.6904,193.2063,318.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="549.4128" x2="559.4128" y1="302.6904" y2="302.6904"/><line style="stroke:#34495E;stroke-width:1;" x1="559.4128" x2="559.4128" y1="302.6904" y2="324.6904"/><polygon fill="#34495E" points="555.4128,314.6904,559.4128,324.6904,563.4128,314.6904,559.4128,318.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="559.4128" x2="559.4128" y1="372.2881" y2="419.2881"/><line style="stroke:#34495E;stroke-width:1;" x1="559.4128" x2="376.3096" y1="419.2881" y2="419.2881"/><line style="stroke:#34495E;stroke-width:1;" x1="376.3096" x2="376.3096" y1="419.2881" y2="460.3867"/><line style="stroke:#34495E;stroke-width:1;" x1="376.3096" x2="376.3096" y1="232.5918" y2="290.6904"/><polygon fill="#34495E" points="372.3096,280.6904,376.3096,290.6904,380.3096,280.6904,376.3096,284.6904" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="125.8936" x2="125.8936" y1="499.3867" y2="531.2046"/><polygon fill="#34495E" points="121.8936,521.2046,125.8936,531.2046,129.8936,521.2046,125.8936,525.2046" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="125.8936" x2="125.8936" y1="578.8022" y2="598.8022"/><polygon fill="#34495E" points="121.8936,588.8022,125.8936,598.8022,129.8936,588.8022,125.8936,592.8022" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="351.1816" x2="351.1816" y1="499.3867" y2="531.2046"/><polygon fill="#34495E" points="347.1816,521.2046,351.1816,531.2046,355.1816,521.2046,351.1816,525.2046" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="351.1816" x2="351.1816" y1="578.8022" y2="598.8022"/><polygon fill="#34495E" points="347.1816,588.8022,351.1816,598.8022,355.1816,588.8022,351.1816,592.8022" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="157.1597" x2="305.5479" y1="487.3867" y2="487.3867"/><polygon fill="#34495E" points="295.5479,483.3867,305.5479,487.3867,295.5479,491.3867,299.5479,487.3867" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="376.3096" x2="125.8936" y1="460.3867" y2="460.3867"/><line style="stroke:#34495E;stroke-width:1;" x1="125.8936" x2="125.8936" y1="460.3867" y2="475.3867"/><polygon fill="#34495E" points="121.8936,465.3867,125.8936,475.3867,129.8936,465.3867,125.8936,469.3867" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="396.8154" x2="601.5977" y1="487.3867" y2="487.3867"/><line style="stroke:#34495E;stroke-width:1;" x1="601.5977" x2="601.5977" y1="487.3867" y2="534.7795"/><polygon fill="#34495E" points="597.5977,524.7795,601.5977,534.7795,605.5977,524.7795,601.5977,528.7795" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="601.5977" x2="601.5977" y1="568.5784" y2="598.8022"/><polygon fill="#34495E" points="597.5977,588.8022,601.5977,598.8022,605.5977,588.8022,601.5977,592.8022" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="125.8936" x2="601.5977" y1="598.8022" y2="598.8022"/><line style="stroke:#34495E;stroke-width:1;" x1="376.3096" x2="376.3096" y1="598.8022" y2="656.9009"/><polygon fill="#34495E" points="372.3096,646.9009,376.3096,656.9009,380.3096,646.9009,376.3096,650.9009" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="376.3096" x2="376.3096" y1="704.4985" y2="736.4985"/><polygon fill="#34495E" points="372.3096,726.4985,376.3096,736.4985,380.3096,726.4985,376.3096,730.4985" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="162.4824" y="762.4985"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="167.4824" y="780.6304">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="167.4824" y="796.729">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="167.4824" y="812.8276">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="167.4824" y="828.9263">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="167.4824" y="845.0249">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="167.4824" y="861.1235">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="167.4824" y="877.2222">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="175.2617" y="893.3208">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="167.4824" y="909.4194">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="167.4824" y="925.5181">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="175.2617" y="941.6167">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLN9ajis4BthAphEnKaeKzjuBEcGqcX9fceMMHwxSfWg5OPiaR10W050pIWf_tiUI4cMu_958fRUNlTx-CddN32LIaZTSbkfIs55GIuNgNcMEgEDK8xFJgofT9eOgzbIjtTsaF96LCelZFPt0Yvd_5bygkY3qExiriHQypmrobZwkJyO32_cPuSYyN8d_Px-RH5TYMIRrT4ErnUpnNmn3oV6fcmFknTltrvSzh4xaw8mEltURBheJnTd5ywjhow75vqh77xmmlh3PdTmCUdti3a_EHdsUbUzRklBMRBQUFv1elF5S7xv_qGFeRwqlFIAQJ9RjJlT7hLfQdAsh1DkJ-SqMLvZGtiBB6W3kztDpIrDKb5wjgxLKfonJidABFUj6JkPwIFohhw