0000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="168.0527" x="389.0989" y="220.0488">HTTP 8000 JSON/binary REST</text><rect fill="#FFFFFF" height="291.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="749.6934" x="42.509" y="254.5918"/><path d="M155.9983,254.5918 L155.9983,263.6904 L145.9983,273.6904 L42.509,273.6904" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="103.4893" x="45.509" y="268.7236">Translation layer</text><polygon fill="#FCF3CF" points="450.4739,290.6904,509.7922,290.6904,521.7922,302.6904,509.7922,314.6904,450.4739,314.6904,438.4739,302.6904,450.4739,290.6904" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="59.3184" x="450.4739" y="306.6838">S3 request?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="421.3562" y="300.3594">yes</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="61.7461" x="521.7922" y="300.3594">REST native</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="214.1094" x="198.0745" y="324.6904"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="185.4141" x="208.0745" y="345.9463">meta_translate_service normalizes</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="194.1094" x="208.0745" y="359.7451">method, bucket, key, query, headers</text><polygon fill="#FCF3CF" points="233.2881,392.2881,376.9702,392.2881,388.9702,404.2881,376.9702,416.2881,233.2881,416.2881,221.2881,404.2881,233.2881,392.2881" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="143.