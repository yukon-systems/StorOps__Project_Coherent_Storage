fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="225.0657" y="1033.0078">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="225.0657" y="1049.1064">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="225.0657" y="1065.2051">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="225.0657" y="1081.3037">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="225.0657" y="1097.4023">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="225.0657" y="1113.501">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="225.0657" y="1129.5996">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="232.845" y="1145.6982">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="225.0657" y="1161.7969">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="225.0657" y="1177.8955">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="232.845" y="1193.9941">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLNRSXev47tdAtgpBqdLuE7csC335kPIwztOPWtsawieCTCCYcSa8WbiulA_xv5cZ4as-mAZItUVFdswzPjRSy6qoOLKDVierKOOKP1TYrG_IPNHIkIMZqwCtgeqqKQneMRhw23bbTZcRgALknPmEUAludvBCw7iqQs1CVffg7DjwFTsfzCz7HyTYiJ9dNHxUgaHNOZaCGlHgkkJqMGy6ViJRL8srUxfvy-dPstiZgGej4h_QpQSj8UJeml7rXTdtTF61GvdJXXNRJOxfuDs2vlZWvDkgtNHQjPUZy0gxVX_W8udtV7Ppq2hKAyr9rtED1ZTrXkj5jLfrevlbbyvSNGxdirfRi1OBXniX4ffQdWbd-j3aQoPRlNMiQtLSiuOPqPcQrSRiPMPUkFVqWgMgHGPG5hQgfojXISVa9Jmz5loHU_LwZH842OUJ2zxzETyFfrHfzCcc9_Zlqyt6rQ3otgYYurmSkb1JoyXbQsbeLwpOPLmNU5e5qvEuF1M3yUxLe_kHbC0iaxwOwseSzPjzkdhjbXgkfhVKRVHQFHfEXcILlaUFtGxkXhGnaXjf9DilRFh-okkwqaFsTX4xzZiumJgCZhF8JxBPYSJzhRpuJGkxRLnoA45twFfNRrWyE0u9HGtOnUSpZc7u9tPz-Xc_cLAsUrqI9rsyomgrvu7lpwFGBt6pJKZtswZsuYxpKOZekpwwfAwxNOtU9C5cgH7KnZnZfMBKHWs8WyCj9lTkDrgU8WeWBGwBz44exWGIcJ0eXmbkR01tVsNmRLlHjKZAntNxOOJkP89NOvGHCCaybm_SHhHSbkPiQLYQnrP9_Q763sehyWA5z_SN4IqCg0DWl6LZagcZP1vVN2ym3qBDG1IN14VaNiZAwf0XvpDLZtQ7fqtMYVDVy1jbY6fxIQNsEvNdeDsIxybFBIBdoe-1SmKcM_nbUe2OyVxlDYkLcpWz76tM2-BHPW47Fbb2XqldeGfmYfvpjyN9Yt40dbdG1OXu-yhkx2vpgBm9KnIVkIjyAb3aoqItqaHxTXhVx5caPPR9pKmL3PMhMRzEAYXqT6iNhyVBbLcV2DjZ7OwqRdz47g_DskZ2ZBK4AMnPDiBnMvHYVD11JcTDyuRQFCAmS57tpi8FV-32yHnltJIQD1VivlhU8ckClimBVgO9qSetsQ7N-HYpwP4ALVq4U4DVzl2zn-VVFyh-hXd-mcd084QYuMhZFajC6fc2f7BxsmVbEy47NINFB83_GnHm9_NXYSHrUi7PpvOUOaAiS6iqKWupB10yo5wkLa2y3mmf8j1el1ss8r8U57e57KwhAC7fJS-CpINL2a_BoJWU9cLdh2avHuZ89V9leJ2UBheOydw8T2Ls7XCSRbjuvSIx6lyWfHUAqELobNjpK4eKJddAhxkmKeAflnhY5-HGSRGU1YO695XIa72tbdfweSgJO_eEDnzhnG_2o-IhPybBaxHWkwTjN3uwK3qU-huij3GuUBEGtndD-3qQH_N8dxn7B_69oSdrJw3ZuFFrsCMfVh98mSjWxFmm9IWzGQppoVve3fGQsK3Lq26TxrV6MFER7x1S-87U-BDAvfdZCPT-mUfyXGeXuebaaL8Z9n4E