091.9272"/><polygon fill="#34495E" points="339.4531,1081.9272,343.4531,1091.9272,347.4531,1081.9272,343.4531,1085.9272" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="343.4531" x2="343.4531" y1="966.231" y2="1024.3296"/><polygon fill="#34495E" points="339.4531,1014.3296,343.4531,1024.3296,347.4531,1014.3296,343.4531,1018.3296" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="343.4531" x2="343.4531" y1="1189.7261" y2="1221.7261"/><polygon fill="#34495E" points="339.4531,1211.7261,343.4531,1221.7261,347.4531,1211.7261,343.4531,1215.7261" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="96.6016" y="1247.7261"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="101.6016" y="1265.8579">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="101.6016" y="1281.9565">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="101.6016" y="1298.0552">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="101.6016" y="1314.1538">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="101.6016" y="1330.2524">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="101.6016" y="1346.3511">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="101.6016" y="1362.4497">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="109.3809" y="1378.5483">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="101.6016" y="1394.647">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="101.6016" y="1410.7456">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="109.3809" y="1426.8442">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src XLRBSjiu4BphAsQpbwIM2lMmuqW-RCbwrBegjhMAxLEgL101aOX1W0k0ifMK_tqR94KhcyTU9E8rxEdfQV0tdubSKA6Or1tt87N1BCl9POoRHwbJsZBbnD6ADQNcYR5QMEeFZXQusB9I-ONH_feXv4nyPlSbVMJQ7UsQM6iUfqOPIxyFJqv6f_EZHPPukPD-JryxH1SiUKYhjpNR5xF5V34FAyPoOPlPqtVlJi-6c9r9bXlDlpysNGodYwCDnwSlpaQdlGiiVlJC-cQoVt8w6GumEM-3Z0Q3Yq6_ytm4LXilVW9qlXZDp_uBj7dLSyTBhmHDPgjkRp2aBjrfkPM24zCS67EXdJIQARhKN3nXFh3f2fO8r-aeaGfiipBDV6Scd4prWNX7Mxo6IvO2dQDIA-4SWeOtaMQ1TqUXskDEboQ9DpQUB2_7zDVjxV8ZdPmC2SVVu_-SRWgX9vVTnEG5yt8Jq2uleP7IqTHamWgTYAx6qgvQUOk0ApETxmPZkfij0SXv6PQDffEpKV-SFfVvnj3LxHsDUhtUEIqNKp9QxV53gzdLX0ehZPLU2XU2NTzVYQvPZ96DIynEs7sSG5RMA0NLEM5tCX7XxErq6TVdZVN8OO3Oi-LTDnVWmOCxL3KLlWfwAnIKxkr-J3Ut7vQKhfPJEXdspw9w77W8u_SHBQt1pamWtr5lr8j7_LulelJwwf96m-6eYYPpTCUObZWaTaBx68KH5cKB30pxetWuw0M8A81qHjLegaDnpZHBWKLxI