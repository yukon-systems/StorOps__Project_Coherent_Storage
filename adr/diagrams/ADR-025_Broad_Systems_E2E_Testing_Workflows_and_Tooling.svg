332,1743.7529,365.5332,1733.7529,361.5332,1737.7529" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="361.5332" x2="361.5332" y1="1938.0449" y2="1970.0449"/><polygon fill="#34495E" points="357.5332,1960.0449,361.5332,1970.0449,365.5332,1960.0449,361.5332,1964.0449" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="52.8115" y="1996.0449"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="57.8115" y="2014.1768">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="57.8115" y="2030.2754">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="57.8115" y="2046.374">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="57.8115" y="2062.4727">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="57.8115" y="2078.5713">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="57.8115" y="2094.6699">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="57.8115" y="2110.7686">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="65.5908" y="2126.8672">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="57.8115" y="2142.9658">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="57.8115" y="2159.0645">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="65.5908" y="2175.1631">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLPTS-8u5dtdLzoTUUcfCcq2IQUXQsgBy37B3WaCaFJMlgI4BHirjiL8CdHwQ_xxdYlRXCnCloHO7rVtddlEaVxXTZANTCY4Abfshug3C28dknEnFgaYfKHaLbxC65qMSQHD8GrTTIycOfc8CdDJNRW7WP1Z-KKybRGMXRrODJH6dqOwquP-x5rVzsyc5vCYSkget0lzhqLq9w9zwa-hbq_7qybqmZFQnDBKepSVFjpSzZ0wLYBNHVpNRQDfRpIzM72v--wsVzEvm-JQ2UFgmQlhcs6lYy79EKY_sxthNhN-k4Ysq4v-9z79j3-v_NEYzL5_j9nocQJXUDNkT6-eJNT6YxYzVh5EvfOctGbjf7MC_MTjzaccJvP44TD6wmoZhLOcKublezATQusbLMdHe6yfmLcn4YbIj5GMcRIycu-ZGZ3ubhZbWrQRXf7J9XmkPmFwrsQpNDFrTO-m_IF-VwB5GHR3MJlI-K4ujUMKbpCGfRGqqZjfP179Te6fevzvZu0hFPeSkmDw72-H4DU0QLtGzMt_wXDzAVEjfllD8_KxdSudMav7f8li1NzeDRuVqi4eRPHJqdAmXwTxsTRJ0QgnaJvAyn96u9RHMGRgMMcEAfAyTpDQXjL-RHngw2BsUFdOpYLmS38cj3QLpWVTo0nqT-PbG8lDV4dfQZcYwzxLRL1zCmxy_J6WfT5OkPEejz_fTyB-LQSJKFfmFwD-hzVtqLIEXWneYKtoA0iNeZ7IYCmZqBlgXxrkXrD40vJLMPMDtnJceX0fSYaSHPcmFhkd-V21fLWCo2eds_OW8vMeY6PZDD584XdO8EE0jcMzJLhAI-l8El5oFcC0xkLfxiB5uYwWn00s48Ox7LH86w6ozl3o0-iis82KmXhuW5m3Lb0dxMisPR6t0_hOwRw_-WtOfYcAAW-Wvjv-gYDxlbPng_GW5lOKBW6Eeh8IlsATmtGuvbsP9D8WwFxulDlcpzu7PC2VCNZyV18czr_Hr-prmyIvU4RTAJ8BKF6tn3xRJAU1_oLCLFt8klwdtdwHaNkEHBH3vADaxZ_lf8YheVSj85G9gzMoR0Ojo1nIPVx-i4HFV4tSW0