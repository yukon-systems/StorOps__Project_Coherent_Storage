;" x1="437.1846" x2="462.6641" y1="446.937" y2="446.937"/><line style="stroke:#34495E;stroke-width:1;" x1="462.6641" x2="462.6641" y1="446.937" y2="468.937"/><polygon fill="#34495E" points="458.6641,458.937,462.6641,468.937,466.6641,458.937,462.6641,462.937" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="215.916" x2="215.916" y1="516.5347" y2="534.5347"/><line style="stroke:#34495E;stroke-width:1;" x1="215.916" x2="327.29" y1="534.5347" y2="534.5347"/><polygon fill="#34495E" points="317.29,530.5347,327.29,534.5347,317.29,538.5347,321.29,534.5347" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="462.6641" x2="462.6641" y1="502.7358" y2="534.5347"/><line style="stroke:#34495E;stroke-width:1;" x1="462.6641" x2="351.29" y1="534.5347" y2="534.5347"/><polygon fill="#34495E" points="361.29,530.5347,351.29,534.5347,361.29,538.5347,357.29,534.5347" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="339.29" x2="339.29" y1="414.937" y2="434.937"/><polygon fill="#34495E" points="335.29,424.937,339.29,434.937,343.29,424.937,339.29,428.937" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="339.29" x2="339.29" y1="309.2407" y2="367.3394"/><polygon fill="#34495E" points="335.29,357.3394,339.29,367.3394,343.29,357.3394,339.29,361.3394" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="258.1963" x2="210.4009" y1="616.6333" y2="616.6333"/><line style="stroke:#34495E;stroke-width:1;" x1="210.4009" x2="210.4009" y1="616.6333" y2="638.6333"/><polygon fill="#34495E" points="206.4009,628.6333,210.4009,638.6333,214.4009,628.6333,210.4009,632.6333" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="420.3838" x2="468.1792" y1="616.6333" y2="616.6333"/><line style="stroke:#34495E;stroke-width:1;" x1="468.1792" x2="468.1792" y1="616.6333" y2="638.6333"/><polygon fill="#34495E" points="464.1792,628.6333,468.1792,638.6333,472.1792,628.6333,468.1792,632.6333" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="210.4009" x2="210.4009" y1="686.231" y2="704.231"/><line style="stroke:#34495E;stroke-width:1;" x1="210.4009" x2="327.29" y1="704.231" y2="704.231"/><polygon fill="#34495E" points="317.29,700.231,327.29,704.231,317.29,708.231,321.29,704.231" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="468.1792" x2="468.1792" y1="672.4321" y2="704.231"/><line style="stroke:#34495E;stroke-width:1;" x1="468.1792" x2="351.29" y1="704.231" y2="704.231"/><polygon fill="#34495E" points="361.29,700.231,351.29,704.231,361.29,708.231,357.29,704.231" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="339.29" x2="339.29" y1="546.5347" y2="604.6333"/><polygon fill="#34495E" points="335.29,594.6333,339.29,604.6333,343.29,594.6333,339.29,598.6333" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="339.29" x2="339.29" y1="716.231" y2="748.231"/><polygon fill="#34495E" points="335.29,738.231,339.29,748.231,343.29,738.231,339.29,742.231" style="stroke:#34495E;stroke-width:1;"/><g class="legend" data-source-line="20"><rect fill="none" height="187.085" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="577.1367" x="88.4434" y="774.231"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="368.0537" x="93.4434" y="792.3628">Design defaults for diagrams unless an ADR narrows them:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="528.3633" x="93.4434" y="808.4614">- Actor/API: HTTPS 443 or 8443; OpenAI-compatible API plus Coherence-native API.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="510.4258" x="93.4434" y="824.5601">- RoCEv2: UDP destination 4791; jumbo MTU 9000; PFC only on RDMA priorities.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="554.7432" x="93.4434" y="840.6587">- NVMe-oF: discovery/controller service on TCP/RDMA port 4420; DPU-mediated targets.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="544.7012" x="93.4434" y="856.7573">- Telemetry: OTLP gRPC 4317, OTLP HTTP 4318, Prometheus 9090/9100, gNMI 9339.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="519.8252" x="93.4434" y="872.856">- Timing: PTP event/general UDP 319/320 on an isolated timing/management class.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="454.4121" x="93.4434" y="888.9546">- VLAN plan: site-specific IDs are allowed, but classes must stay isolated:</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="559.3574" x="101.2227" y="905.0532">mgmt/OOB, frontend/API, RDMA rail-A, RDMA rail-B, storage/NVMe-oF, telemetry, timing.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="507.3564" x="93.4434" y="921.1519">- Trunks: 802.1Q tagged uplinks; rail-A and rail-B must not share a failure domain.</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="464.4951" x="93.4434" y="937.2505">- Buffers: kv_hbm_active, kv_dram_warm, kv_cxl_warm, kv_rdma_staging,</text><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="392.2119" x="101.2227" y="953.3491">zfs_slog, zfs_arc, zfs_l2arc, object_cache, vector_head_cache.</text></g><?plantuml-src TLLhRzis5FtkNt7NVMa1kNwcgHqCW-C76hH9lBmm3042chgMsL2aHb9ElA7_VOUI4hiT-Y6EI8htSUuvHx-43UTCXHRAjFoZCeLm8YU_4QbzKYQZjT2U3qwSBKqghJFigDS_E4XvBKeT5jQ42u6GC_ugxagw5iOVl3LnpZvDhRQEVXqCXwEZ-S6Xa45jLTZH