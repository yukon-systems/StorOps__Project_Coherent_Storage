<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="974px" preserveAspectRatio="none" style="width:678px;height:974px;background:#FFFFFF;" version="1.1" viewBox="0 0 678 974" width="678px" zoomAndPan="magnify"><title>ADR-011 - KV Durability Classes and Recovery Contracts</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="DejaVu Sans" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="597.8672" x="38.8564" y="35.6357">ADR-011 - KV Durability Classes and Recovery Contracts</text></g><ellipse cx="339.29" cy="61.2979" fill="#145A32" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="239.9429" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="666.5801" x="6" y="81.2979"/><path d="M126.4893,81.2979 L126.4893,90.3965 L116.4893,100.3965 L6,100.3965" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="110.4893" x="9" y="95.4297">Class assignment</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="312.1602" x="183.21" y="117.3965"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="242.0859" x="193.21" y="138.6523">Classify KV block by recompute cost, privacy,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="292.1602" x="193.21" y="152.4512">reuse probability, active session, and correctness need</text><polygon fill="#FCF3CF" points="51.0684,184.9941,166.0313,184.9941,178.0313,196.9941,166.0313,208.9941,51.0684,208.9941,39.0684,196.9941,51.0684,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="32.3984" x="112.5498" y="219.312">KV-D0</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="114.9629" x="51.0684" y="200.9875">ephemeral token state?</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="185.0996" x="16" y="241.6431"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="150.0762" x="26" y="262.8989">Store only in kv_hbm_active</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="165.0996" x="26" y="276.6978">loss = recompute/abort decode</text><polygon fill="#FCF3CF" points="273.6824,184.9941,381.8938,184.9941,393.8938,196.9941,381.8938,208.9941,273.6824,208.9941,261.6824,196.9941,273.6824,184.9941" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="49.5161" x="331.7881" y="219.312">KV-D1/D2</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="108.2114" x="273.6824" y="200.9875">warm reusable prefix?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="113.7222" x="393.8938" y="194.6631">checkpoint/audit critical</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="213.377" x="221.0996" y="241.6431"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="193.377" x="231.0996" y="262.8989">Use kv_dram_warm or kv_cxl_warm</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="148.7578" x="231.0996" y="276.6978">optional write-back deadline</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="208.1035" x="454.4766" y="238.3186"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="188.1035" x="464.4766" y="259.5745">Require KV-D3/D4/D5 durable path</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="122.7188" x="464.4766" y="273.3733">OpenZFS-backed ACK</text><rect fill="#FFFFFF" height="227.2939" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="513.4961" x="87.5488" y="331.2407"/><path d="M205.6934,331.2407 L205.6934,340.3394 L195.6934,350.3394 L87.5488,350.3394" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="108.1445" x="90.5488" y="345.3726">Placement matrix</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="268.7949" x="204.8926" y="367.3394"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="248.7949" x="214.8926" y="388.5952">Map class to allowed buffers, replication count,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="234.123" x="214.8926" y="402.394">flush interval, encryption, and eviction policy</text><polygon fill="#FCF3CF" points="253.3955,434.937,425.1846,434.937,437.1846,446.937,425.1846,458.937,253.3955,458.937,241.3955,446.937,253.3955,434.937" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="171.7891" x="253.3955" y="450.9304">class requires cross-node survival?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="224.2778" y="444.606">yes</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="437.1846" y="444.606">no</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="216.7344" x="107.5488" y="468.937"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="196.7344" x="117.5488" y="490.1929">Require DPU/OpenZFS mirror health</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="167.4492" x="117.5488" y="503.9917">and independent rail availability</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="236.7617" x="344.2832" y="468.937"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="216.7617" x="354.2832" y="490.1929">Permit local-only eviction under pressure</text><polygon fill="#FCF3CF" points="339.29,522.5347,351.29,534.5347,339.29,546.5347,327.29,534.5347,339.29,522.5347" style="stroke:#B7950B;stroke-width:1;"/><rect fill="#FFFFFF" height="159.6963" rx="6" ry="6" style="stroke:#000000;stroke-width:1;" width="535.5566" x="62.6772" y="568.5347"/><path d="M173.063,568.5347 L173.063,577.6333 L163.063,587.6333 L62.6772,587.6333" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="14" lengthAdjust="spacing" textLength="100.3857" x="65.6772" y="582.6665">Failure behavior</text><polygon fill="#FCF3CF" points="270.1963,604.6333,408.3838,604.6333,420.3838,616.6333,408.3838,628.6333,270.1963,628.6333,258.1963,616.6333,270.1963,604.6333" style="stroke:#B7950B;stroke-width:1;"/><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="138.1875" x="270.1963" y="620.6267">node, CXL pool, or rail fails?</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="29.96" x="228.2363" y="614.3022">failure</text><text fill="#000000" font-family="DejaVu Sans" font-size="11" lengthAdjust="spacing" textLength="33.623" x="420.3838" y="614.3022">normal</text><rect fill="#FDFEFE" height="47.5977" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="255.4473" x="82.6772" y="638.6333"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="220.7461" x="92.6772" y="659.8892">Apply class-specific recovery: recompute,</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="235.4473" x="92.6772" y="673.688">rehydrate, fail session, or restore checkpoint</text><rect fill="#FDFEFE" height="33.7988" rx="6" ry="6" style="stroke:#566573;stroke-width:1;" width="220.1094" x="358.1245" y="638.6333"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="200.1094" x="368.1245" y="659.8892">Expose class occupancy to scheduler</text><polygon fill="#FCF3CF" points="339.29,692.231,351.29,704.231,339.29,716.231,327.29,704.231,339.29,692.231" style="stroke:#B7950B;stroke-width:1;"/><ellipse cx="339.29" cy="759.231" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="339.29" cy="759.231" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="108.5498" x2="108.5498" y1="208.9941" y2="241.6431"/><polygon fill="#34495E" points="104.5498,231.6431,108.5498,241.6431,112.5498,231.6431,108.5498,235.6431" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="108.5498" x2="108.5498" y1="289.2407" y2="309.2407"/><polygon fill="#34495E" points="104.5498,299.2407,108.5498,309.2407,112.5498,299.2407,108.5498,303.2407" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="327.7881" x2="327.7881" y1="208.9941" y2="241.6431"/><polygon fill="#34495E" points="323.7881,231.6431,327.7881,241.6431,331.7881,231.6431,327.7881,235.6431" style="stroke:#34495E;stroke-width:1;"/><line style="stroke:#34495E;stroke-width:1;" x1="327.7881" x2="327.7881" y1="289.2407" y2="309.2407"/><polygon fill="#34495E" points="323.7881,299.2407,327.7881,309.2407,331.7881,299.2407,327.7881,303.2407" style="stroke:#34495E;stroke-width:1;"/>