x="257.6582" y="267.5498">TTFT, TPOT, KV-cache, RAG,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.0801" x="257.6582" y="281.3486">and fabric-health gates</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="250.7891" x="247.9688" y="337.8916"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="181.418" x="257.9688" y="359.1475">Use TOP500/HPL where relevant,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.7891" x="257.9688" y="372.9463">SPEC HPG, IO500, and application kernels</text><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="160.0684" x="293.3291" y="429.4893"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="140.0684" x="303.3291" y="450.7451">Use IO500, SPECstorage,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="132.7383" x="303.3291" y="464.5439">fio-like engineering tests,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="123.3984" x="303.3291" y="478.3428">and failure/rebuild drills</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="271.3906" x="237.668" y="534.8857"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="251.3906" x="247.668" y="556.1416">Use TPC-family benchmarks such as TPCx-HS</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="222.123" x="247.668" y="569.9404">and application-specific query/ingest tests</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="284.1055" x="231.3105" y="626.4834"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="264.1055" x="241.3105" y="647.7393">Use STAC benchmarks and deterministic latency,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="198.7734" x="241.3105" y="661.5381">timing, timestamping, and audit gates</text><polygon fill="#FFF2CC" points="32,208.4951,209.3105,208.4951,221.3105,220.4951,209.3105,232.4951,32,232.4951,20,220.4951,32,208.4951" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="177.3105" x="32" y="224.4885">AI factory or LLM inference/training?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="221.3105" y="218.1641">yes</text><polygon fill="#FFF2CC" points="62.2661,313.8916,179.0444,313.8916,191.0444,325.8916,179.0444,337.8916,62.2661,337.8916,50.2661,325.8916,62.2661,313.8916" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="116.7783" x="62.2661" y="329.885">HPC / supercomputing?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="191.0444" y="323.5605">yes</text><polygon fill="#FFF2CC" points="70.5188,405.4893,170.7917,405.4893,182.7917,417.4893,170.7917,429.4893,70.5188,429.4893,58.5188,417.4893,70.5188,405.4893" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="100.2729" x="70.5188" y="421.4827">Storage subsystem?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="182.7917" y="415.1582">yes</text><polygon fill="#FFF2CC" points="69.8958,510.8857,171.4148,510.8857,183.4148,522.8857,171.4148,534.8857,69.8958,534.8857,57.8958,522.8857,69.8958,510.8857" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="101.519" x="69.8958" y="526.8792">Database / big data?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="183.4148" y="520.5547">yes</text><polygon fill="#FFF2CC" points="61.9546,602.4834,179.356,602.4834,191.356,614.4834,179.356,626.4834,61.9546,626.4834,49.9546,614.4834,61.9546,602.4834" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="117.4014" x="61.9546" y="618.4768">High-frequency trading?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="191.356" y="612.1523">yes</text><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="220.748" x="157.334" y="694.0811"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="129.4043" x="167.334" y="715.3369">Use SLO/SLA evidence,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="200.748" x="167.334" y="729.1357">resilience drills, and workload-specific</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="90.0527" x="167.334" y="742.9346">acceptance tests</text><polygon fill="#FFF2CC" points="267.708,775.4775,279.708,787.4775,267.708,799.4775,255.708,787.4775,267.708,775.4775" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="130.3906" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="243.4355" x="145.9902" y="819.4775"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="223.4355" x="155.9902" y="840.7334">Emit architecture process-sequence pack:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="111.7266" x="155.9902" y="854.5322">context + viewpoints,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="48.0117" x="155.9902" y="868.3311">ADR set,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="164.7363" x="155.9902" y="882.1299">standards conformance matrix,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="101.3789" x="155.9902" y="895.9287">interface contracts,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="93.3691" x="155.9902" y="909.7275">failure semantics,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="116.0449" x="155.9902" y="923.5264">telemetry/SLO model,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="108.0586" x="155.9902" y="937.3252">benchmark/test plan</text><rect fill="#F7FAFF" height="75.1953" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="224.0996" x="155.6582" y="969.8682"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="108.709" x="165.6582" y="991.124">Review for overlaps:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="189.4395" x="165.6582" y="1004.9229">standards body owns conformance,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="204.0996" x="165.6582" y="1018.7217">framework owns decision/governance,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="142.0781" x="165.6582" y="1032.5205">benchmark owns evidence</text><ellipse cx="267.708" cy="1076.0635" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="267.708" cy="1076.0635" fill="#22