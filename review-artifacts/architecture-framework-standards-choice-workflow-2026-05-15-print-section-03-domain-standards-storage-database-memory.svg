<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1195px" preserveAspectRatio="none" style="width:488px;height:1195px;background:#FFFFFF;" version="1.1" viewBox="0 0 488 1195" width="488px" zoomAndPan="magnify"><title>Print Section 03 - Domain Standards: Storage, Database, Memory</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="434.1094" x="25.7639" y="33.1318">Print Section 03 - Domain Standards: Storage, Database, Memory</text></g><ellipse cx="243.3186" cy="57.0986" fill="#385723" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="174.0957" x="156.2708" y="87.0986"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="148.084" x="166.2708" y="108.3545">Input from Section 01 or 02:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="154.0957" x="166.2708" y="122.1533">unresolved dominant domain</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="199.4082" x="235.2163" y="178.6963"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="179.4082" x="245.2163" y="199.9521">Use SNIA for storage architecture</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="149.4199" x="245.2163" y="213.751">and Swordfish management</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="263.4336" x="203.2036" y="246.2939"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="190.7285" x="213.2036" y="267.5498">Use NVMe specifications for NVMe,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="243.4336" x="213.2036" y="281.3486">NVMe-oF, MI, ZNS, and namespace behavior</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="214.7129" x="227.564" y="313.8916"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194.7129" x="237.564" y="335.1475">Use DMTF Redfish for platform-level</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="131.4023" x="237.564" y="348.9463">storage inventory/control</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="207.4238" x="231.2085" y="381.4893"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="187.4238" x="241.2085" y="402.7451">Use implementation docs only after</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="155.4316" x="241.2085" y="416.5439">standards boundaries are set</text><rect fill="#F7FAFF" height="75.1953" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="237.4414" x="216.1997" y="473.0869"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.7539" x="226.1997" y="494.3428">Use workload pattern references:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="157.4004" x="226.1997" y="508.1416">HDFS for distributed file data,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="217.4414" x="226.1997" y="521.9404">HBase/Bigtable for wide-column storage,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="201.3809" x="226.1997" y="535.7393">TPC/TPCx-HS for benchmark framing</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="207.4063" x="231.2173" y="568.2822"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="187.4063" x="241.2173" y="589.5381">Bind substrate to OCP/SNIA/NVMe</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="121.4063" x="241.2173" y="603.3369">and network standards</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="208.0742" x="230.8833" y="659.8799"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188.0742" x="240.8833" y="681.1357">Use CXL Consortium specifications</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="168.75" x="240.8833" y="694.9346">for coherent memory expansion</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="224.0996" x="222.8706" y="727.4775"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="173.3555" x="232.8706" y="748.7334">Use OCP CMS/CFM material for</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="204.0996" x="232.8706" y="762.5322">composable-memory fleet governance</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="224.791" x="222.5249" y="795.0752"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="204.791" x="232.5249" y="816.3311">Place topology and latency constraints</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.4277" x="232.5249" y="830.1299">into ADRs and scheduler gates</text><polygon fill="#FFF2CC" points="32,154.6963,181.2036,154.6963,193.2036,166.6963,181.2036,178.6963,32,178.6963,20,166.6963,32,154.6963" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="149.2036" x="32" y="170.6897">Storage, block, or object path?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="193.2036" y="164.3652">yes</text><polygon fill="#FFF2CC" points="33.23,449.0869,179.9736,449.0869,191.9736,461.0869,179.9736,473.0869,33.23,473.0869,21.23,461.0869,33.23,449.0869" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="146.7437" x="33.23" y="465.0803">Database or big-data system?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="191.9736" y="458.7559">yes</text><polygon fill="#FFF2CC" points="32.0188,635.8799,181.1848,635.8799,193.1848,647.8799,181.1848,659.8799,32.0188,659.8799,20.0188,647.8799,32.0188,635.8799" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="149.166" x="32.0188" y="651.8733">Memory or accelerator tiering?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="193.1848" y="645.5488">yes</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="209.1055" x="138.7659" y="862.6729"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="189.1055" x="148.7659" y="883.9287">Use ISO 42010 + ADR as the spine</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="222.1016" x="132.2678" y="916.4717"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="202.1016" x="142.2678" y="937.7275">Attach domain-specific standards only</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="111.3984" x="142.2678" y="951.5264">to affected interfaces</text><polygon fill="#FFF2CC" points="243.3186,984.0693,255.3186,996.0693,243.3186,1008.0693,231.3186,996.0693,243.3186,984.0693" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="210.8047" x="137.9163" y="1028.0693"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.0801" x="147.9163" y="1049.3252">Hand off to Section 04:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="190.8047" x="147.9163" y="1063.124">validation evidence and output pack</text><ellipse cx="243.3186" cy="1106.667" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="243.3186" cy="1106.667" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="243.3186" x2="243.3186" y1="67.0986" y2="87.0986"/><polygon fill="#2F5597" points="239.3186,77.0986,243.3186,87.0986,247.3186,77.0986,243.3186,81.0986" style="stroke:#2F5597;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="334.9204" x2="334.9204" y1="226.2939" y2="246.2939"/><polygon fill="#2F5597" points="330.9204,236.2939,334.9204,246.2939,338.9204,236.2939,334.9204,240.2939" style="stroke:#2F5597;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="334.9204" x2="334.9204" y1="293.8916" y2="313.8916"/><polygon fill="#2F5597" points="330.9204,303.8916,334.9204,313.8916,338.9204,303.8916,334.9204,307.8916" style="stroke:#2F5597;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="334.9204" x2="334.9204" y1="361.4893" y2="381.4893"/><polygon fill="#2F5597" points="330.9204,371.4893,334.9204,381.4893,338.9204,371.48