<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1011px" preserveAspectRatio="none" style="width:709px;height:1011px;background:#FFFFFF;" version="1.1" viewBox="0 0 709 1011" width="709px" zoomAndPan="magnify"><title>Print Section 01 - Governance Spine</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="241.1787" x="232.7397" y="33.1318">Print Section 01 - Governance Spine</text></g><ellipse cx="417.8557" cy="57.0986" fill="#385723" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="186.7402" x="324.4856" y="87.0986"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.7578" x="334.4856" y="108.3545">Capture architecture question,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="106.0547" x="334.4856" y="122.1533">stakeholders, scale,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.7402" x="334.4856" y="135.9521">quality attributes, and risk class</text><rect fill="#F7FAFF" height="75.1953" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="186.0957" x="324.8079" y="168.4951"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.0957" x="334.8079" y="189.751">Separate work into three lanes:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.418" x="334.8079" y="203.5498">1. architecture governance,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="112.0664" x="334.8079" y="217.3486">2. domain standards,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.4121" x="334.8079" y="231.1475">3. validation evidence</text><polygon fill="#FFF2CC" points="331.647,263.6904,504.0645,263.6904,516.0645,276.3394,504.0645,288.9883,331.647,288.9883,319.647,276.3394,331.647,263.6904" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="119.8398" x="331.647" y="274.0083">Need stakeholder views,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="172.4175" x="331.647" y="286.6572">viewpoints, or decision traceability?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="302.5293" y="274.0083">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="516.0645" y="274.0083">no</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="176.7441" x="158.7358" y="298.9883"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="118.0723" x="168.7358" y="320.2441">Use ISO 42010 as the</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="156.7441" x="168.7358" y="334.043">architecture-description spine</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="198.084" x="148.0659" y="380.3848"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="135.3691" x="158.0659" y="401.6406">Use ADR/MADR for each</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="178.084" x="158.0659" y="415.4395">architecturally significant decision</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="254.7852" x="119.7153" y="447.9824"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.7129" x="129.7153" y="469.2383">Use arc42/C4-style views for</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="234.7852" x="129.7153" y="483.0371">human-readable structure and runtime flows</text><polygon fill="#FFF2CC" points="159.9834,515.5801,334.2324,515.5801,346.2324,528.229,334.2324,540.8779,159.9834,540.8779,147.9834,528.229,159.9834,515.5801" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="95.3799" x="159.9834" y="525.8979">Enterprise portfolio,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="174.249" x="159.9834" y="538.5469">service lifecycle, or change control?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="130.8657" y="525.8979">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="346.2324" y="525.8979">no</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="243.4414" x="11" y="550.8779"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="183.4102" x="21" y="572.1338">Add TOGAF for enterprise method</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="223.4414" x="21" y="585.9326">and ITIL for service/change/value streams</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="174.1074" x="274.4414" y="550.8779"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="154.1074" x="284.4414" y="572.1338">Keep governance lightweight</text><polygon fill="#FFF2CC" points="247.1079,604.4756,259.1079,616.4756,247.1079,628.4756,235.1079,616.4756,247.1079,604.4756" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="213.4414" x="140.3872" y="648.4756"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.4414" x="150.3872" y="669.7314">Define SLOs/SLIs and error budgets</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.6992" x="150.3872" y="683.5303">with SRE practice</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="191.4453" x="492.8809" y="298.9883"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="171.4453" x="502.8809" y="320.2441">Create a lightweight design note</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="220.1094" x="478.5488" y="366.5859"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="200.1094" x="488.5488" y="387.8418">Promote to ADR when consequences</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="132.7207" x="488.5488" y="401.6406">cross system boundaries</text><polygon fill="#FFF2CC" points="417.8557,702.0732,429.8557,714.0732,417.8557,726.0732,405.8557,714.0732,417.8557,702.0732" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="172.0977" x="331.8069" y="746.0732"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.3711" x="341.8069" y="767.3291">Classify primary scale lens:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.0977" x="341.8069" y="781.1279">component, node, rack, pod,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="135.4277" x="341.8069" y="794.9268">datacenter, region, global</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="166.0859" x="334.8127" y="827.4697"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.0801" x="344.8127" y="848.7256">Hand off to Section 02:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.0859" x="344.8127" y="862.5244">domain standards selection</text><ellipse cx="417.8557" cy="906.0674" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="417.8557" cy="906.0674" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="417.8557" x2="417.8557" y1="67.0986" y2="87.0986"/><polygon fill="#2F5597" points="413.8557,77.0986,417.8557,87.0986,421.8557,77.0986,417.8557,81.0986" style="stroke:#2F5597;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="417.8557" x2="417.8557" y1="148.4951" y2="168.4951"/><polygon fill="#2F5597" points="413.8557,158.4951,417.8557,168.4951,421.8557,158.4951,417.8557,162.4951" style="stroke:#2F5597;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="247.1079" x2="247.1079" y1="346.5859" y2="380.3848"/><polygon fill="#2F5597" points="243.1079,370.3848,247.1079,380.3848,251.1079,370.3848,247.1079,374.3848" style="stroke:#2F5597;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="247.1079" x2="247.1079" y1="427.9824" y2="447.9824"/><polygon fill="#2F5597" points="243.1079,437.9824,247.1079,447.9824,251.1079,437.9824,247.1079,441.9824" style="stroke:#2F5597;stroke-width:1;"/><line style="stroke:#2F5597;stroke-width:1;" x1="147.9834" x2="132.7207" y1="528.229