<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1204px" preserveAspectRatio="none" style="width:645px;height:1204px;background:#FFFFFF;" version="1.1" viewBox="0 0 645 1204" width="645px" zoomAndPan="magnify"><title>Print Section 02 - Domain Standards: Systems and Network</title><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="395.9854" x="123.3403" y="33.1318">Print Section 02 - Domain Standards: Systems and Network</text></g><ellipse cx="373.2749" cy="57.0986" fill="#385723" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="211.4492" x="267.5503" y="87.0986"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="117.3984" x="277.5503" y="108.3545">Input from Section 01:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="191.4492" x="277.5503" y="122.1533">architecture question and scale lens</text><polygon fill="#FFF2CC" points="287.6892,154.6963,458.8606,154.6963,470.8606,166.6963,458.8606,178.6963,287.6892,178.6963,275.6892,166.6963,287.6892,154.6963" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="171.1714" x="287.6892" y="170.6897">Systems or physical infrastructure?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="258.5715" y="164.3652">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="470.8606" y="164.3652">no</text><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="201.4004" x="149.3501" y="188.6963"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="181.4004" x="159.3501" y="209.9521">Use OCP for rack, power, cooling,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="168.0469" x="159.3501" y="223.751">server, NIC, storage, AI-cluster,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="155.4199" x="159.3501" y="237.5498">and facility reference designs</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="259.4141" x="120.3433" y="270.0928"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="239.4141" x="130.3433" y="291.3486">Use DMTF Redfish for platform management</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="291.4766" x="104.312" y="323.8916"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="271.4766" x="114.312" y="345.1475">Use OpenTelemetry/SRE for health and operations</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="161.4219" x="415.7886" y="188.6963"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="141.4219" x="425.7886" y="209.9521">Continue domain selection</text><polygon fill="#FFF2CC" points="373.2749,363.6904,385.2749,375.6904,373.2749,387.6904,361.2749,375.6904,373.2749,363.6904" style="stroke:#7F6000;stroke-width:0.5;"/><polygon fill="#FFF2CC" points="328.6492,407.6904,417.9006,407.6904,429.9006,419.6904,417.9006,431.6904,328.6492,431.6904,316.6492,419.6904,328.6492,407.6904" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="89.2515" x="328.6492" y="423.6838">Network or fabric?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="299.5315" y="417.3594">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="429.9006" y="417.3594">no</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="229.4258" x="99.8955" y="441.6904"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="209.4258" x="109.8955" y="462.9463">Use IEEE 802.3 for Ethernet PHY/MAC</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="172.0859" x="128.5654" y="509.2881"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.0859" x="138.5654" y="530.5439">Use IEEE 802.1 for bridging,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="113.3438" x="138.5654" y="544.3428">DCB, TSN, PFC/ETS</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="171.4063" x="128.9053" y="576.8857"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="126.041" x="138.9053" y="598.1416">Use IETF for IP routing,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151.4063" x="138.9053" y="611.9404">transport, and RFC behavior</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="238.7715" x="95.2227" y="644.4834"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="218.7715" x="105.2227" y="665.7393">Use OpenConfig/gNMI for vendor-neutral</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="144.75" x="105.2227" y="679.5381">configuration and telemetry</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="234.7754" x="174.4414" y="736.0811"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="214.7754" x="184.4414" y="757.3369">Add UEC guidance for AI/HPC Ethernet,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="179.4434" x="184.4414" y="771.1357">congestion, tail latency, and scale</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="195.3828" x="194.1377" y="827.6787"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="150.0703" x="204.1377" y="848.9346">Use IBTA specifications and</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="175.3828" x="204.1377" y="862.7334">OFA/Linux RDMA software stack</text><polygon fill="#FFF2CC" points="33.5281,712.0811,150.9133,712.0811,162.9133,724.0811,150.9133,736.0811,33.5281,736.0811,21.5281,724.0811,33.5281,712.0811" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="117.3853" x="33.5281" y="728.0745">AI/HPC Ethernet fabric?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="162.9133" y="721.75">yes</text><polygon fill="#FFF2CC" points="32,803.6787,152.4414,803.6787,164.4414,815.6787,152.4414,827.6787,32,827.6787,20,815.6787,32,803.6787" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="120.4414" x="32" y="819.6721">InfiniBand/RDMA fabric?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="164.4414" y="813.3477">yes</text><