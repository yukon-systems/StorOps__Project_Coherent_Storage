" x="341.5144" y="2451.1035">yes</text><polygon fill="#FFF2CC" points="220.9888,2533.0322,321.2617,2533.0322,333.2617,2545.0322,321.2617,2557.0322,220.9888,2557.0322,208.9888,2545.0322,220.9888,2533.0322" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="100.2729" x="220.9888" y="2549.0256">Storage subsystem?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="333.2617" y="2542.7012">yes</text><polygon fill="#FFF2CC" points="220.3657,2624.6299,321.8848,2624.6299,333.8848,2636.6299,321.8848,2648.6299,220.3657,2648.6299,208.3657,2636.6299,220.3657,2624.6299" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="101.519" x="220.3657" y="2640.6233">Database / big data?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="333.8848" y="2634.2988">yes</text><polygon fill="#FFF2CC" points="212.4246,2716.2275,329.8259,2716.2275,341.8259,2728.2275,329.8259,2740.2275,212.4246,2740.2275,200.4246,2728.2275,212.4246,2716.2275" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="117.4014" x="212.4246" y="2732.2209">High-frequency trading?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="341.8259" y="2725.8965">yes</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="234.7637" x="306.8137" y="2807.8252"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="214.7637" x="316.8137" y="2829.0811">Use SLO/SLA evidence, resilience drills,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.7754" x