<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="3281px" preserveAspectRatio="none" style="width:800px;height:3281px;background:#FFFFFF;" version="1.1" viewBox="0 0 800 3281" width="800px" zoomAndPan="magnify"><title>Architecture Framework and Standards-Body Choice Path</title><defs/><g><g class="title" data-source-line="2"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="386.6406" x="205.3774" y="33.1318">Architecture Framework and Standards-Body Choice Path</text></g><ellipse cx="424.1956" cy="57.0986" fill="#385723" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="186.7402" x="330.8254" y="87.0986"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.7578" x="340.8254" y="108.3545">Capture architecture question,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="106.0547" x="340.8254" y="122.1533">stakeholders, scale,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.7402" x="340.8254" y="135.9521">quality attributes, and risk class</text><rect fill="#F7FAFF" height="75.1953" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="206.1113" x="321.1399" y="168.4951"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.1113" x="331.1399" y="189.751">Separate the work into three lanes:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.418" x="331.1399" y="203.5498">1. architecture governance,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="112.0664" x="331.1399" y="217.3486">2. domain standards,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.4121" x="331.1399" y="231.1475">3. validation evidence</text><polygon fill="#FFF2CC" points="337.9868,263.6904,510.4043,263.6904,522.4043,276.3394,510.4043,288.9883,337.9868,288.9883,325.9868,276.3394,337.9868,263.6904" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="119.8398" x="337.9868" y="274.0083">Need stakeholder views,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="172.4175" x="337.9868" y="286.6572">viewpoints, or decision traceability?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="308.8691" y="274.0083">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="522.4043" y="274.0083">no</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="176.7441" x="158.7358" y="298.9883"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="118.0723" x="168.7358" y="320.2441">Use ISO 42010 as the</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="156.7441" x="168.7358" y="334.043">architecture-description spine</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="198.084" x="148.0659" y="380.3848"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="135.3691" x="158.0659" y="401.6406">Use ADR/MADR for each</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="178.084" x="158.0659" y="415.4395">architecturally significant decision</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="254.7852" x="119.7153" y="447.9824"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.7129" x="129.7153" y="469.2383">Use arc42/C4-style views for</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="234.7852" x="129.7153" y="483.0371">human-readable structure and runtime flows</text><polygon fill="#FFF2CC" points="159.9834,515.5801,334.2324,515.5801,346.2324,528.229,334.2324,540.8779,159.9834,540.8779,147.9834,528.229,159.9834,515.5801" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="95.3799" x="159.9834" y="525.8979">Enterprise portfolio,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="174.249" x="159.9834" y="538.5469">service lifecycle, or change control?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="130.8657" y="525.8979">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="346.2324" y="525.8979">no</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="243.4414" x="11" y="550.8779"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="183.4102" x="21" y="572.1338">Add TOGAF for enterprise method</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="223.4414" x="21" y="585.9326">and ITIL for service/change/value streams</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="174.1074" x="274.4414" y="550.8779"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="154.1074" x="284.4414" y="572.1338">Keep governance lightweight</text><polygon fill="#FFF2CC" points="247.1079,604.4756,259.1079,616.4756,247.1079,628.4756,235.1079,616.4756,247.1079,604.4756" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="213.4414" x="140.3872" y="648.4756"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.4414" x="150.3872" y="669.7314">Define SLOs/SLIs and error budgets</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.6992" x="150.3872" y="683.5303">with SRE practice</text><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="245.4688" x="478.5488" y="298.9883"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="174.7793" x="488.5488" y="320.2441">Create a lightweight design note,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="225.4688" x="488.5488" y="334.043">then promote to ADR when consequences</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="132.7207" x="488.5488" y="347.8418">cross system boundaries</text><polygon fill="#FFF2CC" points="424.1956,702.0732,436.1956,714.0732,424.1956,726.0732,412.1956,714.0732,424.1956,702.0732" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="172.0977" x="338.1467" y="746.0732"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.3711" x="348.1467" y="767.3291">Classify primary scale lens:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.0977" x="348.1467" y="781.1279">component, node, rack, pod,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="135.4277" x="348.1467" y="794.9268">datacenter, region, global</text><rect fill="#F7FAFF" height="61.3965" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="211.4023" x="421.0801" y="851.4697"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="181.4004" x="431.0801" y="872.7256">Use OCP for rack, power, cooling,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="191.4023" x="431.0801" y="886.5244">server, NIC, storage, AI-cluster, and</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="132.0645" x="431.0801" y="900.3232">facility reference designs</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="259.4141" x="397.0742" y="932.8662"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="239.4141" x="407.0742" y="954.1221">Use DMTF Redfish for platform management</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="291.4766" x="381.043" y="986.665"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="271.4766" x="391.043" y="1007.9209">Use OpenTelemetry/SRE for health and operations</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="229.4258" x="412.0684" y="1064.4639"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="209.4258" x="422.0684" y="1085.7197">Use IEEE 802.3 for Ethernet PHY/MAC</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="288.7637" x="382.3994" y="1118.2627"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="268.7637" x="392.3994" y="1139.5186">Use IEEE 802.1 for bridging, DCB, TSN, PFC/ETS</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="300.7813" x="376.3906" y="1172.0615"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="280.7813" x="386.3906" y="1193.3174">Use IETF for IP routing, transport, and RFC behavior</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="326.8086" x="363.377" y="1225.8604"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="306.8086" x="373.377" y="1247.1162">Use OpenConfig/gNMI for vendor-neutral config/telemetry</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="266.1172" x="470.9434" y="1303.6592"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="246.1172" x="480.9434" y="1324.915">Add UEC guidance for AI/HPC Ethernet stack,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="179.4434" x="480.9434" y="1338.7139">congestion, tail latency, and scale</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="348.7871" x="429.6084" y="1395.2568"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="328.7871" x="439.6084" y="1416.5127">Use IBTA specifications and OFA/Linux RDMA software stack</text><polygon fill="#FFF2CC" points="288.6951,1279.6592,406.0803,1279.6592,418.0803,1291.6592,406.0803,1303.6592,288.6951,1303.6592,276.6951,1291.6592,288.6951,1279.6592" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="117.3853" x="288.6951" y="1295.6526">AI/HPC Ethernet fabric?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="418.0803" y="1289.3281">yes</text><polygon fill="#FFF2CC" points="287.167,1371.2568,407.6084,1371.2568,419.6084,1383.2568,407.6084,1395.2568,287.167,1395.2568,275.167,1383.2568,287.167,1371.2568" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="120.4414" x="287.167" y="1387.2502">InfiniBand/RDMA fabric?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="419.6084" y="1380.9258">yes</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="282.1484" x="385.707" y="1449.0557"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="262.1484" x="395.707" y="1470.3115">Keep IEEE/IETF/OpenConfig as the default basis</text><polygon fill="#FFF2CC" points="526.7813,1502.8545,538.7813,1514.8545,526.7813,1526.8545,514.7813,1514.8545,526.7813,1502.8545" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="352.1621" x="350.7002" y="1570.8545"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="332.1621" x="360.7002" y="1592.1104">Use SNIA for storage architecture and Swordfish management</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="457.4961" x="298.0332" y="1624.6533"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="437.4961" x="308.0332" y="1645.9092">Use NVMe specifications for NVMe, NVMe-oF, MI, ZNS, and namespace behavior</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="349.4492" x="352.0566" y="1678.4521"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="329.4492" x="362.0566" y="1699.708">Use DMTF Redfish for platform-level storage inventory/control</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="366.1895" x="343.6865" y="1732.251"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="346.1895" x="353.6865" y="1753.5068">Use implementation docs only after standards boundaries are set</text><rect fill="#F7FAFF" height="75.1953" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="287.416" x="383.0732" y="1810.0498"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.7539" x="393.0732" y="1831.3057">Use workload pattern references:</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="244.7988" x="393.0732" y="1845.1045">HDFS for high-throughput distributed file data,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="217.4414" x="393.0732" y="1858.9033">HBase/Bigtable for wide-column storage,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="267.416" x="393.0732" y="1872.7021">TPC/TPCx-HS for comparable benchmark framing</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="328.8066" x="362.3779" y="1905.2451"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="308.8066" x="372.3779" y="1926.501">Bind the substrate to OCP/SNIA/NVMe/network standards</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="380.1582" x="336.7021" y="1983.0439"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="360.1582" x="346.7021" y="2004.2998">Use CXL Consortium specifications for coherent memory expansion</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="400.7891" x="326.3867" y="2036.8428"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="380.7891" x="336.3867" y="2058.0986">Use OCP CMS/CFM material for composable-memory fleet governance</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="393.5527" x="330.0049" y="2090.6416"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="373.5527" x="340.0049" y="2111.8975">Place topology and latency constraints into ADRs and scheduler gates</text><polygon fill="#FFF2CC" points="81.9956,827.4697,253.167,827.4697,265.167,839.4697,253.167,851.4697,81.9956,851.4697,69.9956,839.4697,81.9956,827.4697" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="171.1714" x="81.9956" y="843.4631">Systems or physical infrastructure?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="265.167" y="837.1387">yes</text><polygon fill="#FFF2CC" points="122.9556,1040.4639,212.207,1040.4639,224.207,1052.4639,212.207,1064.4639,122.9556,1064.4639,110.9556,1052.4639,122.9556,1040.4639" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="89.2515" x="122.9556" y="1056.4573">Network or fabric?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="224.207" y="1050.1328">yes</text><polygon fill="#FFF2CC" points="92.9795,1546.8545,242.1831,1546.8545,254.1831,1558.8545,242.1831,1570.8545,92.9795,1570.8545,80.9795,1558.8545,92.9795,1546.8545" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="149.2036" x="92.9795" y="1562.8479">Storage, block, or object path?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="254.1831" y="1556.5234">yes</text><polygon fill="#FFF2CC" points="94.2095,1786.0498,240.9531,1786.0498,252.9531,1798.0498,240.9531,1810.0498,94.2095,1810.0498,82.2095,1798.0498,94.2095,1786.0498" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="146.7437" x="94.2095" y="1802.0432">Database or big-data system?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="252.9531" y="1795.7188">yes</text><polygon fill="#FFF2CC" points="92.9983,1959.0439,242.1643,1959.0439,254.1643,1971.0439,242.1643,1983.0439,92.9983,1983.0439,80.9983,1971.0439,92.9983,1959.0439" style="stroke:#7F6000;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="149.166" x="92.9983" y="1975.0374">Memory or accelerator tiering?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="254.1643" y="1968.7129">yes</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="209.1055" x="319.6428" y="2144.4404"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="189.1055" x="329.6428" y="2165.6963">Use ISO 42010 + ADR as the spine</text><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="376.8652" x="235.7629" y="2198.2393"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="356.8652" x="245.7629" y="2219.4951">Attach the domain-specific standards only to the affected interfaces</text><polygon fill="#FFF2CC" points="424.1956,2252.0381,436.1956,2264.0381,424.1956,2276.0381,412.1956,2264.0381,424.1956,2252.0381" style="stroke:#7F6000;stroke-width:0.5;"/><rect fill="#F7FAFF" height="33.7988" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="195.4355" x="326.4778" y="2296.0381"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="175.4355" x="336.4778" y="2317.2939">Choose workload validation suite</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="287.3984" x="386.1516" y="2373.8369"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="267.3984" x="396.1516" y="2395.0928">Use MLCommons/MLPerf plus project-local TTFT,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="252.1113" x="396.1516" y="2408.8916">TPOT, KV-cache, RAG, and fabric-health gates</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="250.7891" x="404.4563" y="2465.4346"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="181.418" x="414.4563" y="2486.6904">Use TOP500/HPL where relevant,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.7891" x="414.4563" y="2500.4893">SPEC HPG, IO500, and application kernels</text><rect fill="#F7FAFF" height="47.5977" rx="12.5" ry="12.5" style="stroke:#2F5597;stroke-width:0.5;" width="296.1406" x="381.7805" y="2557.0322"/><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="276.1406" x="391.7805" y="2578.2881">Use IO500, SPECstorage, fio-like engineering tests,</text><text fill="#1F1F1F" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="123.3984" x="391.7805" y="2592.0869">and failure/rebuild drills</text><r